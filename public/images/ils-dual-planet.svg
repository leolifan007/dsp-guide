<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <linearGradient id="bgGrad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>

  <rect width="600" height="380" rx="10" fill="url(#bgGrad4)" stroke="#1a2a4a" stroke-width="1"/>
  <text x="300" y="28" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="700" font-family="sans-serif">Dual-Planet ILS Automation: How It Flows</text>

  <!-- === Planet A (Home) === -->
  <rect x="20" y="50" width="260" height="310" rx="8" fill="#0d1624" stroke="#2a4a6a" stroke-width="1.5"/>
  <!-- Planet sphere -->
  <circle cx="150" cy="82" r="22" fill="#1a4a6a" stroke="#3a7a9a" stroke-width="1.5"/>
  <text x="150" y="87" text-anchor="middle" fill="#fff" font-size="9" font-family="sans-serif">🪐</text>
  <text x="150" y="118" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700" font-family="sans-serif">Planet A — Home</text>
  <text x="150" y="136" text-anchor="middle" fill="#6b7c93" font-size="10" font-family="sans-serif">Starter Factory</text>

  <!-- ILS on Planet A -->
  <rect x="40" y="150" width="220" height="44" rx="5" fill="#0a1a2e" stroke="#2a4a6a" stroke-width="0.8"/>
  <text x="50" y="170" fill="#f87171" font-size="10" font-weight="600" font-family="sans-serif">ILS (Home)</text>
  <text x="50" y="186" fill="#8b95ad" font-size="9" font-family="sans-serif">Slot 1: Demand — Titanium Ore</text>

  <!-- Smelter row on Planet A -->
  <rect x="40" y="204" width="220" height="70" rx="5" fill="#0a1a2e" stroke="#2a4a6a" stroke-width="0.5"/>
  <text x="50" y="222" fill="#8b95ad" font-size="10" font-family="sans-serif">Smelter Array</text>
  <rect x="50" y="230" width="44" height="36" rx="3" fill="#1a2a3a"/>
  <text x="72" y="248" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">Smelt</text>
  <text x="72" y="260" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">x6</text>
  <rect x="100" y="230" width="44" height="36" rx="3" fill="#1a2a3a"/>
  <text x="122" y="248" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">Smelt</text>
  <text x="122" y="260" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">x6</text>
  <rect x="150" y="230" width="44" height="36" rx="3" fill="#1a2a3a"/>
  <text x="172" y="248" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">Smelt</text>
  <text x="172" y="260" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">x6</text>
  <rect x="200" y="230" width="44" height="36" rx="3" fill="#1a2a3a"/>
  <text x="222" y="248" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">Smelt</text>
  <text x="222" y="260" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">x6</text>

  <!-- Output belt -->
  <rect x="40" y="284" width="220" height="36" rx="5" fill="#0a1a2e" stroke="#2a4a6a" stroke-width="0.5"/>
  <text x="50" y="302" fill="#4ade80" font-size="10" font-weight="600" font-family="sans-serif">→ Titanium Ingots</text>
  <text x="50" y="316" fill="#8b95ad" font-size="9" font-family="sans-serif">Belts back to ILS → Slot 2: Supply</text>

  <!-- Bottom note -->
  <rect x="20" y="330" width="260" height="22" rx="4" fill="rgba(34,197,94,0.06)" stroke="#166534" stroke-width="0.5"/>
  <text x="150" y="345" text-anchor="middle" fill="#4ade80" font-size="9" font-family="sans-serif">Smelts ore into ingots locally</text>

  <!-- === Space between === -->
  <text x="310" y="200" text-anchor="middle" fill="#6b7c93" font-size="18" font-family="sans-serif">⟷ Vessels fly</text>
  <text x="310" y="222" text-anchor="middle" fill="#6b7c93" font-size="9" font-family="sans-serif">(1 warper per trip)</text>

  <!-- === Planet B (Titanium) === -->
  <rect x="320" y="50" width="260" height="310" rx="8" fill="#0d1624" stroke="#6a4a2a" stroke-width="1.5"/>
  <!-- Planet sphere -->
  <circle cx="450" cy="82" r="18" fill="#5a3a1a" stroke="#8a6a3a" stroke-width="1.5"/>
  <text x="450" y="87" text-anchor="middle" fill="#fff" font-size="9" font-family="sans-serif">🪨</text>
  <text x="450" y="118" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700" font-family="sans-serif">Planet B — Titanium</text>
  <text x="450" y="136" text-anchor="middle" fill="#6b7c93" font-size="10" font-family="sans-serif">Ore Planet</text>

  <!-- ILS on Planet B -->
  <rect x="340" y="150" width="220" height="44" rx="5" fill="#0a1a2e" stroke="#6a4a2a" stroke-width="0.8"/>
  <text x="350" y="170" fill="#4ade80" font-size="10" font-weight="600" font-family="sans-serif">ILS (Mining Outpost)</text>
  <text x="350" y="186" fill="#8b95ad" font-size="9" font-family="sans-serif">Slot 1: Supply — Titanium Ore</text>

  <!-- Mining machines -->
  <rect x="340" y="204" width="220" height="70" rx="5" fill="#0a1a2e" stroke="#6a4a2a" stroke-width="0.5"/>
  <text x="350" y="222" fill="#8b95ad" font-size="10" font-family="sans-serif">Mining Machines</text>
  <rect x="350" y="230" width="44" height="36" rx="3" fill="#1a2a3a"/>
  <text x="372" y="248" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">Miner</text>
  <rect x="400" y="230" width="44" height="36" rx="3" fill="#1a2a3a"/>
  <text x="422" y="248" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">Miner</text>
  <rect x="450" y="230" width="44" height="36" rx="3" fill="#1a2a3a"/>
  <text x="472" y="248" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">Miner</text>
  <rect x="500" y="230" width="44" height="36" rx="3" fill="#1a2a3a"/>
  <text x="522" y="248" text-anchor="middle" fill="#6b7c93" font-size="8" font-family="sans-serif">Miner</text>

  <!-- Belt -->
  <rect x="340" y="284" width="220" height="36" rx="5" fill="#0a1a2e" stroke="#6a4a2a" stroke-width="0.5"/>
  <text x="350" y="302" fill="#fbbf24" font-size="10" font-weight="600" font-family="sans-serif">→ Titanium Ore</text>
  <text x="350" y="316" fill="#8b95ad" font-size="9" font-family="sans-serif">Belts from miners → ILS Slot 1</text>

  <rect x="320" y="330" width="260" height="22" rx="4" fill="rgba(251,191,36,0.06)" stroke="#92400e" stroke-width="0.5"/>
  <text x="450" y="345" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="sans-serif">Mines ore and ships it raw</text>

  <!-- Bottom summary -->
  <rect x="20" y="365" width="560" height="12" rx="3" fill="rgba(96,165,250,0.06)"/>
  <text x="300" y="374" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600" font-family="sans-serif">💡 Once this loop is set up, titanium is infinite. Add more miners when demand outgrows supply.</text>
</svg>
