<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="bg"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0d1117"/></linearGradient>
    <linearGradient id="d1"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10B981"/></linearGradient>
    <linearGradient id="d2"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#60A5FA"/></linearGradient>
    <linearGradient id="d3"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#A78BFA"/></linearGradient>
    <linearGradient id="d4"><stop offset="0%" stop-color="#DC2626"/><stop offset="100%" stop-color="#F87171"/></linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#EC4899"/></marker>
  </defs>
  <rect width="600" height="220" fill="url(#bg)"/>
  <text x="300" y="25" text-anchor="middle" fill="#ECEFF1" font-size="15" font-family="monospace" font-weight="bold">DYSON SPHERE - FRAME-FIRST STRATEGY</text>

  <!-- Timeline boxes -->
  <rect x="35" y="50" width="110" height="55" rx="4" fill="#1F2937" stroke="#10B981" stroke-width="1.5"/>
  <text x="47" y="70" fill="#10B981" font-size="9" font-family="monospace">STEP 1</text>
  <text x="43" y="85" fill="#9CA3AF" font-size="10" font-family="monospace">Rocket Factory</text>
  <text x="43" y="98" fill="#6B7280" font-size="9" font-family="monospace">1 rocket/min</text>

  <line x1="145" y1="77" x2="175" y2="77" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="180" y="50" width="110" height="55" rx="4" fill="#1F2937" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="192" y="70" fill="#60A5FA" font-size="9" font-family="monospace">STEP 2</text>
  <text x="185" y="85" fill="#9CA3AF" font-size="10" font-family="monospace">Frame Nodes</text>
  <text x="185" y="98" fill="#6B7280" font-size="9" font-family="monospace">~200 rockets</text>

  <line x1="290" y1="77" x2="320" y2="77" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="325" y="50" width="110" height="55" rx="4" fill="#1F2937" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="337" y="70" fill="#A78BFA" font-size="9" font-family="monospace">STEP 3</text>
  <text x="330" y="85" fill="#9CA3AF" font-size="10" font-family="monospace">Sail Injection</text>
  <text x="330" y="98" fill="#6B7280" font-size="9" font-family="monospace">10-20 railguns</text>

  <line x1="435" y1="77" x2="465" y2="77" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="470" y="50" width="100" height="55" rx="4" fill="#1F2937" stroke="#F87171" stroke-width="1.5"/>
  <text x="482" y="70" fill="#F87171" font-size="9" font-family="monospace">RESULT</text>
  <text x="480" y="85" fill="#9CA3AF" font-size="10" font-family="monospace">Permanent</text>
  <text x="480" y="98" fill="#9CA3AF" font-size="10" font-family="monospace">Power</text>

  <!-- Critical warning -->
  <rect x="35" y="130" width="535" height="35" rx="4" fill="#1F2937" stroke="#DC2626" stroke-width="1.5"/>
  <text x="300" y="145" text-anchor="middle" fill="#F87171" font-size="11" font-family="monospace" font-weight="bold">WARNING: Sails without frame nodes expire in 1800 seconds (30 min)!</text>
  <text x="300" y="158" text-anchor="middle" fill="#9CA3AF" font-size="10" font-family="monospace">Build rockets and frame BEFORE launching mass sails. Frame captures sails permanently.</text>

  <!-- Bottom info -->
  <rect x="35" y="175" width="535" height="30" rx="4" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="55" y="194" fill="#6B7280" font-size="10" font-family="monospace">Equator ring: ~200 rockets | Full grid (6-8 meridians): ~1000-1500 rockets | 1 rocket factory = 10-15 railguns</text>
</svg>
