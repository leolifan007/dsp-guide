<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <radialGradient id="gasGrad" cx=".5" cy=".5" r=".5">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="640" height="200" rx="12" fill="url(#bgGrad2)" stroke="#1e293b" stroke-width="1.5"/>

  <text x="320" y="26" font-family="monospace" font-size="10" fill="#06b6d4" text-anchor="middle" font-weight="bold" letter-spacing="1">HYDROGEN FIX: ORBITAL COLLECTORS</text>

  <!-- Gas giant -->
  <circle cx="120" cy="120" r="55" fill="url(#gasGrad)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity=".4"/>
  <!-- Band on planet -->
  <ellipse cx="120" cy="100" rx="48" ry="6" fill="none" stroke="rgba(59,130,246,.2)" stroke-width="1.5"/>
  <ellipse cx="120" cy="125" rx="52" ry="5" fill="none" stroke="rgba(59,130,246,.15)" stroke-width="1"/>
  <ellipse cx="120" cy="145" rx="40" ry="4" fill="none" stroke="rgba(59,130,246,.1)" stroke-width="1"/>

  <!-- Hydrogen icon -->
  <text x="120" y="125" font-family="monospace" font-size="14" fill="#60a5fa" text-anchor="middle">H₂</text>

  <!-- Orbital ring -->
  <ellipse cx="120" cy="120" rx="78" ry="24" fill="none" stroke="rgba(6,182,212,.08)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Collector nodes on ring -->
  <circle cx="42" cy="110" r="5" fill="#06b6d4"/>
  <circle cx="60" cy="96" r="5" fill="#22d3ee"/>
  <circle cx="120" cy="98" r="5" fill="#06b6d4"/>
  <circle cx="180" cy="96" r="5" fill="#22d3ee"/>
  <circle cx="198" cy="110" r="5" fill="#06b6d4"/>
  <circle cx="198" cy="130" r="5" fill="#22d3ee"/>
  <circle cx="180" cy="144" r="5" fill="#06b6d4"/>
  <circle cx="120" cy="142" r="5" fill="#22d3ee"/>
  <circle cx="60" cy="144" r="5" fill="#06b6d4"/>
  <circle cx="42" cy="130" r="5" fill="#22d3ee"/>

  <!-- Label: 10 Collectors -->
  <text x="120" y="175" font-family="sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">10 Orbital Collectors</text>

  <!-- Arrow to data panel -->
  <line x1="200" y1="120" x2="230" y2="120" stroke="#475569" stroke-width="1.5"/>
  <polygon points="230,115 240,120 230,125" fill="#475569"/>

  <!-- Data panel -->
  <rect x="245" y="45" width="370" height="140" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="430" y="68" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle" font-weight="bold">📊 10 COLLECTORS = INFINITE H₂</text>

  <line x1="265" y1="78" x2="595" y2="78" stroke="#1e293b" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="265" y="98" font-family="sans-serif" font-size="9" fill="#94a3b8">Yield per collector:</text>
  <text x="430" y="98" font-family="monospace" font-size="10" fill="#22d3ee" font-weight="bold">0.35 H₂/sec</text>

  <line x1="265" y1="108" x2="595" y2="108" stroke="#1e293b" stroke-width="1"/>

  <!-- Row 2 -->
  <text x="265" y="126" font-family="sans-serif" font-size="9" fill="#94a3b8">10 collectors total:</text>
  <text x="430" y="126" font-family="monospace" font-size="10" fill="#22d3ee" font-weight="bold">3.5 H₂/sec — never run dry</text>

  <line x1="265" y1="136" x2="595" y2="136" stroke="#1e293b" stroke-width="1"/>

  <!-- Row 3 -->
  <text x="265" y="154" font-family="sans-serif" font-size="9" fill="#94a3b8">Pro tip:</text>
  <text x="330" y="154" font-family="sans-serif" font-size="9" fill="#f59e0b" font-weight="bold">Build 20 — Purple needs H₂ too!</text>

</svg>
