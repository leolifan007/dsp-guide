<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="warpGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity=".8"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity=".8"/>
    </linearGradient>
    <linearGradient id="warpCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="640" height="240" rx="12" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Title -->
  <text x="320" y="30" font-family="monospace" font-size="14.7" fill="#06b6d4" text-anchor="middle" font-weight="bold" letter-spacing="1">SPACE WARPERS - THE PAYOFF</text>

  <!-- Step 1: Green Matrix -->
  <rect x="20" y="48" width="130" height="64" rx="8" fill="#111827" stroke="#22c55e" stroke-width="1.5" stroke-opacity=".5"/>
  <text x="85" y="72" font-family="monospace" font-size="12" fill="#22c55e" text-anchor="middle"> Green Matrix</text>
  <text x="85" y="90" font-family="sans-serif" font-size="10.7" fill="#94a3b8" text-anchor="middle">3 ingredients combined</text>
  <text x="85" y="104" font-family="sans-serif" font-size="10.7" fill="#64748b" text-anchor="middle">in Research Lab</text>

  <!-- Arrow -->
  <text x="165" y="82" font-family="sans-serif" font-size="21.3" fill="#475569">-&gt;</text>

  <!-- Step 2: Warper Production -->
  <rect x="190" y="48" width="130" height="64" rx="8" fill="#111827" stroke="#06b6d4" stroke-width="1.5" stroke-opacity=".5"/>
  <text x="255" y="72" font-family="monospace" font-size="12" fill="#06b6d4" text-anchor="middle"> Space Warper</text>
  <text x="255" y="90" font-family="sans-serif" font-size="10.7" fill="#94a3b8" text-anchor="middle">1 Green Matrix = 1 Warper</text>
  <text x="255" y="104" font-family="sans-serif" font-size="10.7" fill="#64748b" text-anchor="middle">in Assembler M2/M3</text>

  <!-- Arrow -->
  <text x="335" y="82" font-family="sans-serif" font-size="21.3" fill="#475569">-&gt;</text>

  <!-- Step 3: ILS Supply -->
  <rect x="360" y="48" width="130" height="64" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5" stroke-opacity=".5"/>
  <text x="425" y="72" font-family="monospace" font-size="12" fill="#3b82f6" text-anchor="middle"> ILS (Supply)</text>
  <text x="425" y="90" font-family="sans-serif" font-size="10.7" fill="#94a3b8" text-anchor="middle">Set slot to Supply</text>
  <text x="425" y="104" font-family="sans-serif" font-size="10.7" fill="#64748b" text-anchor="middle">Vessels pick up warpers</text>

  <!-- Arrow -->
  <text x="505" y="82" font-family="sans-serif" font-size="21.3" fill="#475569">-&gt;</text>

  <!-- Step 4: Interstellar -->
  <rect x="530" y="40" width="100" height="80" rx="8" fill="#111827" stroke="#a78bfa" stroke-width="1.5" stroke-opacity=".5"/>
  <text x="580" y="66" font-family="monospace" font-size="13.3" fill="#a78bfa" text-anchor="middle"> Other</text>
  <text x="580" y="80" font-family="monospace" font-size="13.3" fill="#c4b5fd" text-anchor="middle">Stars</text>
  <text x="580" y="98" font-family="sans-serif" font-size="10.7" fill="#94a3b8" text-anchor="middle">200 items/trip</text>
  <text x="580" y="112" font-family="sans-serif" font-size="10.7" fill="#64748b" text-anchor="middle">1 warper/trip</text>

  <!-- Divider -->
  <line x1="20" y1="128" x2="620" y2="128" stroke="#1e293b" stroke-width="1"/>

  <!-- Bottom: Stats / Key Info -->
  <!-- Cost -->
  <rect x="20" y="140" width="195" height="84" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="117" y="160" font-family="monospace" font-size="13.3" fill="#06b6d4" text-anchor="middle" font-weight="bold"> COST CALCULATOR</text>
  <text x="30" y="182" font-family="sans-serif" font-size="12" fill="#94a3b8">Cost per warper:</text>
  <text x="140" y="182" font-family="monospace" font-size="13.3" fill="#22d3ee" font-weight="bold">1 Green Matrix</text>
  <text x="30" y="200" font-family="sans-serif" font-size="12" fill="#94a3b8">Items per warper trip:</text>
  <text x="150" y="200" font-family="monospace" font-size="14.7" fill="#22d3ee" font-weight="bold">200</text>
  <text x="30" y="218" font-family="sans-serif" font-size="12" fill="#94a3b8">Efficiency:</text>
  <circle cx="680" cy="1" r="0" fill="none"/> <!-- placeholder removed -->
  <text x="96" y="218" font-family="monospace" font-size="13.3" fill="#22d3ee" font-weight="bold">INSANELY GOOD</text>

  <!-- Route diagram -->
  <circle cx="305" cy="202" r="8" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="305" y="206" font-family="sans-serif" font-size="9.3" fill="#3b82f6" text-anchor="middle">1</text>

  <!-- Destination -->
  <rect x="410" y="155" width="210" height="55" rx="8" fill="#111827" stroke="none"/>
  <text x="515" y="175" font-family="monospace" font-size="13.3" fill="#a78bfa" text-anchor="middle" font-weight="bold"> WHAT IT UNLOCKS</text>
  <text x="420" y="196" font-family="sans-serif" font-size="10.7" fill="#94a3b8"> Interstellar logistics (all systems)</text>
  <text x="420" y="208" font-family="sans-serif" font-size="10.7" fill="#94a3b8"> Advanced Miner  Plane Smelter  More</text>

  <!-- Milestone line -->
  <line x1="290" y1="130" x2="290" y2="185" stroke="rgba(167,139,250,.15)" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
