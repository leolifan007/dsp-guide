<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="600" height="260">
  <defs>
    <linearGradient id="bg"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0d1117"/></linearGradient>
    <linearGradient id="g1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#60A5FA"/></linearGradient>
    <linearGradient id="g2"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#A78BFA"/></linearGradient>
    <linearGradient id="g3"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34D399"/></linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#EC4899"/></marker>
  </defs>
  <rect width="600" height="260" fill="url(#bg)"/>
  <text x="300" y="25" text-anchor="middle" fill="#ECEFF1" font-size="15" font-family="monospace" font-weight="bold">BLUEPRINT WORKFLOW - COPY, MIRROR, PASTE</text>

  <!-- Copy -->
  <rect x="30" y="50" width="140" height="50" rx="4" fill="#1F2937" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="100" y="70" text-anchor="middle" fill="#60A5FA" font-size="11" font-family="monospace" font-weight="bold">1. SELECT + COPY</text>
  <text x="100" y="86" text-anchor="middle" fill="#9CA3AF" font-size="9" font-family="monospace">B or Blueprint Tool</text>
  <text x="100" y="96" text-anchor="middle" fill="#6B7280" font-size="9" font-family="monospace">CTRL+C to save</text>

  <line x1="170" y1="75" x2="200" y2="75" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Mirror -->
  <rect x="205" y="50" width="140" height="50" rx="4" fill="#1F2937" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="275" y="70" text-anchor="middle" fill="#A78BFA" font-size="11" font-family="monospace" font-weight="bold">2. MIRROR (OPT)</text>
  <text x="275" y="86" text-anchor="middle" fill="#9CA3AF" font-size="9" font-family="monospace">Press V to toggle</text>
  <text x="275" y="96" text-anchor="middle" fill="#6B7280" font-size="9" font-family="monospace">Horizontal/Vertical</text>

  <line x1="345" y1="75" x2="375" y2="75" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Paste -->
  <rect x="380" y="50" width="140" height="50" rx="4" fill="#1F2937" stroke="#34D399" stroke-width="1.5"/>
  <text x="450" y="70" text-anchor="middle" fill="#34D399" font-size="11" font-family="monospace" font-weight="bold">3. PASTE</text>
  <text x="450" y="86" text-anchor="middle" fill="#9CA3AF" font-size="9" font-family="monospace">CTRL+V to place</text>
  <text x="450" y="96" text-anchor="middle" fill="#6B7280" font-size="9" font-family="monospace">R=Rotate</text>

  <!-- Pro tips section -->
  <text x="300" y="135" text-anchor="middle" fill="#9CA3AF" font-size="12" font-family="monospace">PRO TIPS</text>

  <rect x="30" y="148" width="260" height="45" rx="4" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="40" y="166" fill="#F59E0B" font-size="10" font-family="monospace" font-weight="bold">Mirror Mode Pro Tip</text>
  <text x="40" y="182" fill="#9CA3AF" font-size="9" font-family="monospace">Build 1 half, copy with mirror ON, paste mirrored half.</text>
  <text x="40" y="193" fill="#6B7280" font-size="9" font-family="monospace">Perfect symmetry in 2 clicks.</text>

  <rect x="310" y="148" width="260" height="45" rx="4" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="320" y="166" fill="#F59E0B" font-size="10" font-family="monospace" font-weight="bold">Snap-to-Grid (SHIFT)</text>
  <text x="320" y="182" fill="#9CA3AF" font-size="9" font-family="monospace">Hold SHIFT while placing blueprints.</text>
  <text x="320" y="193" fill="#6B7280" font-size="9" font-family="monospace">Aligns to foundation grid lines.</text>

  <!-- Bottom -->
  <rect x="30" y="208" width="540" height="35" rx="4" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="300" y="225" text-anchor="middle" fill="#6B7280" font-size="10" font-family="monospace">Blueprints save as .txt files at: %APPDATA%/Dyson Sphere Program/Blueprints/</text>
  <text x="300" y="238" text-anchor="middle" fill="#6B7280" font-size="10" font-family="monospace">Share .txt files with other players - import by placing in Blueprints folder</text>
</svg>
