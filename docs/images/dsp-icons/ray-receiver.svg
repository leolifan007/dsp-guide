  <circle cx="32" cy="32" r="2.5" fill="#f0c040"/>
  <!-- Support pole -->
  <rect x="30" y="44" width="4" height="12" rx="1" fill="#888" stroke="#666" stroke-width="1"/>
  <!-- Rays -->
  <line x1="32" y1="10" x2="32" y2="18" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="14" x2="24" y2="20" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="14" x2="40" y2="20" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
</svg>
