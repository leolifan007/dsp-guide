<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#1a1a2a"/>
    </linearGradient>
    <linearGradient id="pr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="8" fill="url(#bg)"/>
  <!-- Proliferator spray can -->
  <rect x="22" y="14" width="20" height="30" rx="4" fill="url(#pr)" stroke="#CE93D8" stroke-width="0.8"/>
  <!-- Nozzle -->
  <rect x="28" y="8" width="8" height="8" rx="2" fill="#9C27B0"/>
  <!-- Spray particles -->
  <circle cx="46" cy="20" r="2" fill="#E040FB" opacity="0.8"/>
  <circle cx="50" cy="26" r="1.5" fill="#E040FB" opacity="0.6"/>
  <circle cx="48" cy="14" r="1.5" fill="#E040FB" opacity="0.7"/>
  <!-- Level indicator -->
  <rect x="26" y="28" width="4" height="4" rx="1" fill="#F3E5F5"/>
  <rect x="34" y="28" width="4" height="4" rx="1" fill="#F3E5F5"/>
  <!-- Base -->
  <rect x="20" y="44" width="24" height="6" rx="3" fill="#4A148C" stroke="#7C4DFF" stroke-width="0.5"/>
</svg>
