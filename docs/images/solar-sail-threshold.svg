<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="50%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="lowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#FFCDD2"/>
    </linearGradient>
    <linearGradient id="okGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="700" height="320" fill="#0d1117"/>
  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="#ECEFF1" font-size="18.7" font-family="monospace" font-weight="bold">SAIL COUNT vs RECEIVER OUTPUT</text>
  <!-- Y-axis -->
  <line x1="80" y1="50" x2="80" y2="270" stroke="#455A64" stroke-width="1.5"/>
  <text x="40" y="165" text-anchor="middle" fill="#90A4AE" font-size="13.3" font-family="monospace" transform="rotate(-90 40 165)">Ray Receiver Output</text>
  <!-- Y-axis labels -->
  <text x="75" y="75" text-anchor="end" fill="#78909C" font-size="12" font-family="monospace">14.4 MW</text>
  <line x1="75" y1="70" x2="85" y2="70" stroke="#455A64" stroke-width="1"/>
  <text x="75" y="165" text-anchor="end" fill="#78909C" font-size="12" font-family="monospace">7.2 MW</text>
  <line x1="75" y1="160" x2="85" y2="160" stroke="#455A64" stroke-width="1"/>
  <text x="75" y="260" text-anchor="end" fill="#78909C" font-size="12" font-family="monospace">0 MW</text>
  <line x1="75" y1="255" x2="85" y2="255" stroke="#455A64" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="80" y1="270" x2="650" y2="270" stroke="#455A64" stroke-width="1.5"/>
  <text x="365" y="300" text-anchor="middle" fill="#90A4AE" font-size="13.3" font-family="monospace">Solar Sails in Orbit</text>
  <!-- X-axis labels -->
  <text x="120" y="285" text-anchor="middle" fill="#78909C" font-size="12" font-family="monospace">0</text>
  <text x="200" y="285" text-anchor="middle" fill="#78909C" font-size="12" font-family="monospace">3</text>
  <text x="280" y="285" text-anchor="middle" fill="#78909C" font-size="12" font-family="monospace">6</text>
  <text x="360" y="285" text-anchor="middle" fill="#78909C" font-size="12" font-family="monospace">10</text>
  <text x="440" y="285" text-anchor="middle" fill="#78909C" font-size="12" font-family="monospace">15</text>
  <text x="520" y="285" text-anchor="middle" fill="#78909C" font-size="12" font-family="monospace">20</text>
  <text x="600" y="285" text-anchor="middle" fill="#78909C" font-size="12" font-family="monospace">30+</text>
  <!-- Threshold zone: low output (0-5 sails) -->
  <rect x="80" y="50" width="170" height="220" fill="url(#lowGrad)" opacity="0.15"/>
  <text x="165" y="100" text-anchor="middle" fill="#EF5350" font-size="14.7" font-family="monospace" font-weight="bold">LOW OUTPUT</text>
  <text x="165" y="115" text-anchor="middle" fill="#EF9A9A" font-size="12" font-family="monospace">Insufficient sails</text>
  <text x="165" y="128" text-anchor="middle" fill="#EF9A9A" font-size="12" font-family="monospace">Receiver idles</text>
  <!-- Threshold zone: working (6+ sails) -->
  <rect x="250" y="50" width="400" height="220" fill="url(#okGrad)" opacity="0.12"/>
  <text x="450" y="100" text-anchor="middle" fill="#66BB6A" font-size="14.7" font-family="monospace" font-weight="bold">STABLE OUTPUT</text>
  <text x="450" y="115" text-anchor="middle" fill="#A5D6A7" font-size="12" font-family="monospace">6-10 sails = stable</text>
  <text x="450" y="128" text-anchor="middle" fill="#A5D6A7" font-size="12" font-family="monospace">More sails = higher output</text>
  <!-- Output curve -->
  <path d="M 120 255 Q 180 240 240 200 Q 300 140 360 85 Q 420 75 480 72 Q 540 70 600 70" stroke="#29B6F6" stroke-width="3" fill="none" filter="url(#glow)"/>
  <!-- Key points on curve -->
  <circle cx="240" cy="200" r="6" fill="#FFA726" stroke="#FFF" stroke-width="1.5"/>
  <text x="255" y="195" fill="#FFA726" font-size="12" font-family="monospace">~3 MW</text>
  <circle cx="280" cy="160" r="6" fill="#66BB6A" stroke="#FFF" stroke-width="1.5"/>
  <text x="295" y="155" fill="#66BB6A" font-size="12" font-family="monospace" font-weight="bold">6 sails (threshold)</text>
  <circle cx="360" cy="85" r="6" fill="#29B6F6" stroke="#FFF" stroke-width="1.5"/>
  <text x="375" y="90" fill="#29B6F6" font-size="12" font-family="monospace">10+ = near max</text>
  <!-- Dashed threshold line -->
  <line x1="280" y1="50" x2="280" y2="270" stroke="#66BB6A" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="280" y="45" text-anchor="middle" fill="#66BB6A" font-size="10.7" font-family="monospace">MIN SAILS</text>
  <!-- Legend box -->
  <rect x="520" y="180" width="120" height="75" rx="4" fill="rgba(13,17,23,0.9)" stroke="#455A64" stroke-width="1"/>
  <text x="580" y="198" text-anchor="middle" fill="#ECEFF1" font-size="12" font-family="monospace" font-weight="bold">KEY</text>
  <circle cx="535" cy="215" r="4" fill="#EF5350"/><text x="545" y="218" fill="#EF9A9A" font-size="10.7" font-family="monospace">Below threshold</text>
  <circle cx="535" cy="232" r="4" fill="#66BB6A"/><text x="545" y="235" fill="#A5D6A7" font-size="10.7" font-family="monospace">Working range</text>
  <line x1="530" y1="248" x2="545" y2="248" stroke="#29B6F6" stroke-width="2"/><text x="550" y="251" fill="#29B6F6" font-size="10.7" font-family="monospace">Output curve</text>
</svg>
