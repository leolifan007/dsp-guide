<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#EF5350"/>
    </marker>
    <marker id="arrYel" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FDD835"/>
    </marker>
    <marker id="arrGrn" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#66BB6A"/>
    </marker>
    <marker id="arrBlu" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#42A5F5"/>
    </marker>
    <marker id="arrPur" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#AB47BC"/>
    </marker>
    <marker id="arrGen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#B0BEC5"/>
    </marker>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B71C1C"/><stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <linearGradient id="yelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F57F17"/><stop offset="100%" stop-color="#FDD835"/>
    </linearGradient>
    <linearGradient id="grnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B5E20"/><stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
    <linearGradient id="bluGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01579B"/><stop offset="100%" stop-color="#29B6F6"/>
    </linearGradient>
    <linearGradient id="purGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A148C"/><stop offset="100%" stop-color="#8E24AA"/>
    </linearGradient>
    <linearGradient id="labGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#263238"/><stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="800" height="460" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#ECEFF1" font-size="16" font-family="monospace" font-weight="bold">RESEARCH LAB CHAIN - SCIENCE PACK TO UNLOCK</text>

  <!-- LEFT: Science Pack Production (stacked rows) -->

  <!-- Red Science -->
  <rect x="20" y="50" width="170" height="55" rx="6" fill="url(#redGrad)" stroke="#EF5350" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="70" text-anchor="middle" fill="#FFCDD2" font-size="11" font-family="monospace" font-weight="bold">RED SCIENCE PACK</text>
  <text x="105" y="84" text-anchor="middle" fill="#EF9A9A" font-size="9.5" font-family="monospace">Assembler: Iron + Copper</text>
  <text x="105" y="96" text-anchor="middle" fill="#E57373" font-size="8.5" font-family="monospace">1 pack / 5s -> 0.2 packs/s</text>

  <!-- Arrow Red -> Labs -->
  <line x1="190" y1="77" x2="260" y2="120" stroke="#EF5350" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- Yellow Science -->
  <rect x="20" y="120" width="170" height="55" rx="6" fill="url(#yelGrad)" stroke="#FDD835" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="140" text-anchor="middle" fill="#FFF8E1" font-size="11" font-family="monospace" font-weight="bold">YELLOW SCIENCE PACK</text>
  <text x="105" y="154" text-anchor="middle" fill="#FFF176" font-size="9.5" font-family="monospace">Assembler: Iron + EM Turbine</text>
  <text x="105" y="166" text-anchor="middle" fill="#FFEE58" font-size="8.5" font-family="monospace">Tier 2 unlock</text>

  <!-- Arrow Yellow -> Labs -->
  <line x1="190" y1="147" x2="260" y2="150" stroke="#FDD835" stroke-width="2" marker-end="url(#arrYel)"/>

  <!-- Green Science -->
  <rect x="20" y="190" width="170" height="55" rx="6" fill="url(#grnGrad)" stroke="#66BB6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="210" text-anchor="middle" fill="#E8F5E9" font-size="11" font-family="monospace" font-weight="bold">GREEN SCIENCE PACK</text>
  <text x="105" y="224" text-anchor="middle" fill="#A5D6A7" font-size="9.5" font-family="monospace">Assembler: Ingots + Belts</text>
  <text x="105" y="236" text-anchor="middle" fill="#81C784" font-size="8.5" font-family="monospace">Tier 3 unlock</text>

  <!-- Arrow Green -> Labs -->
  <line x1="190" y1="217" x2="260" y2="180" stroke="#66BB6A" stroke-width="2" marker-end="url(#arrGrn)"/>

  <!-- Blue Science -->
  <rect x="20" y="260" width="170" height="55" rx="6" fill="url(#bluGrad)" stroke="#42A5F5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="280" text-anchor="middle" fill="#E1F5FE" font-size="11" font-family="monospace" font-weight="bold">BLUE SCIENCE PACK</text>
  <text x="105" y="294" text-anchor="middle" fill="#81D4FA" font-size="9.5" font-family="monospace">Refinery: Ref.Oil + H2</text>
  <text x="105" y="306" text-anchor="middle" fill="#4FC3F7" font-size="8.5" font-family="monospace">Tier 4 - needs oil</text>

  <!-- Arrow Blue -> Labs -->
  <line x1="190" y1="287" x2="260" y2="210" stroke="#42A5F5" stroke-width="2" marker-end="url(#arrBlu)"/>

  <!-- Purple Science -->
  <rect x="20" y="330" width="170" height="55" rx="6" fill="url(#purGrad)" stroke="#AB47BC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="350" text-anchor="middle" fill="#F3E5F5" font-size="11" font-family="monospace" font-weight="bold">PURPLE SCIENCE PACK</text>
  <text x="105" y="364" text-anchor="middle" fill="#CE93D8" font-size="9.5" font-family="monospace">Assembler: Ti-Alloy + Si</text>
  <text x="105" y="376" text-anchor="middle" fill="#BA68C8" font-size="8.5" font-family="monospace">Tier 5 - endgame</text>

  <!-- Arrow Purple -> Labs -->
  <line x1="190" y1="357" x2="260" y2="240" stroke="#AB47BC" stroke-width="2" marker-end="url(#arrPur)"/>

  <!-- MIDDLE: Lab Row -->
  <rect x="260" y="130" width="160" height="160" rx="8" fill="url(#labGrad)" stroke="#B0BEC5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="152" text-anchor="middle" fill="#ECEFF1" font-size="12" font-family="monospace" font-weight="bold">LAB ROW</text>
  <text x="340" y="167" text-anchor="middle" fill="#B0BEC5" font-size="9.5" font-family="monospace">1 pack / second / lab</text>

  <!-- Lab icons (5 labs) -->
  <rect x="275" y="175" width="24" height="18" rx="3" fill="#455A64" stroke="#78909C" stroke-width="0.8"/>
  <text x="287" y="187" text-anchor="middle" fill="#B0BEC5" font-size="7.5" font-family="monospace">L1</text>
  <rect x="275" y="198" width="24" height="18" rx="3" fill="#455A64" stroke="#78909C" stroke-width="0.8"/>
  <text x="287" y="210" text-anchor="middle" fill="#B0BEC5" font-size="7.5" font-family="monospace">L2</text>
  <rect x="275" y="221" width="24" height="18" rx="3" fill="#455A64" stroke="#78909C" stroke-width="0.8"/>
  <text x="287" y="233" text-anchor="middle" fill="#B0BEC5" font-size="7.5" font-family="monospace">L3</text>
  <rect x="275" y="244" width="24" height="18" rx="3" fill="#455A64" stroke="#78909C" stroke-width="0.8"/>
  <text x="287" y="256" text-anchor="middle" fill="#B0BEC5" font-size="7.5" font-family="monospace">L4</text>
  <rect x="275" y="267" width="24" height="18" rx="3" fill="#455A64" stroke="#78909C" stroke-width="0.8"/>
  <text x="287" y="279" text-anchor="middle" fill="#B0BEC5" font-size="7.5" font-family="monospace">L5</text>

  <text x="340" y="297" text-anchor="middle" fill="#FFD54F" font-size="9" font-family="monospace">PWR Power drain: high</text>
  <text x="340" y="310" text-anchor="middle" fill="#FFD54F" font-size="9" font-family="monospace">Adjacent = shared power</text>

  <!-- Arrow Labs -> Unlocks -->
  <line x1="420" y1="210" x2="500" y2="210" stroke="#B0BEC5" stroke-width="2.5" marker-end="url(#arrGen)"/>
  <text x="460" y="203" text-anchor="middle" fill="#B0BEC5" font-size="8.5" font-family="monospace">Research</text>

  <!-- RIGHT: Research Unlocks -->
  <rect x="500" y="50" width="280" height="340" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <text x="640" y="78" text-anchor="middle" fill="#ECEFF1" font-size="13" font-family="monospace" font-weight="bold">RESEARCH UNLOCKS</text>
  <line x1="510" y1="88" x2="770" y2="88" stroke="#30363d" stroke-width="1"/>

  <!-- Unlock items -->
  <rect x="515" y="98" width="250" height="26" rx="4" fill="#B71C1C" stroke="#EF5350" stroke-width="0.8"/>
  <text x="640" y="114" text-anchor="middle" fill="#FFCDD2" font-size="9.5" font-family="monospace">Red -> Mk.II Belt, Assembler Mk.II</text>

  <rect x="515" y="130" width="250" height="26" rx="4" fill="#F57F17" stroke="#FDD835" stroke-width="0.8"/>
  <text x="640" y="146" text-anchor="middle" fill="#FFF8E1" font-size="9.5" font-family="monospace">Yellow -> Logistics System, Sorters</text>

  <rect x="515" y="162" width="250" height="26" rx="4" fill="#1B5E20" stroke="#66BB6A" stroke-width="0.8"/>
  <text x="640" y="178" text-anchor="middle" fill="#E8F5E9" font-size="9.5" font-family="monospace">Green -> Logistics Pill, Oil Refining</text>

  <rect x="515" y="194" width="250" height="26" rx="4" fill="#01579B" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="640" y="210" text-anchor="middle" fill="#E1F5FE" font-size="9.5" font-family="monospace">Blue -> Hydrogen Fuel, Fuel Plants</text>

  <rect x="515" y="226" width="250" height="26" rx="4" fill="#4A148C" stroke="#AB47BC" stroke-width="0.8"/>
  <text x="640" y="242" text-anchor="middle" fill="#F3E5F5" font-size="9.5" font-family="monospace">Purple -> Quantum Chip, Solar Sails</text>

  <line x1="515" y1="262" x2="765" y2="262" stroke="#30363d" stroke-width="1"/>

  <text x="640" y="282" text-anchor="middle" fill="#FFD54F" font-size="10" font-family="monospace" font-weight="bold">SCALING RULE</text>
  <text x="640" y="300" text-anchor="middle" fill="#ECEFF1" font-size="9.5" font-family="monospace">1 Assembler (Red)  0.2 packs/s</text>
  <text x="640" y="315" text-anchor="middle" fill="#ECEFF1" font-size="9.5" font-family="monospace">5 Labs = 5 packs/s needed</text>
  <text x="640" y="330" text-anchor="middle" fill="#FFD54F" font-size="9.5" font-family="monospace" font-weight="bold">-> 25 assemblers / science type</text>

  <rect x="515" y="342" width="250" height="38" rx="4" fill="#37474F" stroke="#FFD54F" stroke-width="1"/>
  <text x="640" y="357" text-anchor="middle" fill="#FFD54F" font-size="9" font-family="monospace" font-weight="bold"> NEVER hand-feed labs</text>
  <text x="640" y="370" text-anchor="middle" fill="#FFD54F" font-size="9" font-family="monospace">Automate or fall behind</text>

  <!-- Bottom note -->
  <text x="400" y="445" text-anchor="middle" fill="#607D8B" font-size="9" font-family="monospace">Science packs MUST be automated. Labs consume 1/s. Match assembler count to lab count.</text>
</svg>