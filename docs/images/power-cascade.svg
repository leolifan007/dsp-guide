<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
    <linearGradient id="yellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a020"/>
      <stop offset="100%" style="stop-color:#f0c040"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bg)" rx="8"/>

  <text x="400" y="28" font-family="Arial,sans-serif" font-size="14" fill="#aac" text-anchor="middle" font-weight="bold">THE POWER CASCADE - WHY EVERYTHING DIES AT ONCE</text>
  <line x1="50" y1="38" x2="750" y2="38" stroke="#334" stroke-width="1"/>

  <!-- Step 1 -->
  <rect x="30" y="60" width="200" height="90" rx="6" fill="#2a2a44" stroke="#d4a020" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="85" font-family="Arial,sans-serif" font-size="12" fill="#f0c040" text-anchor="middle" font-weight="bold">1. Power hits 100%</text>
  <text x="130" y="105" font-family="Arial,sans-serif" font-size="9" fill="#ccc" text-anchor="middle">Your factory expansion</text>
  <text x="130" y="118" font-family="Arial,sans-serif" font-size="9" fill="#ccc" text-anchor="middle">pushes the grid to</text>
  <text x="130" y="131" font-family="Arial,sans-serif" font-size="9" fill="#f88" text-anchor="middle">full capacity</text>
  <text x="130" y="148" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">*no warning from the game*</text>

  <!-- Arrow 1-&gt;2 -->
  <line x1="235" y1="105" x2="290" y2="105" stroke="#d4a020" stroke-width="2" marker-end="url(#arrowYell)"/>

  <!-- Step 2 -->
  <rect x="295" y="60" width="200" height="90" rx="6" fill="#2a2a44" stroke="#d4a020" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="395" y="85" font-family="Arial,sans-serif" font-size="12" fill="#f0c040" text-anchor="middle" font-weight="bold">2. Sorters slow down</text>
  <text x="395" y="105" font-family="Arial,sans-serif" font-size="9" fill="#ccc" text-anchor="middle">Underpowered sorters</text>
  <text x="395" y="118" font-family="Arial,sans-serif" font-size="9" fill="#ccc" text-anchor="middle">move at crawl speed</text>
  <text x="395" y="131" font-family="Arial,sans-serif" font-size="9" fill="#aaa" text-anchor="middle">fuel can't reach generators</text>
  <text x="395" y="148" font-family="Arial,sans-serif" font-size="8" fill="#666" text-anchor="middle">the cascade begins...</text>

  <!-- Arrow 2-&gt;3 -->
  <line x1="500" y1="105" x2="555" y2="105" stroke="#c44a4a" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step 3 -->
  <rect x="560" y="60" width="200" height="90" rx="6" fill="#3a2020" stroke="#c0392b" stroke-width="2" filter="url(#shadow)"/>
  <text x="660" y="85" font-family="Arial,sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">3. Generators die</text>
  <text x="660" y="105" font-family="Arial,sans-serif" font-size="9" fill="#ccc" text-anchor="middle">Thermal plants run out of fuel</text>
  <text x="660" y="118" font-family="Arial,sans-serif" font-size="9" fill="#ccc" text-anchor="middle">Grid loses more capacity</text>
  <text x="660" y="131" font-family="Arial,sans-serif" font-size="9" fill="#f88" text-anchor="middle">MORE sorters slow down</text>
  <text x="660" y="148" font-family="Arial,sans-serif" font-size="8" fill="#666" text-anchor="middle">positive feedback loop </text>

  <!-- Markers -->
  <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
  </marker>
  <marker id="arrowYell" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d4a020"/>
  </marker>
  <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
  </marker>

  <!-- Result: Death -->
  <rect x="230" y="175" width="330" height="35" rx="6" fill="url(#redGrad)" opacity="0.85"/>
  <text x="395" y="198" font-family="Arial,sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold"> CASCADE -&gt; ALL POWER = ZERO -&gt; FACTORY DEAD</text>

  <!-- SOLUTIONS -->
  <text x="400" y="248" font-family="Arial,sans-serif" font-size="13" fill="#6bc46b" text-anchor="middle" font-weight="bold">HOW TO STOP IT</text>

  <rect x="30" y="265" width="220" height="115" rx="6" fill="#1e2a1e" stroke="#27ae60" stroke-width="1.5"/>
  <text x="140" y="290" font-family="Arial,sans-serif" font-size="12" fill="#2ecc71" text-anchor="middle" font-weight="bold"> Emergency (Grid is DEAD)</text>
  <text x="50" y="310" font-family="Arial,sans-serif" font-size="9" fill="#ccc">1. Delete power poles to non-essentials</text>
  <text x="50" y="325" font-family="Arial,sans-serif" font-size="9" fill="#ccc">2. Hand-feed coal into thermal plants</text>
  <text x="50" y="340" font-family="Arial,sans-serif" font-size="9" fill="#ccc">3. Let grid stabilize</text>
  <text x="50" y="355" font-family="Arial,sans-serif" font-size="9" fill="#ccc">4. Reconnect buildings slowly</text>
  <text x="50" y="370" font-family="Arial,sans-serif" font-size="8" fill="#888">Takes 2 minutes, saves the factory</text>

  <rect x="285" y="265" width="220" height="115" rx="6" fill="#1e2a1e" stroke="#27ae60" stroke-width="1.5"/>
  <text x="395" y="290" font-family="Arial,sans-serif" font-size="12" fill="#2ecc71" text-anchor="middle" font-weight="bold"> Prevention (Grid is ALIVE)</text>
  <text x="305" y="310" font-family="Arial,sans-serif" font-size="9" fill="#ccc">1. Research Solar Panel</text>
  <text x="305" y="325" font-family="Arial,sans-serif" font-size="9" fill="#ccc">2. Build 3x solar belt around equator</text>
  <text x="305" y="340" font-family="Arial,sans-serif" font-size="9" fill="#ccc">3. 15-20 MW of stable power</text>
  <text x="305" y="355" font-family="Arial,sans-serif" font-size="9" fill="#ccc">4. Never worry about cascade again</text>
  <text x="305" y="370" font-family="Arial,sans-serif" font-size="8" fill="#888">x Thermal: 'set and forget'</text>

  <rect x="540" y="265" width="220" height="115" rx="6" fill="#1e2a1e" stroke="#27ae60" stroke-width="1.5"/>
  <text x="650" y="290" font-family="Arial,sans-serif" font-size="12" fill="#2ecc71" text-anchor="middle" font-weight="bold"> Mid-Game (After Yellow)</text>
  <text x="560" y="310" font-family="Arial,sans-serif" font-size="9" fill="#ccc">1. Research Deuterium Fuel</text>
  <text x="560" y="325" font-family="Arial,sans-serif" font-size="9" fill="#ccc">2. Build 1 Fusion Power Plant</text>
  <text x="560" y="340" font-family="Arial,sans-serif" font-size="9" fill="#ccc">3. ~40 MW per plant, no cascade</text>
  <text x="560" y="355" font-family="Arial,sans-serif" font-size="9" fill="#ccc">4. Eventually replace thermal</text>
  <text x="560" y="370" font-family="Arial,sans-serif" font-size="8" fill="#888">Fuel rods belt-fed, not sorter-dependent</text>

</svg>