<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bgGrad5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>

  <rect width="600" height="500" rx="10" fill="url(#bgGrad5)" stroke="#1a2a4a" stroke-width="1"/>
  <text x="300" y="28" text-anchor="middle" fill="#f87171" font-size="18.7" font-weight="700" font-family="sans-serif"> Power Cascade: Emergency Restart Protocol</text>
  <text x="300" y="46" text-anchor="middle" fill="#6b7c93" font-size="14.7" font-family="sans-serif">Everything's dead. Here's how to bring it back, step by step.</text>

  <!-- Step 1 -->
  <rect x="20" y="60" width="560" height="64" rx="8" fill="#0d1624" stroke="#6a2a2a" stroke-width="1"/>
  <rect x="20" y="60" width="46" height="64" rx="8" fill="#6a2a2a"/>
  <rect x="48" y="60" width="18" height="64" fill="#6a2a2a"/>
  <text x="43" y="95" text-anchor="middle" fill="#fff" font-size="18.7" font-weight="700" font-family="sans-serif">1</text>
  <text x="80" y="84" fill="#f87171" font-size="14.7" font-weight="700" font-family="sans-serif">Isolate the Factory</text>
  <text x="80" y="104" fill="#8b95ad" font-size="13.3" font-family="sans-serif">Mine all energy-using belts, sorters, assemblers, labs from the power grid. Only keep miners + thermal generators connected.</text>

  <!-- Arrow -->
  <text x="300" y="140" text-anchor="middle" fill="#6b7c93" font-size="24" font-family="sans-serif"></text>

  <!-- Step 2 -->
  <rect x="20" y="150" width="560" height="64" rx="8" fill="#0d1624" stroke="#6a2a2a" stroke-width="1"/>
  <rect x="20" y="150" width="46" height="64" rx="8" fill="#6a2a2a"/>
  <rect x="48" y="150" width="18" height="64" fill="#6a2a2a"/>
  <text x="43" y="185" text-anchor="middle" fill="#fff" font-size="18.7" font-weight="700" font-family="sans-serif">2</text>
  <text x="80" y="174" fill="#f87171" font-size="14.7" font-weight="700" font-family="sans-serif">Restart Thermal Plants</text>
  <text x="80" y="194" fill="#8b95ad" font-size="13.3" font-family="sans-serif">Feed coal/wood to thermal generators by hand. Click each one, add fuel. Priority: get ONE generator running first.</text>

  <!-- Arrow -->
  <text x="300" y="230" text-anchor="middle" fill="#6b7c93" font-size="24" font-family="sans-serif"></text>

  <!-- Step 3 -->
  <rect x="20" y="240" width="560" height="64" rx="8" fill="#0d1624" stroke="#6a2a2a" stroke-width="1"/>
  <rect x="20" y="240" width="46" height="64" rx="8" fill="#6a2a2a"/>
  <rect x="48" y="240" width="18" height="64" fill="#6a2a2a"/>
  <text x="43" y="275" text-anchor="middle" fill="#fff" font-size="18.7" font-weight="700" font-family="sans-serif">3</text>
  <text x="80" y="264" fill="#f87171" font-size="14.7" font-weight="700" font-family="sans-serif">Let Miners Spin Up</text>
  <text x="80" y="284" fill="#8b95ad" font-size="13.3" font-family="sans-serif">Power flows to miners -&gt; they produce coal -&gt; coal feeds thermal generators -&gt; cycle self-sustains in 30-60 seconds.</text>

  <!-- Arrow -->
  <text x="300" y="320" text-anchor="middle" fill="#6b7c93" font-size="24" font-family="sans-serif"></text>

  <!-- Step 4 - Decision fork -->
  <rect x="20" y="330" width="560" height="64" rx="8" fill="#0d1624" stroke="#3a2a6a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="20" y="330" width="46" height="64" rx="8" fill="#3a2a6a"/>
  <rect x="48" y="330" width="18" height="64" fill="#3a2a6a"/>
  <text x="43" y="365" text-anchor="middle" fill="#fff" font-size="18.7" font-weight="700" font-family="sans-serif">4</text>
  <text x="80" y="354" fill="#a78bfa" font-size="14.7" font-weight="700" font-family="sans-serif">Check: Is the cycle holding?</text>
  <text x="80" y="374" fill="#8b95ad" font-size="13.3" font-family="sans-serif">Is power output  power draw? If yes -&gt; slowly reconnect factory sections one at a time.</text>
  <text x="80" y="390" fill="#fbbf24" font-size="13.3" font-weight="600" font-family="sans-serif">If still browning out -&gt; build more thermal generators or add a solar panel field.</text>

  <!-- Two possible outcomes -->
  <text x="180" y="418" text-anchor="middle" fill="#4ade80" font-size="14.7" font-weight="700" font-family="sans-serif"> Cycle Stable</text>
  <text x="180" y="436" text-anchor="middle" fill="#8b95ad" font-size="12" font-family="sans-serif">Reconnect 1 belt line at a time.</text>
  <text x="180" y="452" text-anchor="middle" fill="#8b95ad" font-size="12" font-family="sans-serif">Watch the demand bar - if it spikes, pause.</text>

  <text x="430" y="418" text-anchor="middle" fill="#f87171" font-size="14.7" font-weight="700" font-family="sans-serif"> Still Collapsing</text>
  <text x="430" y="436" text-anchor="middle" fill="#8b95ad" font-size="12" font-family="sans-serif">Add more thermal generators (coal)</text>
  <text x="430" y="452" text-anchor="middle" fill="#8b95ad" font-size="12" font-family="sans-serif">Or build wind turbines (free, 24/7)</text>

  <!-- Bottom tip -->
  <rect x="20" y="470" width="560" height="24" rx="4" fill="rgba(251,191,36,0.06)" stroke="#92400e" stroke-width="0.5"/>
  <text x="300" y="483" text-anchor="middle" fill="#fbbf24" font-size="13.3" font-weight="600" font-family="sans-serif"> Prevention tip: 12 thermal gens on separate coal grid.</text>
  <text x="300" y="498" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="500" font-family="sans-serif">Never let the cascade kill your main bus again.</text>
</svg>
