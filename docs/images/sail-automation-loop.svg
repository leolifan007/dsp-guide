<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FFD54F"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#29B6F6"/>
    </marker>
    <linearGradient id="ilsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="700" height="300" fill="#0d1117"/>
  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" fill="#ECEFF1" font-size="17.3" font-family="monospace" font-weight="bold">AUTOMATED SAIL PRODUCTION LOOP</text>
  <!-- Step 1: Graphene Factory -->
  <rect x="40" y="60" width="130" height="70" rx="6" fill="#1B5E20" stroke="#43A047" stroke-width="1.5"/>
  <text x="105" y="85" text-anchor="middle" fill="#C8E6C9" font-size="13.3" font-family="monospace" font-weight="bold">GRAPHENE</text>
  <text x="105" y="100" text-anchor="middle" fill="#A5D6A7" font-size="10.7" font-family="monospace">FACTORY</text>
  <text x="105" y="115" text-anchor="middle" fill="#66BB6A" font-size="9.3" font-family="monospace">Coal+Oil -> Graphene</text>
  <!-- Arrow 1-&gt;2 -->
  <line x1="170" y1="95" x2="215" y2="95" stroke="#FFD54F" stroke-width="2" marker-end="url(#arr)"/>
  <text x="192" y="88" text-anchor="middle" fill="#FFD54F" font-size="9.3" font-family="monospace">belt</text>
  <!-- Step 2: Solar Sail Assembler -->
  <rect x="220" y="60" width="130" height="70" rx="6" fill="#0277BD" stroke="#29B6F6" stroke-width="1.5"/>
  <text x="285" y="85" text-anchor="middle" fill="#B3E5FC" font-size="13.3" font-family="monospace" font-weight="bold">ASSEMBLER</text>
  <text x="285" y="100" text-anchor="middle" fill="#81D4FA" font-size="10.7" font-family="monospace">Solar Sails</text>
  <text x="285" y="115" text-anchor="middle" fill="#4FC3F7" font-size="9.3" font-family="monospace">Graphene x2 -&gt; Sail</text>
  <!-- Arrow 2-&gt;3 -->
  <line x1="350" y1="95" x2="395" y2="95" stroke="#FFD54F" stroke-width="2" marker-end="url(#arr)"/>
  <text x="372" y="88" text-anchor="middle" fill="#FFD54F" font-size="9.3" font-family="monospace">belt</text>
  <!-- Step 3: ILS -->
  <rect x="395" y="50" width="165" height="90" rx="8" fill="url(#ilsGrad)" stroke="#42A5F5" stroke-width="2"/>
  <text x="475" y="75" text-anchor="middle" fill="#E3F2FD" font-size="14.7" font-family="monospace" font-weight="bold">ILS</text>
  <text x="475" y="92" text-anchor="middle" fill="#90CAF9" font-size="10.7" font-family="monospace">Interstellar Logistics</text>
  <text x="475" y="108" text-anchor="middle" fill="#64B5F6" font-size="9.3" font-family="monospace">Slot: SUPPLY</text>
  <text x="475" y="122" text-anchor="middle" fill="#64B5F6" font-size="9.3" font-family="monospace">Item: Solar Sails</text>
  <!-- Arrow 3-&gt;4 (down to launcher) -->
  <line x1="475" y1="140" x2="475" y2="175" stroke="#29B6F6" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="490" y="160" fill="#29B6F6" font-size="9.3" font-family="monospace">logistics</text>
  <!-- Step 4: Vertical Launcher -->
  <rect x="400" y="180" width="150" height="70" rx="6" fill="#37474F" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="475" y="205" text-anchor="middle" fill="#ECEFF1" font-size="13.3" font-family="monospace" font-weight="bold">VERTICAL LAUNCHER</text>
  <text x="475" y="220" text-anchor="middle" fill="#B0BEC5" font-size="10.7" font-family="monospace">Auto-Launch: ON</text>
  <text x="475" y="235" text-anchor="middle" fill="#78909C" font-size="9.3" font-family="monospace">Buffer: 30 sails</text>
  <!-- Arrow 4-&gt;5 (up to orbit) -->
  <path d="M 550 215 Q 590 215 590 140 Q 590 80 620 80" stroke="#29B6F6" stroke-width="2" fill="none" marker-end="url(#arrBlue)"/>
  <text x="605" y="150" fill="#29B6F6" font-size="9.3" font-family="monospace">launch</text>
  <!-- Step 5: Orbit (simplified star) -->
  <circle cx="640" cy="80" r="30" fill="#FFF9C4" opacity="0.9"/>
  <circle cx="640" cy="80" r="45" fill="none" stroke="#29B6F6" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <circle cx="665" cy="55" r="4" fill="#29B6F6"/>
  <circle cx="670" cy="85" r="4" fill="#29B6F6"/>
  <circle cx="650" cy="105" r="4" fill="#29B6F6"/>
  <text x="640" y="135" text-anchor="middle" fill="#29B6F6" font-size="12" font-family="monospace">ORBIT</text>
  <text x="640" y="148" text-anchor="middle" fill="#4FC3F7" font-size="9.3" font-family="monospace">Sails circling star</text>
  <!-- Arrow from orbit to Ray Receiver -->
  <path d="M 620 110 Q 590 150 590 190 Q 590 230 550 245" stroke="#FF7043" stroke-width="2" fill="none" stroke-dasharray="5 3"/>
  <text x="575" y="200" fill="#FF7043" font-size="9.3" font-family="monospace">radiation</text>
  <!-- Step 6: Ray Receiver -->
  <rect x="220" y="200" width="140" height="65" rx="6" fill="#1565C0" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="290" y="222" text-anchor="middle" fill="#E3F2FD" font-size="13.3" font-family="monospace" font-weight="bold">RAY RECEIVER</text>
  <text x="290" y="238" text-anchor="middle" fill="#90CAF9" font-size="10.7" font-family="monospace">Energy Mode</text>
  <text x="290" y="252" text-anchor="middle" fill="#64B5F6" font-size="9.3" font-family="monospace">14.4 MW to grid</text>
  <!-- Power output -->
  <line x1="220" y1="232" x2="160" y2="232" stroke="#FFD54F" stroke-width="2" marker-end="url(#arr)"/>
  <text x="140" y="236" fill="#FFD54F" font-size="10.7" font-family="monospace">POWER</text>
  <!-- Degrade note -->
  <rect x="35" y="140" width="150" height="50" rx="4" fill="rgba(239,83,80,0.15)" stroke="#EF5350" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="110" y="157" text-anchor="middle" fill="#EF5350" font-size="10.7" font-family="monospace" font-weight="bold">[!] SAIL DEGRADATION</text>
  <text x="110" y="170" text-anchor="middle" fill="#EF9A9A" font-size="9.3" font-family="monospace">Sails burn up over time</text>
  <text x="110" y="182" text-anchor="middle" fill="#EF9A9A" font-size="9.3" font-family="monospace">~10-15% replacement/min</text>
  <!-- Legend -->
  <rect x="40" y="265" width="620" height="30" rx="4" fill="rgba(13,17,23,0.8)" stroke="#455A64" stroke-width="1"/>
  <text x="350" y="283" text-anchor="middle" fill="#90A4AE" font-size="10.7" font-family="monospace">Automation: production -> ILS -> launcher -> orbit</text>
</svg>
