<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" style="max-width:100%;height:auto;background:#0d1a2e;border-radius:8px;font-family:'Segoe UI',system-ui,sans-serif;">
  <defs>
    <filter id="glowG">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22c55e" flood-opacity="0.6"/>
    </filter>
    <filter id="glowB">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#3b82f6" flood-opacity="0.5"/>
    </filter>
    <filter id="glowP">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#a855f7" flood-opacity="0.5"/>
    </filter>
    <filter id="glowY">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#eab308" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#0f1d33"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#e8edf5" font-size="16" font-weight="700">1/sec Green Matrix - Production Line</text>

  <!-- ===== Column 1: Ingredients ===== -->
  <!-- Processor card -->
  <rect x="30" y="55" width="190" height="230" rx="6" fill="#0f1d33" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="30" y="55" width="190" height="36" rx="6" fill="#1e3a5a" opacity="0.5"/>
  <text x="125" y="78" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700"> Processors</text>
  <!-- Processor icon -->
  <rect x="80" y="100" width="90" height="90" rx="6" fill="#0a1628" stroke="#3b82f6" stroke-opacity="0.2"/>
  <text x="125" y="140" text-anchor="middle" fill="#e8edf5" font-size="28" font-weight="700"></text>
  <text x="125" y="160" text-anchor="middle" fill="#8b95ad" font-size="11">Assembler Mk.II</text>
  <line x1="30" y1="200" x2="220" y2="200" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="0.5"/>
  <text x="125" y="220" text-anchor="middle" fill="#6b7c93" font-size="11">Required</text>
  <text x="125" y="242" text-anchor="middle" fill="#60a5fa" font-size="28" font-weight="800">12</text>
  <text x="125" y="262" text-anchor="middle" fill="#8b95ad" font-size="11">Assemblers</text>
  <text x="125" y="278" text-anchor="middle" fill="#6b7c93" font-size="10">Circuit + Silicon</text>

  <!-- Casimir card -->
  <rect x="240" y="55" width="190" height="230" rx="6" fill="#0f1d33" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="240" y="55" width="190" height="36" rx="6" fill="#2a1a4a" opacity="0.5"/>
  <text x="335" y="78" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="700"> Casimir Crystals</text>
  <!-- Casimir icon -->
  <rect x="290" y="100" width="90" height="90" rx="6" fill="#0a1628" stroke="#a855f7" stroke-opacity="0.2"/>
  <text x="335" y="140" text-anchor="middle" fill="#e8edf5" font-size="28" font-weight="700"></text>
  <text x="335" y="160" text-anchor="middle" fill="#8b95ad" font-size="11">Assembler Mk.II</text>
  <line x1="240" y1="200" x2="430" y2="200" stroke="#a855f7" stroke-opacity="0.15" stroke-width="0.5"/>
  <text x="335" y="220" text-anchor="middle" fill="#6b7c93" font-size="11">Required</text>
  <text x="335" y="242" text-anchor="middle" fill="#c084fc" font-size="28" font-weight="800">6</text>
  <text x="335" y="262" text-anchor="middle" fill="#8b95ad" font-size="11">Assemblers</text>
  <text x="335" y="278" text-anchor="middle" fill="#6b7c93" font-size="10">H2 + Graphene + Ti</text>

  <!-- EM Turbine card -->
  <rect x="450" y="55" width="190" height="230" rx="6" fill="#0f1d33" stroke="#eab308" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="450" y="55" width="190" height="36" rx="6" fill="#3a3010" opacity="0.5"/>
  <text x="545" y="78" text-anchor="middle" fill="#facc15" font-size="13" font-weight="700"> EM Turbines</text>
  <!-- EM Turbine icon -->
  <rect x="500" y="100" width="90" height="90" rx="6" fill="#0a1628" stroke="#eab308" stroke-opacity="0.2"/>
  <text x="545" y="140" text-anchor="middle" fill="#e8edf5" font-size="28" font-weight="700"></text>
  <text x="545" y="160" text-anchor="middle" fill="#8b95ad" font-size="11">Assembler Mk.II</text>
  <line x1="450" y1="200" x2="640" y2="200" stroke="#eab308" stroke-opacity="0.15" stroke-width="0.5"/>
  <text x="545" y="220" text-anchor="middle" fill="#6b7c93" font-size="11">Required</text>
  <text x="545" y="242" text-anchor="middle" fill="#facc15" font-size="28" font-weight="800">5</text>
  <text x="545" y="262" text-anchor="middle" fill="#8b95ad" font-size="11">Assemblers</text>
  <text x="545" y="278" text-anchor="middle" fill="#6b7c93" font-size="10">Motors + Coils</text>

  <!-- ===== Arrow & Result ===== -->
  <!-- Arrow -->
  <line x1="653" y1="170" x2="703" y2="170" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Green Matrix Result card -->
  <rect x="680" y="55" width="190" height="230" rx="6" fill="#0f1d33" stroke="#22c55e" stroke-opacity="0.4" stroke-width="2" filter="url(#glowG)"/>
  <rect x="680" y="55" width="190" height="36" rx="6" fill="#0a2a1a" opacity="0.6"/>
  <text x="775" y="78" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700"> Green Matrix</text>
  <!-- Green Matrix icon -->
  <rect x="730" y="100" width="90" height="90" rx="6" fill="#0a2a1a" stroke="#22c55e" stroke-opacity="0.3" filter="url(#glowG)"/>
  <text x="775" y="145" text-anchor="middle" fill="#22c55e" font-size="34" font-weight="700">*</text>
  <line x1="680" y1="200" x2="870" y2="200" stroke="#22c55e" stroke-opacity="0.15" stroke-width="0.5"/>
  <text x="775" y="220" text-anchor="middle" fill="#6b7c93" font-size="11">Output</text>
  <text x="775" y="242" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="800">1/sec</text>
  <text x="775" y="262" text-anchor="middle" fill="#8b95ad" font-size="11">-&gt; Labs</text>
  <text x="775" y="278" text-anchor="middle" fill="#6b7c93" font-size="10">Consumed as Gravity Matrix</text>

  <!-- Bottom summary bar -->
  <rect x="30" y="298" width="840" height="2" rx="1" fill="#8b95ad" opacity="0.15"/>
  <text x="450" y="312" text-anchor="middle" fill="#6b7c93" font-size="11"> 12x Assemblers  |   6x Assemblers  |   5x Assemblers  |   3x Labs</text>
</svg>
