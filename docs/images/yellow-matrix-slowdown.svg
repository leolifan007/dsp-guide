<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">

<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1a1a2e"/>
    <stop offset="100%" style="stop-color:#16213e"/>
  </linearGradient>
  <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#c0392b"/>
    <stop offset="100%" style="stop-color:#e74c3c"/>
  </linearGradient>
  <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#27ae60"/>
    <stop offset="100%" style="stop-color:#2ecc71"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#2980b9"/>
    <stop offset="100%" style="stop-color:#3498db"/>
  </linearGradient>
  <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#d4a020"/>
    <stop offset="100%" style="stop-color:#f0c040"/>
  </linearGradient>
  <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#8e44ad"/>
    <stop offset="100%" style="stop-color:#9b59b6"/>
  </linearGradient>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
  </filter>
  <marker id="arrowYell" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d4a020"/>
  </marker>
  <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
  </marker>
  <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
  </marker>
  <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
  </marker>
</defs>
  <rect width="800" height="400" fill="url(#bg)" rx="8"/>
  <text x="400" y="28" font-family="Arial,sans-serif" font-size="18.7" fill="#aac" text-anchor="middle" font-weight="bold">YELLOW MATRIX SLOWDOWN - THE BUFFER COLLAPSE</text>
  <line x1="50" y1="38" x2="750" y2="38" stroke="#334" stroke-width="1"/>

  <!-- Before / After comparison -->
  <text x="200" y="62" font-family="Arial,sans-serif" font-size="15" fill="#2ecc71" text-anchor="middle" font-weight="bold">BEFORE TECH UNLOCK</text>
  <text x="600" y="62" font-family="Arial,sans-serif" font-size="15" fill="#e74c3c" text-anchor="middle" font-weight="bold">AFTER TECH UNLOCK</text>

  <!-- BEFORE: buffers full -->
  <rect x="20" y="75" width="380" height="210" rx="6" fill="#1e2a1e" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  
  <rect x="35" y="90" width="100" height="40" rx="4" fill="#27ae60" opacity="0.2"/>
  <text x="85" y="105" font-family="Arial,sans-serif" font-size="12" fill="#2ecc71" text-anchor="middle" font-weight="bold">Titanium</text>
  <text x="85" y="120" font-family="Arial,sans-serif" font-size="10.7" fill="#aaa" text-anchor="middle">Full buffer</text>

  <rect x="160" y="90" width="100" height="40" rx="4" fill="#27ae60" opacity="0.2"/>
  <text x="210" y="105" font-family="Arial,sans-serif" font-size="12" fill="#2ecc71" text-anchor="middle" font-weight="bold">Processors</text>
  <text x="210" y="120" font-family="Arial,sans-serif" font-size="10.7" fill="#aaa" text-anchor="middle">Full buffer</text>

  <rect x="285" y="90" width="100" height="40" rx="4" fill="#27ae60" opacity="0.2"/>
  <text x="335" y="105" font-family="Arial,sans-serif" font-size="12" fill="#2ecc71" text-anchor="middle" font-weight="bold">Org. Crystals</text>
  <text x="335" y="120" font-family="Arial,sans-serif" font-size="10.7" fill="#aaa" text-anchor="middle">Full buffer</text>

  <!-- Belt -->
  <line x1="85" y1="145" x2="210" y2="145" stroke="#334" stroke-width="2"/>
  <line x1="210" y1="145" x2="335" y2="145" stroke="#334" stroke-width="2"/>

  <!-- Yellow Lab running -->
  <rect x="120" y="160" width="180" height="50" rx="6" fill="#2a2a1e" stroke="#f0c040" stroke-width="1.5"/>
  <text x="210" y="183" font-family="Arial,sans-serif" font-size="14" fill="#f0c040" text-anchor="middle" font-weight="bold">Yellow Matrix Lab</text>
  <text x="210" y="200" font-family="Arial,sans-serif" font-size="12" fill="#2ecc71" text-anchor="middle">Running at 100%</text>

  <!-- Research -->
  <rect x="100" y="225" width="220" height="45" rx="6" fill="#1e2a3e" stroke="#3498db" stroke-width="1.5"/>
  <text x="210" y="245" font-family="Arial,sans-serif" font-size="13" fill="#3498db" text-anchor="middle" font-weight="bold">Research Active</text>
  <text x="210" y="262" font-family="Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Smooth, uninterrupted</text>

  <!-- AFTER: buffers drain -->
  <rect x="410" y="75" width="380" height="210" rx="6" fill="#3a2020" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>

  <rect x="425" y="90" width="100" height="40" rx="4" fill="#e74c3c" opacity="0.15"/>
  <text x="475" y="105" font-family="Arial,sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">Titanium</text>
  <text x="475" y="120" font-family="Arial,sans-serif" font-size="10.7" fill="#f88" text-anchor="middle">DRAINING</text>

  <rect x="550" y="90" width="100" height="40" rx="4" fill="#c0392b" opacity="0.2"/>
  <text x="600" y="105" font-family="Arial,sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">Processors</text>
  <text x="600" y="120" font-family="Arial,sans-serif" font-size="10.7" fill="#f88" text-anchor="middle">DRAINING</text>

  <rect x="675" y="90" width="100" height="40" rx="4" fill="#e74c3c" opacity="0.15"/>
  <text x="725" y="105" font-family="Arial,sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">Org. Crystals</text>
  <text x="725" y="120" font-family="Arial,sans-serif" font-size="10.7" fill="#f88" text-anchor="middle">DRAINING</text>

  <line x1="425" y1="145" x2="640" y2="145" stroke="#334" stroke-width="2"/>
  <line x1="640" y1="145" x2="725" y2="145" stroke="#334" stroke-width="2"/>

  <!-- New tech building consuming processors -->
  <rect x="530" y="155" width="160" height="40" rx="6" fill="#3a2020" stroke="#e74c3c" stroke-width="2"/>
  <text x="610" y="175" font-family="Arial,sans-serif" font-size="13" fill="#e74c3c" text-anchor="middle" font-weight="bold">NEW TECH BUILDING</text>
  <text x="610" y="190" font-family="Arial,sans-serif" font-size="11" fill="#ccc" text-anchor="middle">Also consuming processors!</text>

  <!-- Label: shared belt -->
  <line x1="475" y1="145" x2="475" y2="158" stroke="#e74c3c" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="475" y="172" font-family="Arial,sans-serif" font-size="10.7" fill="#e74c3c" text-anchor="middle">Shared belt!</text>

  <!-- Yellow lab stopping -->
  <rect x="500" y="200" width="180" height="50" rx="6" fill="#3a2020" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="590" y="223" font-family="Arial,sans-serif" font-size="14" fill="#e74c3c" text-anchor="middle" font-weight="bold">Yellow Matrix Lab</text>
  <text x="590" y="240" font-family="Arial,sans-serif" font-size="12" fill="#f88" text-anchor="middle">STALLED (no input)</text>

  <rect x="480" y="262" width="220" height="20" rx="4" fill="#c0392b" opacity="0.5"/>
  <text x="590" y="276" font-family="Arial,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">RESEARCH STOPS</text>

  <!-- Solutions at bottom -->
  <rect x="80" y="305" width="640" height="80" rx="6" fill="#1e2a1e" stroke="#27ae60" stroke-width="1.5"/>
  <text x="400" y="328" font-family="Arial,sans-serif" font-size="16" fill="#2ecc71" text-anchor="middle" font-weight="bold">SOLUTION: ADD BUFFERS + OVERBUILD PRODUCTION</text>
  <text x="400" y="348" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">1. Add 200-500 item storage boxes at each ingredient production step (absorbs 10-30 min of fluctuation)</text>
  <text x="400" y="365" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">2. Overbuild yellow matrix production by 50% (6-8 labs instead of 4) to handle tech-building material drain</text>
  <text x="400" y="382" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">Bonus: Research techs in batches instead of one at a time to reduce re-stabilization cycles</text>
</svg>