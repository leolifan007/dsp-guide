<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <defs>
    <marker id="arrIn" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8D6E63"/>
    </marker>
    <marker id="arrOut" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#66BB6A"/>
    </marker>
    <marker id="arrBelt" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#F9A825"/>
    </marker>
    <linearGradient id="minerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
    <linearGradient id="beltGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F57F17"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="smelterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="ingotGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4E342E"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <linearGradient id="busGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01579B"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="360" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#ECEFF1" font-size="16" font-family="monospace" font-weight="bold">SMELTING COLUMN LAYOUT — 3 SMELTERS / MK.III BELT</text>

  <!-- MINERS (Left) -->
  <rect x="30" y="50" width="100" height="50" rx="6" fill="url(#minerGrad)" stroke="#90A4AE" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="68" text-anchor="middle" fill="#ECEFF1" font-size="11" font-family="monospace" font-weight="bold">MINER ×3</text>
  <text x="80" y="82" text-anchor="middle" fill="#B0BEC5" font-size="9" font-family="monospace">Iron Ore Veins</text>
  <text x="80" y="95" text-anchor="middle" fill="#FFD54F" font-size="9" font-family="monospace">1 ore/s each</text>

  <!-- Ore Belts (3 lanes) -->
  <!-- Lane 1 -->
  <line x1="130" y1="72" x2="195" y2="72" stroke="#8D6E63" stroke-width="3" marker-end="url(#arrIn)"/>
  <text x="162" y="67" text-anchor="middle" fill="#8D6E63" font-size="8" font-family="monospace">Ore</text>
  <!-- Lane 2 -->
  <line x1="130" y1="80" x2="195" y2="80" stroke="#8D6E63" stroke-width="3" marker-end="url(#arrIn)"/>
  <!-- Lane 3 -->
  <line x1="130" y1="88" x2="195" y2="88" stroke="#8D6E63" stroke-width="3" marker-end="url(#arrIn)"/>

  <!-- BELT LABEL -->
  <rect x="140" y="100" width="70" height="22" rx="4" fill="#1a1a2e" stroke="#F9A825" stroke-width="1"/>
  <text x="175" y="115" text-anchor="middle" fill="#F9A825" font-size="10" font-family="monospace" font-weight="bold">MK.III BELT</text>
  <text x="175" y="127" text-anchor="middle" fill="#FFD54F" font-size="8.5" font-family="monospace">3 ore/s total</text>

  <!-- SMELTERS (Middle) -->
  <rect x="200" y="45" width="120" height="60" rx="6" fill="url(#smelterGrad)" stroke="#66BB6A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="66" text-anchor="middle" fill="#C8E6C9" font-size="12" font-family="monospace" font-weight="bold">SMELTER ×3</text>
  <text x="260" y="81" text-anchor="middle" fill="#A5D6A7" font-size="9.5" font-family="monospace">1 ore/s each</text>
  <text x="260" y="95" text-anchor="middle" fill="#81C784" font-size="9" font-family="monospace">→ 1 ingot/s each</text>

  <!-- Smelter detail icons -->
  <rect x="210" y="105" width="24" height="18" rx="3" fill="#33691E" stroke="#66BB6A" stroke-width="0.8"/>
  <rect x="238" y="105" width="24" height="18" rx="3" fill="#33691E" stroke="#66BB6A" stroke-width="0.8"/>
  <rect x="266" y="105" width="24" height="18" rx="3" fill="#33691E" stroke="#66BB6A" stroke-width="0.8"/>
  <text x="222" y="118" text-anchor="middle" fill="#A5D6A7" font-size="8" font-family="monospace">S1</text>
  <text x="250" y="118" text-anchor="middle" fill="#A5D6A7" font-size="8" font-family="monospace">S2</text>
  <text x="278" y="118" text-anchor="middle" fill="#A5D6A7" font-size="8" font-family="monospace">S3</text>

  <!-- Output Belts (3 lanes) -->
  <line x1="320" y1="72" x2="400" y2="72" stroke="#66BB6A" stroke-width="3" marker-end="url(#arrOut)"/>
  <line x1="320" y1="80" x2="400" y2="80" stroke="#66BB6A" stroke-width="3"/>
  <line x1="320" y1="88" x2="400" y2="88" stroke="#66BB6A" stroke-width="3"/>

  <!-- OUTPUT BELT LABEL -->
  <rect x="335" y="100" width="70" height="22" rx="4" fill="#1a1a2e" stroke="#66BB6A" stroke-width="1"/>
  <text x="370" y="115" text-anchor="middle" fill="#66BB6A" font-size="10" font-family="monospace" font-weight="bold">OUT BELT</text>
  <text x="370" y="127" text-anchor="middle" fill="#A5D6A7" font-size="8.5" font-family="monospace">3 ingots/s</text>

  <!-- INGOT DESTINATION -->
  <rect x="410" y="50" width="110" height="50" rx="6" fill="url(#ingotGrad)" stroke="#8D6E63" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="465" y="68" text-anchor="middle" fill="#D7CCC8" font-size="11" font-family="monospace" font-weight="bold">IRON INGOTS</text>
  <text x="465" y="82" text-anchor="middle" fill="#BCAAA4" font-size="9" font-family="monospace">→ Factory Bus</text>
  <text x="465" y="95" text-anchor="middle" fill="#FFD54F" font-size="9" font-family="monospace">Or → ILS Export</text>

  <!-- BUS ARROW -->
  <line x1="520" y1="75" x2="600" y2="75" stroke="#29B6F6" stroke-width="2.5" marker-end="url(#arrBelt)" stroke-dasharray="6,3"/>
  <text x="560" y="68" text-anchor="middle" fill="#29B6F6" font-size="9" font-family="monospace">PRODUCTION BUS</text>

  <!-- RATIO TABLE (Bottom) -->
  <rect x="30" y="180" width="740" height="160" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Table Header -->
  <rect x="30" y="180" width="740" height="32" rx="8" fill="#21262d"/>
  <text x="400" y="201" text-anchor="middle" fill="#ECEFF1" font-size="13" font-family="monospace" font-weight="bold">SMELTING RATIO REFERENCE</text>

  <!-- Column Headers -->
  <text x="100" y="225" text-anchor="middle" fill="#8D6E63" font-size="11" font-family="monospace" font-weight="bold">BELT TIER</text>
  <text x="260" y="225" text-anchor="middle" fill="#66BB6A" font-size="11" font-family="monospace" font-weight="bold">THROUGHPUT</text>
  <text x="420" y="225" text-anchor="middle" fill="#29B6F6" font-size="11" font-family="monospace" font-weight="bold">SMELTERS/BELT</text>
  <text x="580" y="225" text-anchor="middle" fill="#FFD54F" font-size="11" font-family="monospace" font-weight="bold">MINERS NEEDED</text>
  <text x="700" y="225" text-anchor="middle" fill="#CE93D8" font-size="11" font-family="monospace" font-weight="bold">SETUP</text>

  <!-- Row 1: Mk.I -->
  <rect x="40" y="235" width="120" height="28" rx="4" fill="#3E2723" stroke="#8D6E63" stroke-width="0.8"/>
  <text x="100" y="250" text-anchor="middle" fill="#D7CCC8" font-size="11" font-family="monospace">Mk.I (Yellow)</text>

  <rect x="170" y="235" width="120" height="28" rx="4" fill="#1B5E20" stroke="#66BB6A" stroke-width="0.8"/>
  <text x="230" y="250" text-anchor="middle" fill="#C8E6C9" font-size="11" font-family="monospace">1 ore/s</text>

  <rect x="300" y="235" width="120" height="28" rx="4" fill="#01579B" stroke="#29B6F6" stroke-width="0.8"/>
  <text x="360" y="250" text-anchor="middle" fill="#B3E5FC" font-size="11" font-family="monospace">1 smelter</text>

  <rect x="430" y="235" width="120" height="28" rx="4" fill="#F57F17" stroke="#FFD54F" stroke-width="0.8"/>
  <text x="490" y="250" text-anchor="middle" fill="#FFF8E1" font-size="11" font-family="monospace">1 miner</text>

  <rect x="560" y="235" width="200" height="28" rx="4" fill="#4A148C" stroke="#CE93D8" stroke-width="0.8"/>
  <text x="660" y="250" text-anchor="middle" fill="#E1BEE7" font-size="10" font-family="monospace">Basic (early game)</text>

  <!-- Row 2: Mk.II -->
  <rect x="40" y="270" width="120" height="28" rx="4" fill="#3E2723" stroke="#8D6E63" stroke-width="0.8"/>
  <text x="100" y="285" text-anchor="middle" fill="#D7CCC8" font-size="11" font-family="monospace">Mk.II (Red)</text>

  <rect x="170" y="270" width="120" height="28" rx="4" fill="#1B5E20" stroke="#66BB6A" stroke-width="0.8"/>
  <text x="230" y="285" text-anchor="middle" fill="#C8E6C9" font-size="11" font-family="monospace">2 ore/s</text>

  <rect x="300" y="270" width="120" height="28" rx="4" fill="#01579B" stroke="#29B6F6" stroke-width="0.8"/>
  <text x="360" y="285" text-anchor="middle" fill="#B3E5FC" font-size="11" font-family="monospace">2 smelters</text>

  <rect x="430" y="270" width="120" height="28" rx="4" fill="#F57F17" stroke="#FFD54F" stroke-width="0.8"/>
  <text x="490" y="285" text-anchor="middle" fill="#FFF8E1" font-size="11" font-family="monospace">2 miners</text>

  <rect x="560" y="270" width="200" height="28" rx="4" fill="#4A148C" stroke="#CE93D8" stroke-width="0.8"/>
  <text x="660" y="285" text-anchor="middle" fill="#E1BEE7" font-size="10" font-family="monospace">Standard (mid game)</text>

  <!-- Row 3: Mk.III -->
  <rect x="40" y="305" width="120" height="28" rx="4" fill="#3E2723" stroke="#8D6E63" stroke-width="0.8"/>
  <text x="100" y="320" text-anchor="middle" fill="#D7CCC8" font-size="11" font-family="monospace">Mk.III (Blue)</text>

  <rect x="170" y="305" width="120" height="28" rx="4" fill="#1B5E20" stroke="#66BB6A" stroke-width="0.8"/>
  <text x="230" y="320" text-anchor="middle" fill="#C8E6C9" font-size="11" font-family="monospace">3 ore/s</text>

  <rect x="300" y="305" width="120" height="28" rx="4" fill="#01579B" stroke="#29B6F6" stroke-width="0.8"/>
  <text x="360" y="320" text-anchor="middle" fill="#B3E5FC" font-size="11" font-family="monospace">3 smelters</text>

  <rect x="430" y="305" width="120" height="28" rx="4" fill="#F57F17" stroke="#FFD54F" stroke-width="0.8"/>
  <text x="490" y="320" text-anchor="middle" fill="#FFF8E1" font-size="11" font-family="monospace">3 miners</text>

  <rect x="560" y="305" width="200" height="28" rx="4" fill="#1B5E20" stroke="#66BB6A" stroke-width="1"/>
  <text x="660" y="320" text-anchor="middle" fill="#C8E6C9" font-size="10" font-family="monospace" font-weight="bold">✓ Recommended</text>

  <!-- Pro Tip -->
  <rect x="30" y="305" width="740" height="1" fill="#30363d"/>
  <text x="50" y="340" fill="#FFD54F" font-size="10" font-family="monospace">⚠ TIP:  Always build smelting columns with Mk.III ratios (3:3:3) even if you only need 1 smelter now — adding more later is expensive. Undersmelt and your refinery backs up.</text>

  <!-- Color Legend (top right) -->
  <rect x="620" y="8" width="170" height="18" rx="4" fill="rgba(13,17,23,0.85)" stroke="#455A64" stroke-width="0.8"/>
  <rect x="628" y="12" width="12" height="10" rx="2" fill="#8D6E63"/><text x="645" y="20" fill="#B0BEC5" font-size="8.5" font-family="monospace">Ore In</text>
  <rect x="695" y="12" width="12" height="10" rx="2" fill="#66BB6A"/><text x="712" y="20" fill="#B0BEC5" font-size="8.5" font-family="monospace">Ingot Out</text>
</svg>