<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 140" width="620" height="140">
  <defs>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#FFB300"/>
    </marker>
    <marker id="aOut" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#4FC3F7"/>
    </marker>
    <filter id="ds5"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <rect width="620" height="140" fill="#0d1117" rx="8"/>

  <text x="310" y="22" text-anchor="middle" fill="#8B949E" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,monospace" letter-spacing="1">SMELTER ROW — ADJACENT PLACEMENT</text>

  <!-- Belt (left) -->
  <rect x="30" y="40" width="50" height="70" rx="6" fill="#E65100" stroke="#FFB300" stroke-width="1" filter="url(#ds5)"/>
  <text x="55" y="70" text-anchor="middle" fill="#FFF8E1" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,monospace">BELT</text>
  <text x="55" y="84" text-anchor="middle" fill="#FFE082" font-size="8" font-family="Inter,Segoe UI,monospace">Ore in</text>
  <text x="55" y="96" text-anchor="middle" fill="#FFB74D" font-size="8" font-family="Inter,Segoe UI,monospace">→</text>

  <!-- Arrows to smelters -->
  <line x1="80" y1="60" x2="120" y2="60" stroke="#FFB300" stroke-width="2" marker-end="url(#aB)"/>
  <line x1="80" y1="78" x2="120" y2="78" stroke="#FFB300" stroke-width="2" marker-end="url(#aB)"/>
  <line x1="80" y1="96" x2="120" y2="96" stroke="#FFB300" stroke-width="2" marker-end="url(#aB)"/>

  <!-- Smelter 1 -->
  <rect x="123" y="38" width="90" height="80" rx="8" fill="#1B5E20" stroke="#66BB6A" stroke-width="1.2" filter="url(#ds5)"/>
  <text x="168" y="62" text-anchor="middle" fill="#E8F5E9" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,sans-serif">🔥 S1</text>
  <text x="168" y="78" text-anchor="middle" fill="#A5D6A7" font-size="9" font-family="Inter,Segoe UI,monospace">1 ore/s</text>
  <text x="168" y="92" text-anchor="middle" fill="#81C784" font-size="9" font-family="Inter,Segoe UI,monospace">→ ingot</text>
  <text x="168" y="108" text-anchor="middle" fill="#66BB6A" font-size="8" font-family="Inter,Segoe UI,monospace">↓</text>

  <!-- Smelter 2 -->
  <rect x="223" y="38" width="90" height="80" rx="8" fill="#1B5E20" stroke="#66BB6A" stroke-width="1.2" filter="url(#ds5)"/>
  <text x="268" y="62" text-anchor="middle" fill="#E8F5E9" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,sans-serif">🔥 S2</text>
  <text x="268" y="78" text-anchor="middle" fill="#A5D6A7" font-size="9" font-family="Inter,Segoe UI,monospace">1 ore/s</text>
  <text x="268" y="92" text-anchor="middle" fill="#81C784" font-size="9" font-family="Inter,Segoe UI,monospace">→ ingot</text>
  <text x="268" y="108" text-anchor="middle" fill="#66BB6A" font-size="8" font-family="Inter,Segoe UI,monospace">↓</text>

  <!-- Smelter 3 -->
  <rect x="323" y="38" width="90" height="80" rx="8" fill="#1B5E20" stroke="#66BB6A" stroke-width="1.2" filter="url(#ds5)"/>
  <text x="368" y="62" text-anchor="middle" fill="#E8F5E9" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,sans-serif">🔥 S3</text>
  <text x="368" y="78" text-anchor="middle" fill="#A5D6A7" font-size="9" font-family="Inter,Segoe UI,monospace">1 ore/s</text>
  <text x="368" y="92" text-anchor="middle" fill="#81C784" font-size="9" font-family="Inter,Segoe UI,monospace">→ ingot</text>
  <text x="368" y="108" text-anchor="middle" fill="#66BB6A" font-size="8" font-family="Inter,Segoe UI,monospace">↓</text>

  <!-- Output Belt -->
  <line x1="168" y1="118" x2="500" y2="118" stroke="#4FC3F7" stroke-width="3" marker-end="url(#aOut)"/>
  <rect x="430" y="105" width="100" height="20" rx="5" fill="#01579B" stroke="#4FC3F7" stroke-width="0.8"/>
  <text x="480" y="119" text-anchor="middle" fill="#B3E5FC" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">OUTPUT BELT →</text>

  <!-- Label -->
  <text x="310" y="135" text-anchor="middle" fill="#8B949E" font-size="8" font-family="Inter,Segoe UI,monospace">Smelters snap to grid — place adjacent to belt, output flows downward</text>
</svg>