<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" font-family="Rajdhani, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="320" fill="url(#bg)" rx="12"/>

  <!-- Left accent line -->
  <rect x="0" y="0" width="4" height="320" fill="url(#lineGlow)" opacity="0.6"/>

  <!-- Title -->
  <text x="24" y="38" fill="#fbbf24" font-size="16" font-weight="700">BUILD CHECKLIST - 1/SEC GREEN MATRIX</text>
  <text x="24" y="56" fill="#9ca3af" font-size="12">Total: 3 Green Matrix/sec from 3 labs (target 1/sec actual consumption)</text>

  <!-- Divider -->
  <line x1="24" y1="66" x2="736" y2="66" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>

  <!-- Column 1: Processors -->
  <text x="24" y="90" fill="#e5e7eb" font-size="13" font-weight="600">Step 1: Processor Factory</text>
  <rect x="24" y="98" width="230" height="96" rx="8" fill="rgba(30,41,59,0.6)" stroke="rgba(255,255,255,0.08)"/>
  <text x="36" y="118" fill="#e5e7eb" font-size="12">Circuit Board x15 Mk.I Assm.</text>
  <text x="36" y="136" fill="#e5e7eb" font-size="12">Silicon Smelting x12 Furnaces</text>
  <text x="36" y="154" fill="#e5e7eb" font-size="12">Processor x18 Mk.I Assm. (x12 Mk.II)</text>
  <text x="36" y="172" fill="#9ca3af" font-size="11">-&gt; 4 Processors/sec throughput</text>
  <text x="36" y="188" fill="#6ee7b7" font-size="11">[OK] Reuses your existing yellow line</text>

  <!-- Column 2: Casimir -->
  <text x="270" y="90" fill="#e5e7eb" font-size="13" font-weight="600">Step 2: Casimir Production</text>
  <rect x="270" y="98" width="230" height="96" rx="8" fill="rgba(30,41,59,0.6)" stroke="rgba(255,255,255,0.08)"/>
  <text x="282" y="118" fill="#e5e7eb" font-size="12">Orbital Collectors x20 (gas giant)</text>
  <text x="282" y="136" fill="#e5e7eb" font-size="12">Graphene x10 Chemical Plants</text>
  <text x="282" y="154" fill="#e5e7eb" font-size="12">Titanium Plate x6 Smelters</text>
  <text x="282" y="172" fill="#e5e7eb" font-size="12">Casimir Crystal x12 Assm. Mk.II</text>
  <text x="282" y="188" fill="#e5e7eb" font-size="11">Hydrogen needed: ~8/sec</text>

  <!-- Column 3: EM Turbine + Assembly -->
  <text x="516" y="90" fill="#e5e7eb" font-size="13" font-weight="600">Step 3: EM Turbine + Final</text>
  <rect x="516" y="98" width="220" height="96" rx="8" fill="rgba(30,41,59,0.6)" stroke="rgba(255,255,255,0.08)"/>
  <text x="528" y="118" fill="#e5e7eb" font-size="12">Electric Motor x10 Assm.</text>
  <text x="528" y="136" fill="#e5e7eb" font-size="12">Magnetic Coil x8 Assm.</text>
  <text x="528" y="154" fill="#e5e7eb" font-size="12">EM Turbine x6 Assm. Mk.II</text>
  <text x="528" y="172" fill="#e5e7eb" font-size="12">Green Matrix Lab x3</text>
  <text x="528" y="188" fill="#6ee7b7" font-size="11">Feed 2 belts; output to storage/ILS</text>

  <!-- Bottom bar: total power -->
  <rect x="24" y="208" width="712" height="40" rx="8" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.2)"/>
  <text x="36" y="234" fill="#fbbf24" font-size="13" font-weight="600">Required Power: ~8 MW</text>
  <text x="280" y="234" fill="#9ca3af" font-size="12">Belts: Mk.II or higher recommended</text>
  <text x="520" y="234" fill="#9ca3af" font-size="12">Build time: ~15 min</text>

  <!-- Bottom row: resources summary -->
  <text x="24" y="268" fill="#e5e7eb" font-size="13" font-weight="600">Total Materials / sec</text>
  <rect x="24" y="276" width="110" height="32" rx="6" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.2)"/>
  <text x="36" y="296" fill="#60a5fa" font-size="12" font-weight="600">4.5/sec Processor</text>
  <rect x="142" y="276" width="110" height="32" rx="6" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.2)"/>
  <text x="154" y="296" fill="#34d399" font-size="12" font-weight="600">3.5/sec Casimir</text>
  <rect x="260" y="276" width="110" height="32" rx="6" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.2)"/>
  <text x="272" y="296" fill="#a78bfa" font-size="12" font-weight="600">2.8/sec EM Turbine</text>
</svg>
