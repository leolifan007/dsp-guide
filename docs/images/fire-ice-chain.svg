<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 350" width="750" height="350">
  <defs>
    <marker id="arrIce" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#81D4FA"/>
    </marker>
    <marker id="arrWater" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#29B6F6"/>
    </marker>
    <marker id="arrDeut" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#AB47BC"/>
    </marker>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0277BD"/>
      <stop offset="100%" stop-color="#29B6F6"/>
    </linearGradient>
    <linearGradient id="deutGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6A1B9A"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="750" height="350" fill="#0d1117"/>
  <!-- Title -->
  <text x="375" y="25" text-anchor="middle" fill="#ECEFF1" font-size="17.3" font-family="monospace" font-weight="bold">FIRE ICE -&gt; DEUTERIUM PRODUCTION CHAIN</text>
  <!-- Planet indicator -->
  <rect x="30" y="45" width="140" height="30" rx="4" fill="rgba(3,169,244,0.15)" stroke="#29B6F6" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="100" y="64" text-anchor="middle" fill="#29B6F6" font-size="12" font-family="monospace"> COLD / VOLCANIC PLANET</text>
  <!-- Step 1: Fire Ice Extractor -->
  <rect x="60" y="90" width="130" height="70" rx="6" fill="url(#iceGrad)" stroke="#4FC3F7" stroke-width="1.5"/>
  <text x="125" y="115" text-anchor="middle" fill="#E1F5FE" font-size="13.3" font-family="monospace" font-weight="bold">FIRE ICE</text>
  <text x="125" y="130" text-anchor="middle" fill="#B3E5FC" font-size="10.7" font-family="monospace">EXTRACTOR</text>
  <text x="125" y="145" text-anchor="middle" fill="#81D4FA" font-size="9.3" font-family="monospace">Output: 1 Fire Ice/s</text>
  <!-- Arrow to Fractionator -->
  <line x1="190" y1="125" x2="250" y2="125" stroke="#81D4FA" stroke-width="2.5" marker-end="url(#arrIce)"/>
  <text x="220" y="118" fill="#81D4FA" font-size="9.3" font-family="monospace">Fire Ice</text>
  <!-- Step 2: Water Source -->
  <rect x="60" y="200" width="130" height="60" rx="6" fill="#01579B" stroke="#29B6F6" stroke-width="1.5"/>
  <text x="125" y="222" text-anchor="middle" fill="#B3E5FC" font-size="13.3" font-family="monospace" font-weight="bold">WATER SOURCE</text>
  <text x="125" y="237" text-anchor="middle" fill="#81D4FA" font-size="10.7" font-family="monospace">Ocean / Import</text>
  <text x="125" y="250" text-anchor="middle" fill="#4FC3F7" font-size="9.3" font-family="monospace">Need: 2 Water/s</text>
  <!-- Arrow to Fractionator -->
  <line x1="190" y1="230" x2="250" y2="165" stroke="#29B6F6" stroke-width="2" marker-end="url(#arrWater)"/>
  <text x="210" y="210" fill="#29B6F6" font-size="9.3" font-family="monospace">Water x2</text>
  <!-- Step 3: Deuterium Fractionator -->
  <rect x="250" y="90" width="170" height="85" rx="6" fill="url(#deutGrad)" stroke="#CE93D8" stroke-width="1.5"/>
  <text x="335" y="115" text-anchor="middle" fill="#F3E5F5" font-size="13.3" font-family="monospace" font-weight="bold">DEUTERIUM</text>
  <text x="335" y="130" text-anchor="middle" fill="#E1BEE7" font-size="10.7" font-family="monospace">FRACTIONATOR</text>
  <text x="335" y="148" text-anchor="middle" fill="#CE93D8" font-size="9.3" font-family="monospace">Fire Ice 1 + Water 2</text>
  <text x="335" y="162" text-anchor="middle" fill="#BA68C8" font-size="9.3" font-family="monospace">-&gt; Deuterium x0.5</text>
  <!-- Arrow to Tank -->
  <line x1="420" y1="125" x2="470" y2="125" stroke="#AB47BC" stroke-width="2.5" marker-end="url(#arrDeut)"/>
  <text x="445" y="118" fill="#AB47BC" font-size="9.3" font-family="monospace">Deut.</text>
  <!-- Step 4: Deuterium Tank -->
  <rect x="470" y="95" width="100" height="60" rx="6" fill="#4A148C" stroke="#AB47BC" stroke-width="1.5"/>
  <text x="520" y="118" text-anchor="middle" fill="#F3E5F5" font-size="13.3" font-family="monospace" font-weight="bold">DEUTERIUM</text>
  <text x="520" y="133" text-anchor="middle" fill="#E1BEE7" font-size="10.7" font-family="monospace">TANK</text>
  <text x="520" y="145" text-anchor="middle" fill="#CE93D8" font-size="9.3" font-family="monospace">Buffer</text>
  <!-- Arrow to ILS -->
  <line x1="570" y1="125" x2="620" y2="125" stroke="#AB47BC" stroke-width="2" marker-end="url(#arrDeut)"/>
  <!-- Step 5: ILS Export -->
  <rect x="620" y="85" width="110" height="80" rx="6" fill="#1E3A5F" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="675" y="108" text-anchor="middle" fill="#E3F2FD" font-size="13.3" font-family="monospace" font-weight="bold">ILS</text>
  <text x="675" y="123" text-anchor="middle" fill="#90CAF9" font-size="10.7" font-family="monospace">EXPORT</text>
  <text x="675" y="138" text-anchor="middle" fill="#64B5F6" font-size="9.3" font-family="monospace">To main factory</text>
  <text x="675" y="152" text-anchor="middle" fill="#42A5F5" font-size="9.3" font-family="monospace">Deuterium -&gt; Rocket Fuel</text>
  <!-- Output chain: Rocket Fuel -->
  <line x1="675" y1="165" x2="675" y2="200" stroke="#FF7043" stroke-width="2"/>
  <rect x="610" y="200" width="130" height="50" rx="6" fill="#BF360C" stroke="#FF7043" stroke-width="1.5"/>
  <text x="675" y="220" text-anchor="middle" fill="#FFCCBC" font-size="12" font-family="monospace" font-weight="bold">ROCKET FUEL</text>
  <text x="675" y="237" text-anchor="middle" fill="#FFAB91" font-size="9.3" font-family="monospace">Deuterium x2 + Coal</text>
  <!-- Water warning box -->
  <rect x="250" y="195" width="170" height="70" rx="4" fill="rgba(239,83,80,0.12)" stroke="#EF5350" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="335" y="215" text-anchor="middle" fill="#EF5350" font-size="12" font-family="monospace" font-weight="bold">[!] WATER CONSTRAINT</text>
  <text x="335" y="230" text-anchor="middle" fill="#EF9A9A" font-size="10.7" font-family="monospace">2 Water per 0.5 Deuterium</text>
  <text x="335" y="245" text-anchor="middle" fill="#EF9A9A" font-size="9.3" font-family="monospace">Plan water supply BEFORE scaling</text>
  <!-- Yellow Science link -->
  <line x1="675" y1="250" x2="675" y2="280" stroke="#FFD54F" stroke-width="2"/>
  <rect x="600" y="280" width="150" height="50" rx="4" fill="rgba(255,213,79,0.15)" stroke="#FFD54F" stroke-width="1"/>
  <text x="675" y="300" text-anchor="middle" fill="#FFD54F" font-size="12" font-family="monospace" font-weight="bold">YELLOW SCIENCE</text>
  <text x="675" y="315" text-anchor="middle" fill="#FFE082" font-size="9.3" font-family="monospace">Particle Broadband</text>
  <!-- Legend -->
  <rect x="30" y="290" width="200" height="50" rx="4" fill="rgba(13,17,23,0.9)" stroke="#455A64" stroke-width="1"/>
  <text x="40" y="308" fill="#ECEFF1" font-size="10.7" font-family="monospace" font-weight="bold">KEY</text>
  <line x1="40" y1="320" x2="70" y2="320" stroke="#81D4FA" stroke-width="2"/><text x="75" y="323" fill="#81D4FA" font-size="9.3" font-family="monospace">Fire Ice</text>
  <line x1="40" y1="332" x2="70" y2="332" stroke="#29B6F6" stroke-width="2"/><text x="75" y="335" fill="#29B6F6" font-size="9.3" font-family="monospace">Water (byproduct mgmt)</text>
  <line x1="130" y1="320" x2="160" y2="320" stroke="#AB47BC" stroke-width="2"/><text x="165" y="323" fill="#AB47BC" font-size="9.3" font-family="monospace">Deuterium</text>
  <line x1="130" y1="332" x2="160" y2="332" stroke="#FF7043" stroke-width="2"/><text x="165" y="335" fill="#FF7043" font-size="9.3" font-family="monospace">Rocket Fuel</text>
</svg>
