<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="oilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3E2723"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="h2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="plasticsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="grapheneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
    <linearGradient id="fuelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="520" fill="#080D14"/>
  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#ECEFF1" font-size="14" font-family="monospace" font-weight="bold">DSP OIL REFINING CHAIN</text>
  <!-- Row 1: Extractors -->
  <!-- EXTRACTOR 1 -->
  <rect x="60" y="60" width="100" height="55" rx="6" fill="#1B5E20" stroke="#43A047" stroke-width="1.5"/>
  <text x="110" y="82" text-anchor="middle" fill="#A5D6A7" font-size="9" font-family="monospace" font-weight="bold">OIL EXTRACTOR</text>
  <text x="110" y="97" text-anchor="middle" fill="#66BB6A" font-size="8" font-family="monospace">1 Crude Oil / s</text>
  <!-- EXTRACTOR 2 -->
  <rect x="60" y="130" width="100" height="55" rx="6" fill="#1B5E20" stroke="#43A047" stroke-width="1.5"/>
  <text x="110" y="152" text-anchor="middle" fill="#A5D6A7" font-size="9" font-family="monospace" font-weight="bold">OIL EXTRACTOR</text>
  <text x="110" y="167" text-anchor="middle" fill="#66BB6A" font-size="8" font-family="monospace">1 Crude Oil / s</text>
  <!-- EXTRACTOR 3 -->
  <rect x="60" y="200" width="100" height="55" rx="6" fill="#1B5E20" stroke="#43A047" stroke-width="1.5"/>
  <text x="110" y="222" text-anchor="middle" fill="#A5D6A7" font-size="9" font-family="monospace" font-weight="bold">OIL EXTRACTOR</text>
  <text x="110" y="237" text-anchor="middle" fill="#66BB6A" font-size="8" font-family="monospace">1 Crude Oil / s</text>
  <!-- Arrows: extractor → belt merge -->
  <line x1="160" y1="87" x2="220" y2="87" stroke="#388E3C" stroke-width="2" marker-end="url(#arrGrn)"/>
  <line x1="160" y1="157" x2="220" y2="157" stroke="#388E3C" stroke-width="2" marker-end="url(#arrGrn)"/>
  <line x1="160" y1="227" x2="220" y2="227" stroke="#388E3C" stroke-width="2" marker-end="url(#arrGrn)"/>
  <!-- Belt merge lines -->
  <line x1="220" y1="87" x2="240" y2="110" stroke="#388E3C" stroke-width="2"/>
  <line x1="220" y1="157" x2="240" y2="110" stroke="#388E3C" stroke-width="2"/>
  <line x1="240" y1="110" x2="260" y2="110" stroke="#388E3C" stroke-width="2"/>
  <line x1="240" y1="227" x2="260" y2="200" stroke="#388E3C" stroke-width="2"/>
  <!-- Belt to refinery -->
  <line x1="260" y1="110" x2="310" y2="110" stroke="#388E3C" stroke-width="3"/>
  <line x1="260" y1="200" x2="310" y2="180" stroke="#388E3C" stroke-width="3"/>
  <!-- Arrowheads -->
  <defs>
    <marker id="arrGrn" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#43A047"/>
    </marker>
    <marker id="arrH2" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#29B6F6"/>
    </marker>
    <marker id="arrOil" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#795548"/>
    </marker>
    <marker id="arrPlast" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#43A047"/>
    </marker>
    <marker id="arrFuel" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#FF7043"/>
    </marker>
  </defs>
  <!-- REFINERY 1: Standard -->
  <rect x="310" y="65" width="120" height="70" rx="6" fill="#5D4037" stroke="#8D6E63" stroke-width="1.5"/>
  <text x="370" y="88" text-anchor="middle" fill="#FFCCBC" font-size="9" font-family="monospace" font-weight="bold">REFINERY</text>
  <text x="370" y="100" text-anchor="middle" fill="#A1887F" font-size="7" font-family="monospace">Standard Recipe</text>
  <text x="370" y="112" text-anchor="middle" fill="#66BB6A" font-size="7" font-family="monospace">Oil 1/s → Ref.Oil 1/s</text>
  <text x="370" y="124" text-anchor="middle" fill="#29B6F6" font-size="7" font-family="monospace">+ H2 x0.5/s</text>
  <!-- REFINERY 2: Plastics -->
  <rect x="310" y="165" width="120" height="70" rx="6" fill="#2E7D32" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="370" y="188" text-anchor="middle" fill="#C8E6C9" font-size="9" font-family="monospace" font-weight="bold">REFINERY</text>
  <text x="370" y="200" text-anchor="middle" fill="#A5D6A7" font-size="7" font-family="monospace">Plastics Recipe</text>
  <text x="370" y="212" text-anchor="middle" fill="#66BB6A" font-size="7" font-family="monospace">Ref.Oil+Coal → Plastics</text>
  <text x="370" y="224" text-anchor="middle" fill="#29B6F6" font-size="7" font-family="monospace">+ H2 x0.5/s</text>
  <!-- H2 output arrows -->
  <line x1="430" y1="100" x2="470" y2="100" stroke="#29B6F6" stroke-width="2" marker-end="url(#arrH2)"/>
  <line x1="430" y1="200" x2="470" y2="200" stroke="#29B6F6" stroke-width="2" marker-end="url(#arrH2)"/>
  <!-- H2 merge -->
  <line x1="470" y1="100" x2="470" y2="140" stroke="#29B6F6" stroke-width="2"/>
  <line x1="470" y1="200" x2="470" y2="140" stroke="#29B6F6" stroke-width="2"/>
  <line x1="470" y1="140" x2="490" y2="140" stroke="#29B6F6" stroke-width="2"/>
  <!-- H2 TANK -->
  <rect x="490" y="110" width="55" height="60" rx="6" fill="#01579B" stroke="#29B6F6" stroke-width="1.5"/>
  <text x="517" y="134" text-anchor="middle" fill="#B3E5FC" font-size="8" font-family="monospace" font-weight="bold">H2</text>
  <text x="517" y="147" text-anchor="middle" fill="#B3E5FC" font-size="7" font-family="monospace">TANK</text>
  <text x="517" y="160" text-anchor="middle" fill="#81D4FA" font-size="6" font-family="monospace">(buffer)</text>
  <!-- Refined Oil output → Plastics Refinery + Fuel Refinery -->
  <!-- From Refinery 1: refined oil to Plastics and Fuel -->
  <line x1="430" y1="80" x2="470" y2="80" stroke="#795548" stroke-width="2" marker-end="url(#arrOil)"/>
  <line x1="430" y1="190" x2="470" y2="190" stroke="#795548" stroke-width="2" marker-end="url(#arrOil)"/>
  <!-- Plastics output arrow -->
  <line x1="430" y1="200" x2="470" y2="230" stroke="#43A047" stroke-width="2" marker-end="url(#arrPlast)"/>
  <!-- PLASTICS BOX -->
  <rect x="470" y="250" width="90" height="50" rx="6" fill="url(#plasticsGrad)" stroke="#43A047" stroke-width="1.5"/>
  <text x="515" y="270" text-anchor="middle" fill="#1B5E20" font-size="9" font-family="monospace" font-weight="bold">PLASTICS</text>
  <text x="515" y="283" text-anchor="middle" fill="#2E7D32" font-size="7" font-family="monospace">→ Circuit Boards</text>
  <text x="515" y="293" text-anchor="middle" fill="#2E7D32" font-size="7" font-family="monospace">→ Thrusters</text>
  <!-- REFINERY 3: Rocket Fuel -->
  <rect x="600" y="60" width="130" height="70" rx="6" fill="url(#fuelGrad)" stroke="#FF7043" stroke-width="1.5"/>
  <text x="665" y="83" text-anchor="middle" fill="#BF360C" font-size="9" font-family="monospace" font-weight="bold">REFINERY</text>
  <text x="665" y="95" text-anchor="middle" fill="#FF7043" font-size="7" font-family="monospace">Rocket Fuel Recipe</text>
  <text x="665" y="107" text-anchor="middle" fill="#FFAB91" font-size="7" font-family="monospace">Oil+Coal → Rocket Fuel</text>
  <text x="665" y="119" text-anchor="middle" fill="#FF7043" font-size="7" font-family="monospace">→ High-energy grid</text>
  <!-- H2 → Fuel Plants (left side) -->
  <line x1="517" y1="110" x2="517" y2="330" stroke="#29B6F6" stroke-width="2"/>
  <line x1="517" y1="330" x2="260" y2="330" stroke="#29B6F6" stroke-width="2"/>
  <!-- FUEL PLANT: Hydrogen -->
  <rect x="100" y="305" width="160" height="65" rx="6" fill="#01579B" stroke="#29B6F6" stroke-width="1.5"/>
  <text x="180" y="328" text-anchor="middle" fill="#B3E5FC" font-size="9" font-family="monospace" font-weight="bold">H2 FUEL PLANT</text>
  <text x="180" y="342" text-anchor="middle" fill="#81D4FA" font-size="8" font-family="monospace">H2 x1/s → 1.08 MW</text>
  <text x="180" y="356" text-anchor="middle" fill="#81D4FA" font-size="7" font-family="monospace">(consumes H2 byproduct)</text>
  <!-- Graphene chain (right side) -->
  <!-- H2 to Graphene -->
  <line x1="517" y1="170" x2="517" y2="420" stroke="#29B6F6" stroke-width="2"/>
  <line x1="517" y1="420" x2="570" y2="420" stroke="#29B6F6" stroke-width="2" marker-end="url(#arrH2)"/>
  <line x1="570" y1="420" x2="570" y2="350" stroke="#795548" stroke-width="2" marker-end="url(#arrOil)"/>
  <!-- Coal to Graphene -->
  <rect x="540" y="360" width="80" height="50" rx="6" fill="#37474F" stroke="#90A4AE" stroke-width="1.5"/>
  <text x="580" y="380" text-anchor="middle" fill="#ECEFF1" font-size="8" font-family="monospace" font-weight="bold">COAL</text>
  <text x="580" y="393" text-anchor="middle" fill="#B0BEC5" font-size="7" font-family="monospace">from mines</text>
  <line x1="580" y1="360" x2="580" y2="350" stroke="#90A4AE" stroke-width="2"/>
  <!-- Graphene Refinery -->
  <rect x="570" y="290" width="90" height="60" rx="6" fill="url(#grapheneGrad)" stroke="#F57F17" stroke-width="1.5"/>
  <text x="615" y="312" text-anchor="middle" fill="#4E342E" font-size="8" font-family="monospace" font-weight="bold">REFINERY</text>
  <text x="615" y="324" text-anchor="middle" fill="#795548" font-size="7" font-family="monospace">Graphene Recipe</text>
  <text x="615" y="336" text-anchor="middle" fill="#795548" font-size="7" font-family="monospace">Coal+Oil → Graphene</text>
  <text x="615" y="348" text-anchor="middle" fill="#795548" font-size="6" font-family="monospace">+ H2 output</text>
  <!-- Graphene output -->
  <line x1="660" y1="320" x2="720" y2="320" stroke="#F57F17" stroke-width="2" marker-end="url(#arrGrn)"/>
  <rect x="720" y="295" width="70" height="50" rx="6" fill="url(#grapheneGrad)" stroke="#F57F17" stroke-width="1.5"/>
  <text x="755" y="314" text-anchor="middle" fill="#4E342E" font-size="9" font-family="monospace" font-weight="bold">GRAPHENE</text>
  <text x="755" y="328" text-anchor="middle" fill="#795548" font-size="7" font-family="monospace">Sails / BP</text>
  <!-- Rocket Fuel arrow -->
  <line x1="730" y1="95" x2="730" y2="180" stroke="#FF7043" stroke-width="2" marker-end="url(#arrFuel)"/>
  <rect x="700" y="180" width="60" height="40" rx="6" fill="url(#fuelGrad)" stroke="#FF7043" stroke-width="1.5"/>
  <text x="730" y="197" text-anchor="middle" fill="#BF360C" font-size="8" font-family="monospace" font-weight="bold">ROCKET</text>
  <text x="730" y="209" text-anchor="middle" fill="#FF7043" font-size="7" font-family="monospace">FUEL</text>
  <!-- Refined oil to Rocket Fuel Refinery (from Refinery 1) -->
  <line x1="470" y1="80" x2="600" y2="95" stroke="#795548" stroke-width="2" marker-end="url(#arrOil)"/>
  <!-- Coal to Rocket Fuel -->
  <line x1="530" y1="395" x2="620" y2="115" stroke="#795548" stroke-width="2" marker-end="url(#arrOil)"/>
  <!-- Legend -->
  <rect x="15" y="390" width="220" height="120" rx="6" fill="rgba(8,13,20,0.9)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
  <text x="25" y="408" fill="#ECEFF1" font-size="9" font-family="monospace" font-weight="bold">KEY FLOW</text>
  <line x1="25" y1="422" x2="65" y2="422" stroke="#388E3C" stroke-width="2"/><text x="72" y="425" fill="#66BB6A" font-size="8" font-family="monospace">Crude Oil belt</text>
  <line x1="25" y1="440" x2="65" y2="440" stroke="#795548" stroke-width="2"/><text x="72" y="443" fill="#A1887F" font-size="8" font-family="monospace">Refined Oil belt</text>
  <line x1="25" y1="458" x2="65" y2="458" stroke="#29B6F6" stroke-width="2"/><text x="72" y="461" fill="#29B6F6" font-size="8" font-family="monospace">Hydrogen pipe/belt</text>
  <line x1="25" y1="476" x2="65" y2="476" stroke="#F57F17" stroke-width="2"/><text x="72" y="479" fill="#F57F17" font-size="8" font-family="monospace">Graphene belt</text>
  <line x1="25" y1="494" x2="65" y2="494" stroke="#FF7043" stroke-width="2"/><text x="72" y="497" fill="#FF7043" font-size="8" font-family="monospace">Rocket Fuel belt</text>
  <!-- Footer -->
  <text x="400" y="510" text-anchor="middle" fill="#546E7A" font-size="8" font-family="monospace">Dyson Sphere Program — Oil Refining Chain | dsp-guide.com</text>
</svg>
