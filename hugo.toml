baseURL = 'https://dsp-guide.com/'
theme = 'dsp-theme'
title = 'Dyson Sphere Program Guide'
publishDir = 'docs'
enableRobotsTXT = true
buildFuture = true
buildDrafts = false

disableKinds = ["taxonomy"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      autoHeadingID = true
    [markup.goldmark.extensions]
      typographer = false
      linkify = false
      footnote = false
      table = true
      strikethrough = false
      taskList = false
      definitionList = false

[params]
  description = 'Dyson Sphere Program guide: beginner tips, factory automation, logistics, power systems, and pro strategies.'
  keywords = 'Dyson Sphere Program guide, DSP guide, DSP tips, factory automation game, space factory guide'
  steam_url = 'https://store.steampowered.com/app/1366540/Dyson_Sphere_Program/'
  google_adsense_id = 'ca-pub-7551387157478980'
  google_analytics_id = 'G-RDJSH9J2M9'
  nav_categories = ['Power & Energy', 'Resources & Mining', 'Science & Production', 'Logistics & Transport']
