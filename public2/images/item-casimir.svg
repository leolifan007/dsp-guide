<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark rounded square background -->
  <rect x="0" y="0" width="100" height="100" rx="12" fill="#2a2f3d"/>
  <!-- Crystal body - rotated diamond shape like game icon -->
  <polygon points="50,16 76,40 50,84 24,40" fill="#3d2b5e"/>
  <polygon points="50,22 70,42 50,76 30,42" fill="#5a3a8a"/>
  <!-- Inner crystal facets -->
  <polygon points="50,30 62,42 50,68 38,42" fill="#7a5aaa"/>
  <polygon points="50,36 58,42 50,60 42,42" fill="#9a7aca"/>
  <!-- Core glow line -->
  <line x1="50" y1="26" x2="50" y2="74" stroke="#c0a0e8" stroke-width="1.5" opacity="0.5"/>
  <!-- Highlight sparkles -->
  <circle cx="44" cy="38" r="2" fill="#e0d0f8"/>
  <circle cx="56" cy="62" r="1.5" fill="#e0d0f8"/>
  <circle cx="50" cy="22" r="2" fill="#e0d0f8" opacity="0.7"/>
</svg>
