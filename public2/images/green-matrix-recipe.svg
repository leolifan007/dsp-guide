<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" style="background:transparent">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Processor icon - microchip -->
  <rect x="8" y="12" width="56" height="56" rx="6" fill="var(--bg3)" stroke="var(--accent2)" stroke-width="1.5"/>
  <rect x="16" y="20" width="40" height="40" rx="3" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
  <text x="36" y="52" font-family="monospace" font-size="22" fill="var(--accent2)" text-anchor="middle" font-weight="bold">P</text>
  <line x1="14" y1="40" x2="8" y2="40" stroke="var(--accent)" stroke-width="1.5"/>
  <line x1="64" y1="40" x2="58" y2="40" stroke="var(--accent)" stroke-width="1.5"/>
  <line x1="36" y1="68" x2="36" y2="74" stroke="var(--accent)" stroke-width="1.5"/>

  <!-- plus -->
  <text x="82" y="48" font-size="28" fill="var(--muted)" text-anchor="middle" font-weight="bold">+</text>

  <!-- Casimir Crystal - diamond shape -->
  <rect x="100" y="12" width="56" height="56" rx="6" fill="var(--bg3)" stroke="#a855f7" stroke-width="1.5"/>
  <polygon points="128,22 144,40 128,58 112,40" fill="none" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="128" cy="40" r="4" fill="#c084fc"/>

  <!-- plus -->
  <text x="174" y="48" font-size="28" fill="var(--muted)" text-anchor="middle" font-weight="bold">+</text>

  <!-- EM Turbine - fan blades -->
  <rect x="194" y="12" width="56" height="56" rx="6" fill="var(--bg3)" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="222" cy="40" r="18" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="204" y1="40" x2="240" y2="40" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="222" y1="22" x2="222" y2="58" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>

  <!-- equals -->
  <text x="268" y="48" font-size="28" fill="var(--muted)" text-anchor="middle" font-weight="bold">=</text>

  <!-- Green Matrix - glowing hex -->
  <rect x="290" y="10" width="60" height="60" rx="8" fill="var(--bg3)" stroke="#22c55e" stroke-width="2"/>
  <polygon points="320,18 340,28 340,52 320,62 300,52 300,28" fill="none" stroke="#22c55e" stroke-width="2"/>
  <polygon points="320,24 334,31 334,49 320,56 306,49 306,31" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <circle cx="320" cy="40" r="3" fill="#22c55e"/>
</svg>
