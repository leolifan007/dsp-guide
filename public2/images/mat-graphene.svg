<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect x="0" y="0" width="100" height="100" rx="12" fill="#2a2f3d"/>
  <!-- Graphene -- hexagonal lattice -->
  <polygon points="50,20 70,30 70,50 50,60 30,50 30,30" fill="#3d4a3d" stroke="#5a8a5a" stroke-width="2"/>
  <polygon points="50,40 65,48 65,64 50,72 35,64 35,48" fill="#3d4a3d" stroke="#5a8a5a" stroke-width="1.5"/>
  <polygon points="50,40 60,45 60,55 50,60 40,55 40,45" fill="none" stroke="#7aaa7a" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="30" x2="20" y2="20" stroke="#5a8a5a" stroke-width="1.5"/>
  <line x1="70" y1="30" x2="80" y2="20" stroke="#5a8a5a" stroke-width="1.5"/>
  <line x1="30" y1="50" x2="20" y2="60" stroke="#5a8a5a" stroke-width="1.5"/>
  <line x1="70" y1="50" x2="80" y2="60" stroke="#5a8a5a" stroke-width="1.5"/>
</svg>
