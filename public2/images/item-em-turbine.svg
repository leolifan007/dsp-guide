<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark rounded square background -->
  <rect x="0" y="0" width="100" height="100" rx="12" fill="#2a2f3d"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="32" fill="#3d3a2a" stroke="#7a7040" stroke-width="2"/>
  <!-- Stator ring -->
  <circle cx="50" cy="50" r="26" fill="none" stroke="#5a5230" stroke-width="2"/>
  <!-- Rotor hub -->
  <circle cx="50" cy="50" r="10" fill="#4a4530" stroke="#8a7a40" stroke-width="2"/>
  <circle cx="50" cy="50" r="4" fill="#c8a85c"/>
  <!-- Turbine blades (4 blades, angled) -->
  <ellipse cx="50" cy="26" rx="6" ry="14" fill="#6a6238" stroke="#8a7a40" stroke-width="1.5" transform="rotate(0 50 50)"/>
  <ellipse cx="74" cy="50" rx="14" ry="6" fill="#6a6238" stroke="#8a7a40" stroke-width="1.5" transform="rotate(0 50 50)"/>
  <ellipse cx="50" cy="74" rx="6" ry="14" fill="#6a6238" stroke="#8a7a40" stroke-width="1.5" transform="rotate(0 50 50)"/>
  <ellipse cx="26" cy="50" rx="14" ry="6" fill="#6a6238" stroke="#8a7a40" stroke-width="1.5" transform="rotate(0 50 50)"/>
  <!-- Spin highlights -->
  <path d="M 50 14 A 36 36 0 0 1 86 50" fill="none" stroke="#c8b060" stroke-width="1" opacity="0.3"/>
</svg>
