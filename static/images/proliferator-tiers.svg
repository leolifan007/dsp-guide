<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 300" width="650" height="300">
  <defs>
    <linearGradient id="mk1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="mk2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="mk3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6A1B9A"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="650" height="300" fill="#0d1117"/>
  <!-- Title -->
  <text x="325" y="28" text-anchor="middle" fill="#ECEFF1" font-size="14" font-family="monospace" font-weight="bold">PROLIFERATOR TIERS - OUTPUT BONUSES</text>
  <!-- Mk.I -->
  <rect x="40" y="55" width="180" height="100" rx="8" fill="url(#mk1Grad)" stroke="#81C784" stroke-width="2"/>
  <text x="130" y="82" text-anchor="middle" fill="#E8F5E9" font-size="12" font-family="monospace" font-weight="bold">PROLIFERATOR Mk.I</text>
  <text x="130" y="105" text-anchor="middle" fill="#C8E6C9" font-size="22" font-family="monospace" font-weight="bold">+20%</text>
  <text x="130" y="125" text-anchor="middle" fill="#A5D6A7" font-size="9" font-family="monospace">Output Bonus</text>
  <text x="130" y="145" text-anchor="middle" fill="#81C784" font-size="8" font-family="monospace">Low-tier craft</text>
  <!-- Arrow Mk.I -&gt; Mk.II -->
  <line x1="220" y1="105" x2="250" y2="105" stroke="#FFD54F" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="235" y="98" fill="#FFD54F" font-size="7" font-family="monospace">+craft</text>
  <!-- Mk.II -->
  <rect x="250" y="55" width="180" height="100" rx="8" fill="url(#mk2Grad)" stroke="#64B5F6" stroke-width="2"/>
  <text x="340" y="82" text-anchor="middle" fill="#E3F2FD" font-size="12" font-family="monospace" font-weight="bold">PROLIFERATOR Mk.II</text>
  <text x="340" y="105" text-anchor="middle" fill="#BBDEFB" font-size="22" font-family="monospace" font-weight="bold">+40%</text>
  <text x="340" y="125" text-anchor="middle" fill="#90CAF9" font-size="9" font-family="monospace">Output Bonus</text>
  <text x="340" y="145" text-anchor="middle" fill="#64B5F6" font-size="8" font-family="monospace">Mk.I ingredient</text>
  <!-- Arrow Mk.II -&gt; Mk.III -->
  <line x1="430" y1="105" x2="460" y2="105" stroke="#FFD54F" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="445" y="98" fill="#FFD54F" font-size="7" font-family="monospace">+craft</text>
  <!-- Mk.III -->
  <rect x="460" y="55" width="180" height="100" rx="8" fill="url(#mk3Grad)" stroke="#CE93D8" stroke-width="2"/>
  <text x="550" y="82" text-anchor="middle" fill="#F3E5F5" font-size="12" font-family="monospace" font-weight="bold">PROLIFERATOR Mk.III</text>
  <text x="550" y="105" text-anchor="middle" fill="#E1BEE7" font-size="22" font-family="monospace" font-weight="bold">+60%</text>
  <text x="550" y="125" text-anchor="middle" fill="#CE93D8" font-size="9" font-family="monospace">Output Bonus</text>
  <text x="550" y="145" text-anchor="middle" fill="#AB47BC" font-size="8" font-family="monospace">Mk.II ingredient</text>
  <!-- Comparison bars: 4 rows, all left-aligned, scaled to fit within box -->
  <!-- Box: x=40..610 (width=570), bar start x=95 (after label), max right=605 -->
  <!-- Scale: 1% = 3.0px, so 160% = 480px, right edge = 95+480 = 575 (< 610) -->
  <rect x="40" y="178" width="570" height="62" rx="4" fill="rgba(255,255,255,0.05)" stroke="#455A64" stroke-width="1"/>
  <!-- Row 1: BASELINE 100% -->
  <text x="52" y="196" fill="#90A4AE" font-size="7.5" font-family="monospace">BASE</text>
  <rect x="95" y="188" width="300" height="10" rx="2" fill="#546E7A"/>
  <text x="400" y="196" fill="#78909C" font-size="7" font-family="monospace">100%</text>
  <!-- Row 2: Mk.I 120% -->
  <text x="52" y="211" fill="#81C784" font-size="7.5" font-family="monospace">Mk.I</text>
  <rect x="95" y="203" width="360" height="10" rx="2" fill="#66BB6A"/>
  <text x="460" y="211" fill="#E8F5E9" font-size="7" font-family="monospace">120%</text>
  <!-- Row 3: Mk.II 140% -->
  <text x="52" y="226" fill="#64B5F6" font-size="7.5" font-family="monospace">Mk.II</text>
  <rect x="95" y="218" width="420" height="10" rx="2" fill="#42A5F5"/>
  <text x="520" y="226" fill="#E3F2FD" font-size="7" font-family="monospace">140%</text>
  <!-- Row 4: Mk.III 160% -->
  <text x="48" y="241" fill="#CE93D8" font-size="7.5" font-family="monospace">Mk.III</text>
  <rect x="95" y="233" width="480" height="10" rx="2" fill="#AB47BC"/>
  <text x="580" y="241" fill="#F3E5F5" font-size="7" font-family="monospace">160%</text>
  <!-- ROI note -->
  <rect x="40" y="250" width="570" height="40" rx="4" fill="rgba(255,213,79,0.1)" stroke="#FFD54F" stroke-width="1"/>
  <text x="325" y="268" text-anchor="middle" fill="#FFD54F" font-size="9" font-family="monospace" font-weight="bold">COST &lt; OUTPUT GAIN</text>
  <text x="325" y="282" text-anchor="middle" fill="#FFE082" font-size="8" font-family="monospace">Proliferator production cost is always lower than the output bonus you gain</text>
</svg>
