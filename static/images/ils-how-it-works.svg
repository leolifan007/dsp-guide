<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="arrGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a9e4a"/>
      <stop offset="100%" style="stop-color:#6bc46b"/>
    </linearGradient>
    <linearGradient id="arrRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c44a4a"/>
      <stop offset="100%" style="stop-color:#e06b6b"/>
    </linearGradient>
    <linearGradient id="arrOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4944a"/>
      <stop offset="100%" style="stop-color:#e0b06b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a9e4a"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c44a4a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d4944a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="8"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial,sans-serif" font-size="14" fill="#aac" text-anchor="middle" font-weight="bold">HOW ILS WORKS - THE TWO THINGS YOU MUST CONFIGURE</text>
  <line x1="50" y1="40" x2="750" y2="40" stroke="#334" stroke-width="1"/>

  <!-- === ILS Station === -->
  <rect x="80" y="60" width="200" height="120" rx="8" fill="#2a2a44" stroke="#6a8aff" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="85" font-family="Arial,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold"> ILS Station</text>
  <text x="180" y="105" font-family="Arial,sans-serif" font-size="11" fill="#88b" text-anchor="middle">Interstellar Logistics</text>
  
  <!-- Slots visual -->
  <text x="95" y="125" font-family="monospace" font-size="11" fill="#8af">[1]</text>
  <text x="95" y="140" font-family="monospace" font-size="11" fill="#8af">[2]</text>
  <text x="95" y="155" font-family="monospace" font-size="11" fill="#8af">[3]</text>
  <text x="95" y="170" font-family="monospace" font-size="11" fill="#8af">[4]</text>
  
  <text x="115" y="125" font-family="Arial,sans-serif" font-size="10" fill="#aaa">Slot A: Supply</text>
  <text x="115" y="140" font-family="Arial,sans-serif" font-size="10" fill="#aaa">Slot B: Demand</text>
  <text x="115" y="155" font-family="Arial,sans-serif" font-size="10" fill="#666">Slot C: (empty)</text>
  <text x="115" y="170" font-family="Arial,sans-serif" font-size="10" fill="#666">Slot D: (empty)</text>

  <!-- === Left side: Planet A (Producers) === -->
  <rect x="50" y="220" width="140" height="100" rx="8" fill="#2a3a2a" stroke="#4a9e4a" stroke-width="1.5"/>
  <text x="120" y="245" font-family="Arial,sans-serif" font-size="12" fill="#6bc46b" text-anchor="middle" font-weight="bold">Planet A</text>
  <text x="120" y="265" font-family="Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Assemblers producing</text>
  <text x="120" y="280" font-family="Arial,sans-serif" font-size="10" fill="#8fa" text-anchor="middle">Processor Units</text>
  <text x="120" y="300" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">(output: 60/min)</text>

  <!-- Left arrow: Assemblers -&gt; ILS -->
  <line x1="190" y1="260" x2="270" y2="130" stroke="#4a9e4a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="210" y="205" font-family="Arial,sans-serif" font-size="9" fill="#4a9e4a" transform="rotate(-50,210,205)">Belts deliver items</text>

  <!-- === Right side: Planet B (Consumers) === -->
  <rect x="600" y="220" width="140" height="100" rx="8" fill="#3a2a2a" stroke="#c44a4a" stroke-width="1.5"/>
  <text x="670" y="245" font-family="Arial,sans-serif" font-size="12" fill="#e06b6b" text-anchor="middle" font-weight="bold">Planet B</text>
  <text x="670" y="265" font-family="Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Science labs needing</text>
  <text x="670" y="280" font-family="Arial,sans-serif" font-size="10" fill="#faa" text-anchor="middle">Processor Units</text>
  <text x="670" y="300" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">(demand: 45/min)</text>

  <!-- Right arrow: ILS -&gt; Planet B -->
  <line x1="510" y1="130" x2="600" y2="260" stroke="#c44a4a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="555" y="205" font-family="Arial,sans-serif" font-size="9" fill="#c44a4a" transform="rotate(50,555,205)">Belts deliver items</text>

  <!-- === Center: The ILS critical path === -->
  <rect x="300" y="60" width="200" height="120" rx="8" fill="#2a2a44" stroke="#d4944a" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="85" font-family="Arial,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold"> The ILS Itself</text>
  <text x="400" y="105" font-family="Arial,sans-serif" font-size="11" fill="#d4944a" text-anchor="middle">[!] Ships DON'T fly for free!</text>

  <!-- ILS settings -->
  <rect x="315" y="115" width="170" height="55" rx="5" fill="#3a3040"/>
  <text x="330" y="133" font-family="Arial,sans-serif" font-size="10" fill="#ff8"> Drones (Planet A only)</text>
  <text x="330" y="150" font-family="Arial,sans-serif" font-size="10" fill="#ff8"> Vessels (Planet A -&gt; B)</text>
  <text x="330" y="167" font-family="Arial,sans-serif" font-size="10" fill="#f88"> Need Power + Warpers</text>

  <!-- === Bottom: The two critical settings === -->
  <rect x="100" y="360" width="600" height="120" rx="8" fill="#1e1e32" stroke="#d4944a" stroke-width="1.5"/>
  <text x="400" y="385" font-family="Arial,sans-serif" font-size="13" fill="#ff8" text-anchor="middle" font-weight="bold">[!] THE TWO SETTINGS MOST PLAYERS GET WRONG</text>

  <!-- Setting 1 -->
  <rect x="120" y="395" width="270" height="70" rx="6" fill="#3a3040" stroke="#d4944a" stroke-width="1"/>
  <text x="130" y="415" font-family="Arial,sans-serif" font-size="11" fill="#ff8" font-weight="bold">1. Supply/Demand Direction</text>
  <text x="130" y="433" font-family="Arial,sans-serif" font-size="10" fill="#ddd">Supply Slot -&gt; "I HAVE items, send them out"</text>
  <text x="130" y="450" font-family="Arial,sans-serif" font-size="10" fill="#ddd">Demand Slot -&gt; "I NEED items, bring them in"</text>
  <text x="130" y="465" font-family="Arial,sans-serif" font-size="9" fill="#f88">Most common mistake: setting BOTH as Supply</text>

  <!-- Setting 2 -->
  <rect x="410" y="395" width="270" height="70" rx="6" fill="#3a3040" stroke="#d4944a" stroke-width="1"/>
  <text x="420" y="415" font-family="Arial,sans-serif" font-size="11" fill="#ff8" font-weight="bold">2. Logistics Vessel Warpers</text>
  <text x="420" y="433" font-family="Arial,sans-serif" font-size="10" fill="#ddd">Interstellar vessels need Warpers</text>
  <text x="420" y="450" font-family="Arial,sans-serif" font-size="10" fill="#ddd">Set "Warpers" slot as Supply with 50+</text>
  <text x="420" y="465" font-family="Arial,sans-serif" font-size="9" fill="#f88">If no warpers -&gt; vessels sit idle -&gt; you wonder why</text>

</svg>