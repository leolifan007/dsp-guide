<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a2e"/><stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="oilGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a1a"/><stop offset="100%" stop-color="#0f1a0f"/>
    </linearGradient>
    <linearGradient id="refineryGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a3a"/><stop offset="100%" stop-color="#0f1a2a"/>
    </linearGradient>
    <linearGradient id="hydrogenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1a3a"/><stop offset="100%" stop-color="#1a0f2a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="700" height="420" rx="10" fill="url(#bgGrad)" stroke="#1a2a4a" stroke-width="1"/>
  <text x="350" y="28" text-anchor="middle" fill="#60a5fa" font-size="17.3" font-weight="700" font-family="sans-serif">Crude Oil Refining: The Split</text>

  <!-- Input: Crude Oil -->
  <rect x="50" y="50" width="160" height="60" rx="6" fill="url(#oilGrad)" stroke="#4a7a3a" stroke-width="1.5"/>
  <text x="130" y="78" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="700" font-family="sans-serif">CRUDE OIL</text>
  <text x="130" y="96" text-anchor="middle" fill="#6b7c93" font-size="13.3" font-family="sans-serif">~60/min per Extractor</text>

  <!-- Arrow Crude Oil -&gt; Refinery -->
  <line x1="210" y1="80" x2="270" y2="80" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Refinery -->
  <rect x="270" y="45" width="160" height="70" rx="6" fill="url(#refineryGrad)" stroke="#3a6a9a" stroke-width="1.5" filter="url(#glow)"/>
  <text x="350" y="72" text-anchor="middle" fill="#22d3ee" font-size="14.7" font-weight="700" font-family="sans-serif">REFINERY</text>
  <text x="350" y="90" text-anchor="middle" fill="#6b7c93" font-size="12" font-family="sans-serif">Crude Oil x2</text>
  <text x="350" y="104" text-anchor="middle" fill="#fbbf24" font-size="12" font-family="sans-serif">-&gt; each in 4s</text>

  <!-- Split point -->
  <circle cx="470" cy="80" r="6" fill="#f59e0b"/>
  <line x1="430" y1="80" x2="464" y2="80" stroke="#f59e0b" stroke-width="2"/>

  <!-- Output 1: Refined Oil (up-right) -->
  <line x1="470" y1="80" x2="470" y2="50" stroke="#f59e0b" stroke-width="2"/>
  <line x1="470" y1="50" x2="530" y2="50" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <rect x="530" y="30" width="150" height="50" rx="6" fill="#1a2a0f" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="605" y="52" text-anchor="middle" fill="#fbbf24" font-size="14.7" font-weight="700" font-family="sans-serif">REFINED OIL</text>
  <text x="605" y="68" text-anchor="middle" fill="#6b7c93" font-size="12" font-family="sans-serif">~30/min</text>

  <!-- Output 2: Hydrogen (down-right) -->
  <line x1="470" y1="80" x2="470" y2="110" stroke="#f59e0b" stroke-width="2"/>
  <line x1="470" y1="110" x2="530" y2="110" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <rect x="530" y="90" width="150" height="50" rx="6" fill="url(#hydrogenGrad)" stroke="#8a5aae" stroke-width="1.2"/>
  <text x="605" y="112" text-anchor="middle" fill="#c084fc" font-size="14.7" font-weight="700" font-family="sans-serif">HYDROGEN</text>
  <text x="605" y="128" text-anchor="middle" fill="#6b7c93" font-size="12" font-family="sans-serif">~20/min (byproduct)</text>

  <!-- Consumption section -->
  <text x="350" y="168" text-anchor="middle" fill="#6b7c93" font-size="13.3" font-family="sans-serif">  WHAT EACH OUTPUT FEEDS  </text>

  <!-- Refined Oil -&gt; Diamond + Crystal Silicon -->
  <rect x="50" y="185" width="280" height="90" rx="6" fill="#0f1a0f" stroke="#4a7a3a" stroke-width="1"/>
  <text x="190" y="208" text-anchor="middle" fill="#4ade80" font-size="14.7" font-weight="700" font-family="sans-serif">REFINED OIL -&gt;</text>

  <!-- Diamond -->
  <rect x="65" y="218" width="120" height="44" rx="4" fill="#1a2a1a" stroke="#f59e0b" stroke-width="1"/>
  <text x="125" y="237" text-anchor="middle" fill="#fbbf24" font-size="13.3" font-weight="600" font-family="sans-serif">DIAMOND</text>
  <text x="125" y="253" text-anchor="middle" fill="#6b7c93" font-size="10.7" font-family="sans-serif">+ Graphite in Chem Plant</text>

  <!-- Crystal Silicon -->
  <rect x="195" y="218" width="120" height="44" rx="4" fill="#1a2a1a" stroke="#f59e0b" stroke-width="1"/>
  <text x="255" y="237" text-anchor="middle" fill="#fbbf24" font-size="13.3" font-weight="600" font-family="sans-serif">CRYSTAL SILICON</text>
  <text x="255" y="253" text-anchor="middle" fill="#6b7c93" font-size="10.7" font-family="sans-serif">+ Silicon Ore in Chem Plant</text>

  <!-- Hydrogen -&gt; Sinks -->
  <rect x="370" y="185" width="280" height="90" rx="6" fill="#1a0f2a" stroke="#8a5aae" stroke-width="1"/>
  <text x="510" y="208" text-anchor="middle" fill="#c084fc" font-size="14.7" font-weight="700" font-family="sans-serif">HYDROGEN -&gt;</text>

  <!-- Thermal Plant sink -->
  <rect x="385" y="218" width="120" height="44" rx="4" fill="#2a1a0f" stroke="#f97316" stroke-width="1"/>
  <text x="445" y="237" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="600" font-family="sans-serif">THERMAL PLANT</text>
  <text x="445" y="253" text-anchor="middle" fill="#6b7c93" font-size="10.7" font-family="sans-serif">Burn at 2.4 MW</text>

  <!-- X-Ray Cracking sink -->
  <rect x="515" y="218" width="120" height="44" rx="4" fill="#0f1a2a" stroke="#22d3ee" stroke-width="1"/>
  <text x="575" y="237" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="600" font-family="sans-serif">X-RAY CRACKING</text>
  <text x="575" y="253" text-anchor="middle" fill="#6b7c93" font-size="10.7" font-family="sans-serif">Net -1 H2/cycle</text>

  <!-- Bottom: Key insight -->
  <rect x="50" y="298" width="600" height="90" rx="6" fill="rgba(251,191,36,0.06)" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="350" y="320" text-anchor="middle" fill="#fbbf24" font-size="14.7" font-weight="700" font-family="sans-serif">[!] THE KEY INSIGHT</text>
  <text x="350" y="340" text-anchor="middle" fill="#8b95ad" font-size="13.3" font-family="sans-serif">If Hydrogen has nowhere to go -&gt; Refinery stalls -&gt; No Refined Oil</text>
  <text x="350" y="358" text-anchor="middle" fill="#8b95ad" font-size="13.3" font-family="sans-serif">-&gt; No Diamond -&gt; No Crystal Silicon -&gt; No Blue Matrix</text>
  <text x="350" y="380" text-anchor="middle" fill="#4ade80" font-size="13.3" font-weight="600" font-family="sans-serif">Always build a Hydrogen sink before starting Blue Science.</text>
</svg>