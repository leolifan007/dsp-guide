<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#1a9c4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="18" font-weight="bold" filter="url(#glow)">Oil Processing - Three Configurations Flow</text>
  <line x1="180" y1="46" x2="620" y2="46" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- CONFIG 1: Direct Refining -->
  <rect x="20" y="60" width="240" height="180" rx="6" fill="url(#box1)" stroke="#2ecc71" stroke-width="1.5" opacity="0.9"/>
  <rect x="20" y="60" width="240" height="28" rx="6" fill="url(#accent3)"/>
  <rect x="20" y="78" width="240" height="10" fill="url(#accent3)"/>
  <text x="140" y="79" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="13" font-weight="bold">Config 1: Direct Refining (Early)</text>

  <text x="40" y="108" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">INPUT</text>
  <rect x="40" y="114" width="100" height="24" rx="4" fill="#1a1a2e" stroke="#2ecc71" stroke-width="0.8"/>
  <text x="90" y="130" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Crude Oil</text>

  <line x1="140" y1="126" x2="170" y2="126" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <rect x="175" y="114" width="70" height="24" rx="4" fill="#0f3460" stroke="#2ecc71" stroke-width="0.8"/>
  <text x="210" y="130" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Refinery</text>

  <line x1="210" y1="138" x2="210" y2="152" stroke="#8892b0" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="40" y="165" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">OUTPUTS (2:1 ratio)</text>
  <rect x="40" y="171" width="90" height="22" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="85" y="186" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">Refined Oil x2</text>
  <rect x="145" y="171" width="70" height="22" rx="4" fill="#1a1a2e" stroke="#ff6b35" stroke-width="0.8"/>
  <text x="180" y="186" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">Hydrogen x1</text>

  <rect x="40" y="200" width="200" height="28" rx="4" fill="rgba(46,204,113,0.1)" stroke="#2ecc71" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="140" y="218" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Store in Tanks - Burn excess H2</text>

  <!-- CONFIG 2: X-Ray Cracking -->
  <rect x="280" y="60" width="240" height="180" rx="6" fill="url(#box1)" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <rect x="280" y="60" width="240" height="28" rx="6" fill="url(#accent1)"/>
  <rect x="280" y="78" width="240" height="10" fill="url(#accent1)"/>
  <text x="400" y="79" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="13" font-weight="bold">Config 2: X-Ray Cracking (Mid)</text>

  <text x="300" y="108" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">INPUTS</text>
  <rect x="300" y="114" width="80" height="24" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="340" y="130" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Refined Oil</text>
  <rect x="395" y="114" width="80" height="24" rx="4" fill="#1a1a2e" stroke="#ff6b35" stroke-width="0.8"/>
  <text x="435" y="130" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Hydrogen</text>

  <line x1="475" y1="126" x2="500" y2="126" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="300" y="148" width="80" height="24" rx="4" fill="#0f3460" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="340" y="163" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">X-Ray Cracker</text>

  <line x1="340" y1="172" x2="340" y2="184" stroke="#8892b0" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="300" y="198" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">OUTPUT</text>
  <rect x="300" y="202" width="90" height="22" rx="4" fill="#1a1a2e" stroke="#2ecc71" stroke-width="0.8"/>
  <text x="345" y="217" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">Energetic G. x1</text>
  <rect x="405" y="202" width="80" height="22" rx="4" fill="#1a1a2e" stroke="#ff6b35" stroke-width="0.8"/>
  <text x="445" y="217" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">Hydrogen x2</text>

  <!-- Feedback loop arrow -->
  <path d="M 485 213 Q 510 213 510 160 Q 510 127 482 127" fill="none" stroke="#ff6b35" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
  <text x="518" y="170" fill="#ff6b35" font-family="Consolas, monospace" font-size="9" transform="rotate(90,518,170)">H2 feedback</text>

  <!-- CONFIG 3: Thermal Cracking -->
  <rect x="540" y="60" width="240" height="180" rx="6" fill="url(#box1)" stroke="#ff6b35" stroke-width="1.5" opacity="0.9"/>
  <rect x="540" y="60" width="240" height="28" rx="6" fill="url(#accent2)"/>
  <rect x="540" y="78" width="240" height="10" fill="url(#accent2)"/>
  <text x="660" y="79" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="13" font-weight="bold">Config 3: Thermal Cracking (Late)</text>

  <text x="560" y="108" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">MULTI-PLANET SCALE</text>

  <rect x="560" y="114" width="100" height="24" rx="4" fill="#1a1a2e" stroke="#ff6b35" stroke-width="0.8"/>
  <text x="610" y="130" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Crude Oil Import</text>

  <rect x="560" y="145" width="100" height="24" rx="4" fill="#0f3460" stroke="#ff6b35" stroke-width="0.8"/>
  <text x="610" y="160" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">12 Refineries</text>

  <rect x="560" y="176" width="100" height="24" rx="4" fill="#0f3460" stroke="#ff6b35" stroke-width="0.8"/>
  <text x="610" y="191" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">10 Crackers</text>

  <rect x="560" y="207" width="200" height="22" rx="4" fill="rgba(255,107,53,0.1)" stroke="#ff6b35" stroke-width="0.8"/>
  <text x="660" y="222" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Plastic + Organic Crystal + H2</text>

  <!-- COMPARISON TABLE -->
  <rect x="20" y="260" width="760" height="300" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1"/>

  <rect x="20" y="260" width="760" height="28" rx="6" fill="#0f3460"/>
  <rect x="20" y="278" width="760" height="10" fill="#0f3460"/>
  <text x="400" y="279" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="14" font-weight="bold">Stage Scaling Comparison</text>

  <!-- Table header -->
  <rect x="40" y="298" width="140" height="26" rx="3" fill="#0f3460"/>
  <text x="110" y="315" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="12" font-weight="bold">Stage</text>
  <rect x="180" y="298" width="140" height="26" rx="3" fill="#0f3460"/>
  <text x="250" y="315" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="12" font-weight="bold">Refineries</text>
  <rect x="320" y="298" width="140" height="26" rx="3" fill="#0f3460"/>
  <text x="390" y="315" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="12" font-weight="bold">Crackers</text>
  <rect x="460" y="298" width="300" height="26" rx="3" fill="#0f3460"/>
  <text x="610" y="315" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="12" font-weight="bold">Output</text>

  <!-- Stage 1 -->
  <rect x="40" y="330" width="140" height="40" rx="3" fill="#1a1a2e" stroke="#2ecc71" stroke-width="0.8"/>
  <text x="110" y="355" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="12">Stage 1</text>
  <rect x="180" y="330" width="140" height="40" rx="3" fill="#1a1a2e"/>
  <text x="250" y="355" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="13">4</text>
  <rect x="320" y="330" width="140" height="40" rx="3" fill="#1a1a2e"/>
  <text x="390" y="355" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="13">2</text>
  <rect x="460" y="330" width="300" height="40" rx="3" fill="#1a1a2e"/>
  <text x="610" y="355" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="12">Plastic + H2 for mid-game</text>

  <!-- Stage 2 -->
  <rect x="40" y="376" width="140" height="40" rx="3" fill="#1a1a2e" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="110" y="401" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="12">Stage 2</text>
  <rect x="180" y="376" width="140" height="40" rx="3" fill="#1a1a2e"/>
  <text x="250" y="401" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="13">8</text>
  <rect x="320" y="376" width="140" height="40" rx="3" fill="#1a1a2e"/>
  <text x="390" y="401" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="13">6</text>
  <rect x="460" y="376" width="300" height="40" rx="3" fill="#1a1a2e"/>
  <text x="610" y="401" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="12">Plastic + Organic Crystal + H2</text>

  <!-- Stage 3 -->
  <rect x="40" y="422" width="140" height="40" rx="3" fill="#1a1a2e" stroke="#ff6b35" stroke-width="0.8"/>
  <text x="110" y="447" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="12">Stage 3 (60 SPM)</text>
  <rect x="180" y="422" width="140" height="40" rx="3" fill="#1a1a2e"/>
  <text x="250" y="447" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="13">12</text>
  <rect x="320" y="422" width="140" height="40" rx="3" fill="#1a1a2e"/>
  <text x="390" y="447" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="13">10</text>
  <rect x="460" y="422" width="300" height="40" rx="3" fill="#1a1a2e"/>
  <text x="610" y="447" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="12">Full production chain</text>

  <!-- Warning box -->
  <rect x="40" y="478" width="720" height="30" rx="4" fill="rgba(255,107,53,0.12)" stroke="#ff6b35" stroke-width="1"/>
  <text x="400" y="498" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="12">CAUTION: Always maintain hydrogen-burning thermal as pressure valve to prevent backup</text>

  <!-- H2 overflow arrow at bottom -->
  <line x1="140" y1="228" x2="400" y2="255" stroke="#8892b0" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
</svg>