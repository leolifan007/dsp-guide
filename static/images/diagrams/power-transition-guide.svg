<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#1a9c4e"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
    <linearGradient id="accent5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#d4a509"/>
    </linearGradient>
    <linearGradient id="accent6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8892b0"/>
    </marker>
  </defs>

  <rect width="800" height="580" fill="url(#bg)" rx="8"/>

  <text x="400" y="32" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="17" font-weight="bold" filter="url(#glow)">Power Stage Transition Timeline</text>
  <line x1="180" y1="42" x2="620" y2="42" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Timeline -->
  <line x1="60" y1="100" x2="740" y2="100" stroke="#8892b0" stroke-width="2" opacity="0.3"/>

  <!-- Stage 1: Wind -->
  <circle cx="120" cy="100" r="18" fill="#0f3460" stroke="#2ecc71" stroke-width="2.5"/>
  <text x="120" y="105" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="10" font-weight="bold">1</text>

  <rect x="40" y="130" width="160" height="100" rx="6" fill="#16213e" stroke="#2ecc71" stroke-width="1.5"/>
  <rect x="40" y="130" width="160" height="22" rx="6" fill="url(#accent3)"/>
  <rect x="40" y="142" width="160" height="10" fill="url(#accent3)"/>
  <text x="120" y="146" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="11" font-weight="bold">Tier 1: Wind</text>

  <text x="55" y="170" fill="#2ecc71" font-family="Consolas, monospace" font-size="10">First 30 min</text>
  <text x="55" y="186" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">0-9 MW</text>
  <text x="55" y="202" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Free - no fuel</text>
  <text x="55" y="218" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Build 20-30 units</text>

  <!-- Arrow 1->2 -->
  <line x1="138" y1="100" x2="280" y2="100" stroke="#8892b0" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="210" y="92" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="9">After Red Science</text>

  <!-- Stage 2: Thermal -->
  <circle cx="320" cy="100" r="18" fill="#0f3460" stroke="#ff6b35" stroke-width="2.5"/>
  <text x="320" y="105" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="10" font-weight="bold">2</text>

  <rect x="240" y="130" width="160" height="100" rx="6" fill="#16213e" stroke="#ff6b35" stroke-width="1.5"/>
  <rect x="240" y="130" width="160" height="22" rx="6" fill="url(#accent2)"/>
  <rect x="240" y="142" width="160" height="10" fill="url(#accent2)"/>
  <text x="320" y="146" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="11" font-weight="bold">Tier 2: Thermal</text>

  <text x="255" y="170" fill="#ff6b35" font-family="Consolas, monospace" font-size="10">Early to Mid</text>
  <text x="255" y="186" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">5-40 MW</text>
  <text x="255" y="202" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Burns coal/oil/H2</text>
  <text x="255" y="218" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Build in groups of 4</text>

  <!-- Arrow 2->3 -->
  <line x1="400" y1="100" x2="500" y2="100" stroke="#8892b0" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="450" y="92" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="9">After Purple Science</text>

  <!-- Stage 3: Fusion -->
  <circle cx="540" cy="100" r="18" fill="#0f3460" stroke="#9b59b6" stroke-width="2.5"/>
  <text x="540" y="105" text-anchor="middle" fill="#9b59b6" font-family="Consolas, monospace" font-size="10" font-weight="bold">3</text>

  <rect x="460" y="130" width="160" height="100" rx="6" fill="#16213e" stroke="#9b59b6" stroke-width="1.5"/>
  <rect x="460" y="130" width="160" height="22" rx="6" fill="url(#accent4)"/>
  <rect x="460" y="142" width="160" height="10" fill="url(#accent4)"/>
  <text x="540" y="146" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="11" font-weight="bold">Tier 3: Fusion</text>

  <text x="475" y="170" fill="#9b59b6" font-family="Consolas, monospace" font-size="10">Mid to Late</text>
  <text x="475" y="186" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">20-100 MW</text>
  <text x="475" y="202" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Deuterium Rods</text>
  <text x="475" y="218" fill="#8892b0" font-family="Consolas, monospace" font-size="10">10 MW per station</text>

  <!-- Arrow 3->4 -->
  <line x1="620" y1="100" x2="700" y2="100" stroke="#8892b0" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="660" y="92" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="9">After Dyson Sphere</text>

  <!-- Stage 4: Antimatter -->
  <circle cx="740" cy="100" r="18" fill="#0f3460" stroke="#f1c40f" stroke-width="2.5"/>
  <text x="740" y="105" text-anchor="middle" fill="#f1c40f" font-family="Consolas, monospace" font-size="10" font-weight="bold">4</text>

  <rect x="660" y="130" width="100" height="100" rx="6" fill="#16213e" stroke="#f1c40f" stroke-width="1.5"/>
  <rect x="660" y="130" width="100" height="22" rx="6" fill="url(#accent5)"/>
  <rect x="660" y="142" width="100" height="10" fill="url(#accent5)"/>
  <text x="710" y="146" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="10" font-weight="bold">Tier 4: Anti-matter</text>

  <text x="672" y="170" fill="#f1c40f" font-family="Consolas, monospace" font-size="9">Endgame</text>
  <text x="672" y="186" fill="#e0e0e0" font-family="Consolas, monospace" font-size="10">75-500 MW</text>
  <text x="672" y="202" fill="#8892b0" font-family="Consolas, monospace" font-size="9">Artificial Sun</text>
  <text x="672" y="218" fill="#8892b0" font-family="Consolas, monospace" font-size="9">75 MW each</text>

  <!-- Fuel comparison table -->
  <rect x="20" y="250" width="760" height="160" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <rect x="20" y="250" width="760" height="26" rx="6" fill="#0f3460"/>
  <rect x="20" y="266" width="760" height="10" fill="#0f3460"/>
  <text x="400" y="268" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="13" font-weight="bold">Fuel Efficiency Comparison (Thermal Generators)</text>

  <!-- Table header -->
  <rect x="35" y="282" width="170" height="24" rx="3" fill="#0f3460"/>
  <text x="120" y="298" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="11" font-weight="bold">Fuel</text>
  <rect x="205" y="282" width="120" height="24" rx="3" fill="#0f3460"/>
  <text x="265" y="298" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="11" font-weight="bold">Energy/Unit</text>
  <rect x="325" y="282" width="120" height="24" rx="3" fill="#0f3460"/>
  <text x="385" y="298" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="11" font-weight="bold">Burn Time</text>
  <rect x="445" y="282" width="120" height="24" rx="3" fill="#0f3460"/>
  <text x="505" y="298" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="11" font-weight="bold">Units/Min/Gen</text>
  <rect x="565" y="282" width="200" height="24" rx="3" fill="#0f3460"/>
  <text x="665" y="298" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="11" font-weight="bold">Rating</text>

  <rect x="35" y="312" width="170" height="24" rx="3" fill="#1a1a2e"/>
  <text x="120" y="329" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="11">Coal</text>
  <rect x="205" y="312" width="120" height="24" rx="3" fill="#1a1a2e"/>
  <text x="265" y="329" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">2.7 MJ</text>
  <rect x="325" y="312" width="120" height="24" rx="3" fill="#1a1a2e"/>
  <text x="385" y="329" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">6.75s</text>
  <rect x="445" y="312" width="120" height="24" rx="3" fill="#1a1a2e"/>
  <text x="505" y="329" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">~8.9</text>
  <rect x="565" y="312" width="200" height="24" rx="3" fill="#1a1a2e"/>
  <text x="665" y="329" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="11">Low - early game only</text>

  <rect x="35" y="342" width="170" height="24" rx="3" fill="#1a1a2e"/>
  <text x="120" y="359" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">Energetic Graphite</text>
  <rect x="205" y="342" width="120" height="24" rx="3" fill="#1a1a2e"/>
  <text x="265" y="359" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">6.3 MJ</text>
  <rect x="325" y="342" width="120" height="24" rx="3" fill="#1a1a2e"/>
  <text x="385" y="359" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">15.75s</text>
  <rect x="445" y="342" width="120" height="24" rx="3" fill="#1a1a2e"/>
  <text x="505" y="359" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">~3.8</text>
  <rect x="565" y="342" width="200" height="24" rx="3" fill="#1a1a2e"/>
  <text x="665" y="359" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">Good - recommended mid</text>

  <rect x="35" y="372" width="170" height="24" rx="3" fill="#1a1a2e"/>
  <text x="120" y="389" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">Hydrogen</text>
  <rect x="205" y="372" width="120" height="24" rx="3" fill="#1a1a2e"/>
  <text x="265" y="389" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">7.5 MJ</text>
  <rect x="325" y="372" width="120" height="24" rx="3" fill="#1a1a2e"/>
  <text x="385" y="389" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">18.75s</text>
  <rect x="445" y="372" width="120" height="24" rx="3" fill="#1a1a2e"/>
  <text x="505" y="389" text-anchor="middle" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">~3.2</text>
  <rect x="565" y="372" width="200" height="24" rx="3" fill="#1a1a2e"/>
  <text x="665" y="389" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">Byproduct - overflow only</text>

  <!-- Critical info box -->
  <rect x="20" y="425" width="760" height="80" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <rect x="20" y="425" width="760" height="26" rx="6" fill="#0f3460"/>
  <rect x="20" y="441" width="760" height="10" fill="#0f3460"/>
  <text x="400" y="443" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="13" font-weight="bold">CRITICAL: Never Put Thermal Generators on Same Grid as Coal Miners</text>

  <text x="40" y="468" fill="#8892b0" font-family="Consolas, monospace" font-size="11">Grid overload -> Miners stop -> Coal stops -> Generators starve -> CHAIN REACTION BLACKOUT</text>
  <text x="40" y="486" fill="#8892b0" font-family="Consolas, monospace" font-size="11">Solution: Dedicated wind turbine sub-grid for miners. Fusion safe (constant rod burn rate).</text>
  <text x="40" y="502" fill="#8892b0" font-family="Consolas, monospace" font-size="11">Best path: Wind -> Thermal (coal/graphite) -> Fusion -> Antimatter. Skip NO tier.</text>

  <!-- Antimatter loop note -->
  <rect x="180" y="518" width="440" height="48" rx="6" fill="rgba(241,196,15,0.08)" stroke="#f1c40f" stroke-width="1"/>
  <text x="400" y="536" text-anchor="middle" fill="#f1c40f" font-family="Consolas, monospace" font-size="11">Antimatter Loop: Dyson Sphere -> Critical Photons -> Antimatter + H2 -> Fuel Rods -> 75 MW/sun</text>
  <text x="400" y="554" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Build on planet inside Dyson Sphere orbit for 100% Ray Receiver uptime</text>
</svg>