<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" width="780" height="320">
  <defs>
    <marker id="aOreM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#FF8A65"/>
    </marker>
    <marker id="aBeltM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#FFB300"/>
    </marker>
    <marker id="aILSM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#AB47BC"/>
    </marker>
    <filter id="dsM"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.45"/></filter>
    <linearGradient id="gVein" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5D4037"/><stop offset="100%" stop-color="#3E2723"/></linearGradient>
    <linearGradient id="gMine" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#455A64"/><stop offset="100%" stop-color="#263238"/></linearGradient>
    <linearGradient id="gBeltM" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E65100"/><stop offset="100%" stop-color="#BF360C"/></linearGradient>
    <linearGradient id="gILS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6A1B9A"/><stop offset="100%" stop-color="#4A148C"/></linearGradient>
  </defs>

  <rect width="780" height="320" fill="#0d1117" rx="10"/>
  <rect x="4" y="4" width="772" height="312" fill="none" stroke="#1c2333" stroke-width="0.5" rx="8"/>

  <text x="390" y="28" text-anchor="middle" fill="#E8EAED" font-size="15" font-weight="bold" font-family="Inter,Segoe UI,sans-serif" letter-spacing="1.5">MINING OUTPOST FLOW</text>
  <text x="390" y="44" text-anchor="middle" fill="#8B949E" font-size="10" font-family="Inter,Segoe UI,monospace">Vein -> Miner -> Belt -> Collection / ILS -> Main Factory</text>

  <!-- Vein 1 -->
  <rect x="30" y="65" width="100" height="55" rx="8" fill="url(#gVein)" stroke="#8D6E63" stroke-width="1.2" filter="url(#dsM)"/>
  <text x="80" y="86" text-anchor="middle" fill="#D7CCC8" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> VEIN</text>
  <text x="80" y="102" text-anchor="middle" fill="#BCAAA4" font-size="9" font-family="Inter,Segoe UI,monospace">Coal / Fire Ice</text>
  <text x="80" y="114" text-anchor="middle" fill="#A1887F" font-size="8" font-family="Inter,Segoe UI,monospace">Infinite</text>

  <!-- Arrow -->
  <line x1="130" y1="92" x2="180" y2="92" stroke="#FF8A65" stroke-width="2.5" marker-end="url(#aOreM)"/>

  <!-- Mining Machine -->
  <rect x="183" y="65" width="120" height="55" rx="8" fill="url(#gMine)" stroke="#78909C" stroke-width="1.2" filter="url(#dsM)"/>
  <text x="243" y="86" text-anchor="middle" fill="#CFD8DC" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> MINER</text>
  <text x="243" y="102" text-anchor="middle" fill="#FFB74D" font-size="9" font-family="Inter,Segoe UI,monospace">1 ore/s output</text>
  <text x="243" y="114" text-anchor="middle" fill="#78909C" font-size="8" font-family="Inter,Segoe UI,monospace">Per vein</text>

  <!-- Arrow -->
  <line x1="303" y1="92" x2="363" y2="92" stroke="#FFB300" stroke-width="2.5" marker-end="url(#aBeltM)"/>
  <rect x="315" y="80" width="30" height="12" rx="3" fill="#1a1a2e" stroke="#FFB300" stroke-width="0.6"/>
  <text x="330" y="89" text-anchor="middle" fill="#FFB300" font-size="7" font-weight="bold" font-family="Inter,Segoe UI,monospace">BELT</text>

  <!-- Belt -->
  <rect x="366" y="65" width="100" height="55" rx="8" fill="url(#gBeltM)" stroke="#FFB300" stroke-width="1.2" filter="url(#dsM)"/>
  <text x="416" y="86" text-anchor="middle" fill="#FFF8E1" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,sans-serif">BELT</text>
  <text x="416" y="102" text-anchor="middle" fill="#FFE082" font-size="9" font-family="Inter,Segoe UI,monospace">Mk.I-Mk.III</text>
  <text x="416" y="114" text-anchor="middle" fill="#FFB74D" font-size="8" font-family="Inter,Segoe UI,monospace">Local only</text>

  <!-- Arrow -->
  <line x1="466" y1="92" x2="526" y2="92" stroke="#AB47BC" stroke-width="2.5" marker-end="url(#aILSM)"/>

  <!-- Collection / ILS -->
  <rect x="529" y="60" width="220" height="65" rx="10" fill="url(#gILS)" stroke="#AB47BC" stroke-width="1.5" filter="url(#dsM)"/>
  <text x="639" y="82" text-anchor="middle" fill="#F3E5F5" font-size="13" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> ILS / COLLECTION</text>
  <text x="639" y="98" text-anchor="middle" fill="#CE93D8" font-size="9" font-family="Inter,Segoe UI,monospace">Supply Mode -> Remote ON</text>
  <text x="639" y="112" text-anchor="middle" fill="#BA68C8" font-size="8" font-family="Inter,Segoe UI,monospace">Drones (same star) | Vessels (interstellar)</text>

  <!-- ---- Coal Outpost Detail ---- -->
  <rect x="30" y="145" width="350" height="155" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="30" y="145" width="350" height="26" rx="8" fill="#21262d"/>
  <text x="205" y="163" text-anchor="middle" fill="#EF9A9A" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,monospace">COAL OUTPOST</text>

  <!-- Coal veins -->
  <rect x="45" y="180" width="60" height="35" rx="5" fill="#3E2723" stroke="#8D6E63" stroke-width="0.8"/>
  <text x="75" y="198" text-anchor="middle" fill="#D7CCC8" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">COAL</text>
  <text x="75" y="210" text-anchor="middle" fill="#BCAAA4" font-size="7" font-family="Inter,Segoe UI,monospace">Vein 1</text>

  <rect x="115" y="180" width="60" height="35" rx="5" fill="#3E2723" stroke="#8D6E63" stroke-width="0.8"/>
  <text x="145" y="198" text-anchor="middle" fill="#D7CCC8" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">COAL</text>
  <text x="145" y="210" text-anchor="middle" fill="#BCAAA4" font-size="7" font-family="Inter,Segoe UI,monospace">Vein 2</text>

  <rect x="185" y="180" width="60" height="35" rx="5" fill="#3E2723" stroke="#8D6E63" stroke-width="0.8"/>
  <text x="215" y="198" text-anchor="middle" fill="#D7CCC8" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">COAL</text>
  <text x="215" y="210" text-anchor="middle" fill="#BCAAA4" font-size="7" font-family="Inter,Segoe UI,monospace">Vein 3</text>

  <text x="265" y="200" fill="#FF8A65" font-size="14" font-family="Inter,Segoe UI,monospace">-></text>

  <rect x="280" y="180" width="80" height="35" rx="5" fill="#BF360C" stroke="#FF7043" stroke-width="0.8"/>
  <text x="320" y="198" text-anchor="middle" fill="#FFCCBC" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace"> POWER</text>
  <text x="320" y="210" text-anchor="middle" fill="#FFAB91" font-size="7" font-family="Inter,Segoe UI,monospace">Thermal</text>

  <text x="55" y="240" fill="#8B949E" font-size="8" font-family="Inter,Segoe UI,monospace">3-4 coal veins -> 3 miners -> belt -> Thermal Plants</text>
  <text x="55" y="255" fill="#FFB74D" font-size="8" font-family="Inter,Segoe UI,monospace">Belt ratios: Mk.I=1 miner, Mk.II=2, Mk.III=3</text>

  <!-- ---- Fire Ice Outpost Detail ---- -->
  <rect x="400" y="145" width="350" height="155" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="400" y="145" width="350" height="26" rx="8" fill="#21262d"/>
  <text x="575" y="163" text-anchor="middle" fill="#81D4FA" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,monospace">FIRE ICE OUTPOST</text>

  <!-- Fire Ice -->
  <rect x="415" y="180" width="75" height="35" rx="5" fill="#0D47A1" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="453" y="198" text-anchor="middle" fill="#E1F5FE" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">ICE</text>
  <text x="453" y="210" text-anchor="middle" fill="#81D4FA" font-size="7" font-family="Inter,Segoe UI,monospace">Vein</text>

  <text x="505" y="200" fill="#42A5F5" font-size="14" font-family="Inter,Segoe UI,monospace">-></text>

  <rect x="520" y="178" width="100" height="40" rx="6" fill="#1B5E20" stroke="#66BB6A" stroke-width="1"/>
  <text x="570" y="196" text-anchor="middle" fill="#E8F5E9" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace"> FLAME</text>
  <text x="570" y="208" text-anchor="middle" fill="#A5D6A7" font-size="7" font-family="Inter,Segoe UI,monospace">SMELTER</text>

  <text x="635" y="200" fill="#66BB6A" font-size="14" font-family="Inter,Segoe UI,monospace">-></text>

  <rect x="650" y="178" width="85" height="40" rx="6" fill="#E65100" stroke="#FF7043" stroke-width="1"/>
  <text x="693" y="196" text-anchor="middle" fill="#FFF8E1" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">FUEL</text>
  <text x="693" y="208" text-anchor="middle" fill="#FFE082" font-size="7" font-family="Inter,Segoe UI,monospace">PELLETS</text>

  <text x="420" y="240" fill="#8B949E" font-size="8" font-family="Inter,Segoe UI,monospace">Flame Smelter converts Fire Ice -> Fuel Pellets directly</text>
  <text x="420" y="255" fill="#81D4FA" font-size="8" font-family="Inter,Segoe UI,monospace">No intermediate ore step - most efficient early fuel</text>
  <text x="420" y="270" fill="#66BB6A" font-size="8" font-family="Inter,Segoe UI,monospace">Requires: Flame Interlocking research (early tree)</text>
</svg>