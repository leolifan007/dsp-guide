<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#1a9c4e"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
    <linearGradient id="accent5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#d4a509"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8892b0"/>
    </marker>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
  </defs>

  <rect width="800" height="580" fill="url(#bg)" rx="8"/>

  <text x="400" y="32" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="17" font-weight="bold" filter="url(#glow)">Interplanetary Logistics Network Flow</text>
  <line x1="140" y1="42" x2="660" y2="42" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <text x="400" y="60" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="11">ILS Supply-Demand Routing - Vessels carry goods between planets using Warpers for interstellar jumps</text>

  <!-- Supply: Mining Planet -->
  <rect x="30" y="80" width="220" height="190" rx="8" fill="#16213e" stroke="#2ecc71" stroke-width="2"/>
  <rect x="30" y="80" width="220" height="28" rx="8" fill="url(#accent3)"/>
  <rect x="30" y="98" width="220" height="10" fill="url(#accent3)"/>
  <text x="140" y="100" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="12" font-weight="bold">SUPPLY (Mining Planet)</text>

  <!-- ILS Tower -->
  <rect x="55" y="118" width="60" height="70" rx="4" fill="#0f3460" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="85" y="140" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="10" font-weight="bold">ILS</text>
  <text x="85" y="154" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="9">Tower</text>
  <rect x="60" y="162" width="50" height="12" rx="2" fill="#1a1a2e" stroke="#ff6b35" stroke-width="0.5"/>
  <text x="85" y="171" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="8">Warper x1</text>

  <!-- Slots -->
  <rect x="55" y="196" width="90" height="18" rx="3" fill="#1a1a2e" stroke="#2ecc71" stroke-width="1"/>
  <text x="100" y="209" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="10">Slot: SUPPLY</text>
  <text x="155" y="209" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Ore</text>

  <rect x="130" y="118" width="100" height="95" rx="4" fill="#0f3460" opacity="0.6"/>
  <text x="145" y="138" fill="#e0e0e0" font-family="Consolas, monospace" font-size="10">Vessels:</text>
  <text x="145" y="154" fill="#e0e0e0" font-family="Consolas, monospace" font-size="10">3-6 per tower</text>
  <text x="145" y="170" fill="#e0e0e0" font-family="Consolas, monospace" font-size="10">Capacity: 100</text>
  <text x="145" y="186" fill="#8892b0" font-family="Consolas, monospace" font-size="10">1 Warper/trip</text>
  <text x="145" y="202" fill="#8892b0" font-family="Consolas, monospace" font-size="10">~60 items/min</text>

  <!-- Demand: Factory Planet -->
  <rect x="550" y="80" width="220" height="190" rx="8" fill="#16213e" stroke="#ff6b35" stroke-width="2"/>
  <rect x="550" y="80" width="220" height="28" rx="8" fill="url(#accent2)"/>
  <rect x="550" y="98" width="220" height="10" fill="url(#accent2)"/>
  <text x="660" y="100" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="12" font-weight="bold">DEMAND (Factory Planet)</text>

  <!-- ILS Tower -->
  <rect x="575" y="118" width="60" height="70" rx="4" fill="#0f3460" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="605" y="140" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="10" font-weight="bold">ILS</text>
  <text x="605" y="154" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="9">Tower</text>
  <rect x="580" y="162" width="50" height="12" rx="2" fill="#1a1a2e" stroke="#00d4ff" stroke-width="0.5"/>
  <text x="605" y="171" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="8">Warper x1</text>

  <!-- Slots -->
  <rect x="575" y="196" width="90" height="18" rx="3" fill="#1a1a2e" stroke="#ff6b35" stroke-width="1"/>
  <text x="620" y="209" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="10">Slot: DEMAND</text>
  <text x="675" y="209" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Ore</text>

  <rect x="650" y="118" width="100" height="95" rx="4" fill="#0f3460" opacity="0.6"/>
  <text x="665" y="138" fill="#e0e0e0" font-family="Consolas, monospace" font-size="10">Vessels:</text>
  <text x="665" y="154" fill="#e0e0e0" font-family="Consolas, monospace" font-size="10">2-3 per tower</text>
  <text x="665" y="170" fill="#e0e0e0" font-family="Consolas, monospace" font-size="10">Auto-request</text>
  <text x="665" y="186" fill="#8892b0" font-family="Consolas, monospace" font-size="10">when supply</text>
  <text x="665" y="202" fill="#8892b0" font-family="Consolas, monospace" font-size="10">arrives</text>

  <!-- Transport arrow -->
  <line x1="250" y1="175" x2="550" y2="175" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="400" y="168" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">Vessel Transport</text>
  <text x="400" y="185" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="9">1 Warper per jump (interstellar)</text>

  <!-- Vessel icon -->
  <rect x="380" y="145" width="40" height="20" rx="10" fill="#0f3460" stroke="#00d4ff" stroke-width="1"/>
  <text x="400" y="159" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="8">VESSEL</text>

  <!-- Routing rules box -->
  <rect x="30" y="290" width="740" height="275" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1"/>

  <rect x="30" y="290" width="740" height="28" rx="6" fill="#0f3460"/>
  <rect x="30" y="308" width="740" height="10" fill="#0f3460"/>
  <text x="400" y="310" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="14" font-weight="bold">Routing & Vessel Optimization Guide</text>

  <!-- Rule 1: No Ping-Pong -->
  <rect x="50" y="330" width="340" height="65" rx="5" fill="#1a1a2e" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="220" y="350" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="12" font-weight="bold">RULE 1: No Ping-Pong</text>
  <text x="60" y="366" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Never set same slot to both</text>
  <text x="60" y="382" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Supply AND Demand. Creates</text>
  <text x="60" y="398" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">empty vessel trips = wasted Warpers</text>

  <!-- Rule 2: Vessel Count -->
  <rect x="410" y="330" width="340" height="65" rx="5" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="580" y="350" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="12" font-weight="bold">RULE 2: Right-Size Vessels</text>
  <text x="420" y="366" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Titanium/Silicon: 4-6 vessels</text>
  <text x="420" y="382" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Processors: 1-2 vessels</text>
  <text x="420" y="398" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Default 2-3 for most resources</text>

  <!-- Warper scaling table -->
  <rect x="50" y="408" width="340" height="65" rx="5" fill="#1a1a2e" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="220" y="428" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="12" font-weight="bold">Warper Production Scaling</text>
  <text x="60" y="444" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">1 Lens + 1 Proc -> 5 Warpers</text>
  <text x="60" y="460" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">1 assembler = 50/min = ~50 ILS towers</text>
  <text x="60" y="476" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Most players OVER-build warper production</text>

  <!-- Vessel resource guide -->
  <rect x="410" y="408" width="340" height="65" rx="5" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="580" y="428" text-anchor="middle" fill="#9b59b6" font-family="Consolas, monospace" font-size="12" font-weight="bold">Fuel & Do's/Don'ts</text>
  <text x="420" y="444" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Mk.III prolif fuel -> 30% speed boost</text>
  <text x="420" y="460" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">Same-system jumps: NO Warper needed</text>
  <text x="420" y="476" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Save 60% Warpers with same-system routes</text>

  <!-- Summary -->
  <rect x="50" y="488" width="700" height="28" rx="4" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="400" y="507" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="12">Supply on mining outpost, Demand on factory planet, Warpers in every ILS, Monitor vessel activity tab</text>
</svg>