<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#1a9c4e"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="580" fill="url(#bg)" rx="8"/>

  <text x="400" y="36" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="17" font-weight="bold" filter="url(#glow)">Dyson Sphere Layer Design - Power Output by Orbit Distance</text>
  <line x1="140" y1="46" x2="660" y2="46" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Star in center -->
  <circle cx="400" cy="280" r="40" fill="#ff6b35" opacity="0.3" filter="url(#glow2)"/>
  <circle cx="400" cy="280" r="25" fill="#ff8c42" opacity="0.6"/>
  <circle cx="400" cy="280" r="15" fill="#ffaa55"/>
  <text x="400" y="284" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="11" font-weight="bold">STAR</text>

  <!-- Orbit rings -->
  <ellipse cx="400" cy="280" rx="90" ry="50" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="495" y="260" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">0.5 AU</text>

  <ellipse cx="400" cy="280" rx="155" ry="85" fill="none" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="558" y="216" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">1.0 AU</text>

  <ellipse cx="400" cy="280" rx="225" ry="120" fill="none" stroke="#ff6b35" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="628" y="175" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">1.5 AU</text>

  <ellipse cx="400" cy="280" rx="300" ry="155" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="703" y="145" fill="#e74c3c" font-family="Consolas, monospace" font-size="11">2.0 AU</text>

  <!-- Power bars on right side -->
  <rect x="40" y="470" width="720" height="100" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1"/>

  <text x="400" y="490" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="13" font-weight="bold">Power Output Comparison (Normalized to 1.0 AU Baseline)</text>

  <!-- 0.5 AU bar -->
  <rect x="65" y="498" width="100" height="22" rx="3" fill="url(#accent1)"/>
  <text x="115" y="513" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="11" font-weight="bold">0.5 AU</text>
  <rect x="170" y="507" width="168" height="8" rx="3" fill="#00d4ff" opacity="0.8"/>
  <text x="345" y="514" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">1.4x Power - 1800 sails</text>

  <!-- 1.0 AU bar -->
  <rect x="65" y="524" width="100" height="22" rx="3" fill="url(#accent3)"/>
  <text x="115" y="539" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="11" font-weight="bold">1.0 AU</text>
  <rect x="170" y="533" width="120" height="8" rx="3" fill="#2ecc71" opacity="0.8"/>
  <text x="345" y="540" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">1.0x Power - 2500 sails</text>

  <!-- 1.5 AU bar -->
  <rect x="65" y="550" width="100" height="22" rx="3" fill="url(#accent2)"/>
  <text x="115" y="565" text-anchor="middle" fill="#fff" font-family="Consolas, monospace" font-size="11" font-weight="bold">1.5 AU</text>
  <rect x="170" y="559" width="84" height="8" rx="3" fill="#ff6b35" opacity="0.8"/>
  <text x="345" y="566" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">0.7x Power - 3600 sails</text>

  <!-- Frame geometry info box -->
  <rect x="30" y="60" width="240" height="155" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1"/>

  <rect x="30" y="60" width="240" height="26" rx="6" fill="#0f3460"/>
  <rect x="30" y="76" width="240" height="10" fill="#0f3460"/>
  <text x="150" y="78" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="12" font-weight="bold">Frame Geometry Guide</text>

  <text x="45" y="102" fill="#8892b0" font-family="Consolas, monospace" font-size="11">Nodes: Start/end points for cells</text>
  <text x="45" y="118" fill="#8892b0" font-family="Consolas, monospace" font-size="11">Cell Lines: Connect nodes for sails</text>

  <line x1="45" y1="128" x2="255" y2="128" stroke="#0f3460" stroke-width="1"/>

  <text x="45" y="144" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">Node Distribution:</text>
  <text x="55" y="160" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">10 nodes -> 15% coverage</text>
  <text x="55" y="176" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">30 nodes -> 45% coverage</text>
  <text x="55" y="192" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">60 nodes -> 75% coverage</text>
  <text x="55" y="208" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">100+ nodes -> 90%+ coverage</text>

  <!-- Multi-layer design box -->
  <rect x="530" y="60" width="250" height="155" rx="6" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <rect x="530" y="60" width="250" height="26" rx="6" fill="#0f3460"/>
  <rect x="530" y="76" width="250" height="10" fill="#0f3460"/>
  <text x="655" y="78" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="12" font-weight="bold">Multi-Layer Design</text>

  <text x="545" y="100" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">Layer Config</text>
  <text x="640" y="100" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">Rel. Power</text>
  <text x="735" y="100" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">Efficiency</text>

  <line x1="540" y1="106" x2="770" y2="106" stroke="#0f3460" stroke-width="1"/>

  <text x="545" y="122" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">1 layer (0.5 AU)</text>
  <text x="640" y="122" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">100%</text>
  <text x="735" y="122" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">1.0</text>

  <text x="545" y="140" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">2 layers (0.5+1.0 AU)</text>
  <text x="640" y="140" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">170%</text>
  <text x="735" y="140" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">0.85</text>

  <text x="545" y="158" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">3 layers (0.5+1.0+1.5 AU)</text>
  <text x="640" y="158" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">220%</text>
  <text x="735" y="158" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">0.73</text>

  <text x="545" y="176" fill="#e0e0e0" font-family="Consolas, monospace" font-size="11">3 layers (optimal 0.3+0.6+0.9 AU)</text>
  <text x="640" y="176" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">310%</text>
  <text x="735" y="176" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">1.03</text>

  <rect x="545" y="182" width="220" height="26" rx="3" fill="rgba(46,204,113,0.1)" stroke="#2ecc71" stroke-width="0.8"/>
  <text x="655" y="199" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="9">Optimal: sparse inner, dense outer layers</text>

  <!-- Critical photon box -->
  <rect x="100" y="420" width="600" height="40" rx="6" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="436" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">Critical Photons: 0.5 AU sphere with 100% exposure = ~800 photons/day = ~100 MW power</text>
  <text x="400" y="452" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Use tidally locked planets inside sphere orbit for maximum Ray Receiver uptime</text>

  <!-- Legend -->
  <text x="400" y="408" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="11">---- Inner orbit (0.3-0.5 AU) produces most power per sail ----</text>

</svg>