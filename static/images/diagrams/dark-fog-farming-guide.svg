<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
<defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#1a9c4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8892b0"/>
    </marker>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
  </defs>
  <rect width="800" height="580" fill="url(#bg)" rx="8"/>
  <text x="400" y="36" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="18" font-weight="bold" filter="url(#glow)">Dark Fog Farm Design - Kill Zone Layout</text>
  <line x1="180" y1="46" x2="620" y2="46" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Dark Fog Base (center) -->
  <rect x="290" y="150" width="120" height="80" rx="8" fill="url(#box1)" stroke="#ff6b35" stroke-width="2"/>
  <text x="350" y="185" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="12" font-weight="bold">Dark Fog</text>
  <text x="350" y="205" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="12" font-weight="bold">Base Lv5+</text>

  <!-- Level indicator -->
  <rect x="420" y="155" width="60" height="22" rx="4" fill="rgba(255,107,53,0.2)" stroke="#ff6b35" stroke-width="0.8"/>
  <text x="450" y="171" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">Target</text>

  <!-- Attack wave arrows -->
  <path d="M 290 170 Q 240 170 220 200" fill="none" stroke="#ff6b35" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <path d="M 290 190 Q 230 190 210 230" fill="none" stroke="#ff6b35" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <path d="M 410 170 Q 470 170 490 200" fill="none" stroke="#ff6b35" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <path d="M 410 190 Q 480 190 500 230" fill="none" stroke="#ff6b35" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <path d="M 350 230 Q 350 270 350 290" fill="none" stroke="#ff6b35" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Perimeter wall -->
  <rect x="130" y="100" width="440" height="180" rx="10" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="140" y="94" fill="#00d4ff" font-family="Consolas, monospace" font-size="10">Perimeter Wall + Signal Towers</text>

  <!-- Turrets -->
  <rect x="145" y="115" width="60" height="22" rx="4" fill="#0f3460" stroke="#2ecc71" stroke-width="1"/>
  <text x="175" y="131" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="9">Missile x6</text>

  <rect x="145" y="250" width="60" height="22" rx="4" fill="#0f3460" stroke="#00d4ff" stroke-width="1"/>
  <text x="175" y="266" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="9">Laser x3</text>

  <rect x="495" y="115" width="60" height="22" rx="4" fill="#0f3460" stroke="#2ecc71" stroke-width="1"/>
  <text x="525" y="131" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="9">Missile x6</text>

  <rect x="495" y="250" width="60" height="22" rx="4" fill="#0f3460" stroke="#00d4ff" stroke-width="1"/>
  <text x="525" y="266" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="9">Laser x3</text>

  <!-- Drops area -->
  <rect x="300" y="290" width="100" height="30" rx="4" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/>
  <text x="350" y="310" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">Drop Items</text>

  <!-- Belt to storage -->
  <line x1="350" y1="320" x2="350" y2="360" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrow3)"/>
  <rect x="300" y="360" width="100" height="30" rx="4" fill="#1a1a4e" stroke="#2ecc71" stroke-width="1"/>
  <text x="350" y="380" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">Storage Chests</text>

  <!-- Drop table -->
  <rect x="20" y="420" width="760" height="28" rx="6" fill="#0f3460"/>
  <text x="400" y="439" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="13" font-weight="bold">Dark Fog Drop Table by Base Level</text>

  <rect x="30" y="455" width="120" height="22" rx="3" fill="#0f3460"/>
  <text x="90" y="471" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">Level 1-2</text>
  <rect x="160" y="455" width="200" height="22" rx="3" fill="#1a1a2e"/>
  <text x="260" y="471" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="11">Iron, Copper, Coal, Stone</text>

  <rect x="30" y="482" width="120" height="22" rx="3" fill="#0f3460"/>
  <text x="90" y="498" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">Level 3-4</text>
  <rect x="160" y="482" width="200" height="22" rx="3" fill="#1a1a2e"/>
  <text x="260" y="498" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="11">Circuit Boards, Silicon</text>

  <rect x="30" y="509" width="120" height="22" rx="3" fill="#0f3460"/>
  <text x="90" y="525" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="11" font-weight="bold">Level 5+</text>
  <rect x="160" y="509" width="200" height="22" rx="3" fill="#1a1a2e" stroke="#ff6b35" stroke-width="1"/>
  <text x="260" y="525" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="11">Processors, Q-Chips, Ti Alloy</text>

  <rect x="400" y="455" width="370" height="76" rx="4" fill="rgba(46,204,113,0.08)" stroke="#2ecc71" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="420" y="475" fill="#2ecc71" font-family="Consolas, monospace" font-size="11">Tip: Dont kill the base.</text>
  <text x="420" y="495" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Let it level up to Lv5+ for</text>
  <text x="420" y="512" fill="#8892b0" font-family="Consolas, monospace" font-size="10">high-tier component drops.</text>
  <text x="420" y="525" fill="#8892b0" font-family="Consolas, monospace" font-size="10">30-60 min per level cycle.</text>
</svg>