<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">

<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1a1a2e"/>
    <stop offset="100%" style="stop-color:#16213e"/>
  </linearGradient>
  <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#c0392b"/>
    <stop offset="100%" style="stop-color:#e74c3c"/>
  </linearGradient>
  <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#27ae60"/>
    <stop offset="100%" style="stop-color:#2ecc71"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#2980b9"/>
    <stop offset="100%" style="stop-color:#3498db"/>
  </linearGradient>
  <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#d4a020"/>
    <stop offset="100%" style="stop-color:#f0c040"/>
  </linearGradient>
  <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#8e44ad"/>
    <stop offset="100%" style="stop-color:#9b59b6"/>
  </linearGradient>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
  </filter>
  <marker id="arrowYell" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d4a020"/>
  </marker>
  <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
  </marker>
  <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
  </marker>
  <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
  </marker>
</defs>
  <rect width="800" height="450" fill="url(#bg)" rx="8"/>
  <text x="400" y="28" font-family="Arial,sans-serif" font-size="18.7" fill="#aac" text-anchor="middle" font-weight="bold">GRAVITY MATRIX PRODUCTION WITH Mk.III PROLIFERATOR</text>
  <line x1="50" y1="38" x2="750" y2="38" stroke="#334" stroke-width="1"/>

  <text x="400" y="58" font-family="Arial,sans-serif" font-size="12" fill="#888" text-anchor="middle">All three ingredients + matrix lab proliferated = 4x production speed</text>

  <!-- Left column: Ingredients -->
  <!-- Line 1: Processors -->
  <rect x="15" y="75" width="150" height="55" rx="4" fill="#2a2a44" stroke="#3498db" stroke-width="1" filter="url(#shadow)"/>
  <text x="90" y="95" font-family="Arial,sans-serif" font-size="13" fill="#3498db" text-anchor="middle" font-weight="bold">Circuit + Microcrystal</text>
  <text x="90" y="112" font-family="Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Ingredients in</text>
  <text x="90" y="125" font-family="Arial,sans-serif" font-size="10.7" fill="#666" text-anchor="middle">Belt input</text>

  <!-- Arrow -->
  <line x1="165" y1="102" x2="195" y2="102" stroke="#d4a020" stroke-width="1.5" marker-end="url(#arrowYell)"/>

  <!-- Sprayer -->
  <rect x="195" y="80" width="120" height="45" rx="4" fill="#2a2a1e" stroke="#f0c040" stroke-width="1.5"/>
  <text x="255" y="100" font-family="Arial,sans-serif" font-size="13" fill="#f0c040" text-anchor="middle" font-weight="bold">Sprayer Mk.III</text>
  <text x="255" y="116" font-family="Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Sprays each ingoing item</text>

  <!-- Arrow -->
  <line x1="315" y1="102" x2="345" y2="102" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Processor Assembler -->
  <rect x="345" y="72" width="145" height="60" rx="4" fill="#1e2a3e" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="417" y="93" font-family="Arial,sans-serif" font-size="14" fill="#2ecc71" text-anchor="middle" font-weight="bold">Processor</text>
  <text x="417" y="110" font-family="Arial,sans-serif" font-size="11" fill="#ccc" text-anchor="middle">Assembler Mk.III</text>
  <text x="417" y="124" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">2x speed (sprayed)</text>

  <!-- Arrow going down -->
  <line x1="417" y1="132" x2="417" y2="170" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Line 2: Quantum Chips -->
  <rect x="15" y="180" width="150" height="55" rx="4" fill="#2a2a44" stroke="#3498db" stroke-width="1" filter="url(#shadow)"/>
  <text x="90" y="200" font-family="Arial,sans-serif" font-size="13" fill="#3498db" text-anchor="middle" font-weight="bold">Processor (from above)</text>
  <text x="90" y="217" font-family="Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">From Line 1 output</text>
  <text x="90" y="230" font-family="Arial,sans-serif" font-size="10.7" fill="#666" text-anchor="middle">Belted down</text>

  <line x1="165" y1="207" x2="195" y2="207" stroke="#d4a020" stroke-width="1.5" marker-end="url(#arrowYell)"/>

  <rect x="195" y="185" width="120" height="45" rx="4" fill="#2a2a1e" stroke="#f0c040" stroke-width="1.5"/>
  <text x="255" y="205" font-family="Arial,sans-serif" font-size="13" fill="#f0c040" text-anchor="middle" font-weight="bold">Sprayer Mk.III</text>
  <text x="255" y="221" font-family="Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Sprays each ingoing item</text>

  <line x1="315" y1="207" x2="345" y2="207" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="345" y="177" width="145" height="60" rx="4" fill="#1e2a1e" stroke="#2ecc71" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="417" y="198" font-family="Arial,sans-serif" font-size="14" fill="#2ecc71" text-anchor="middle" font-weight="bold">Quantum Chip</text>
  <text x="417" y="215" font-family="Arial,sans-serif" font-size="11" fill="#ccc" text-anchor="middle">Assembler Mk.III</text>
  <text x="417" y="229" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">2x speed (sprayed)</text>

  <line x1="417" y1="237" x2="417" y2="290" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Line 3: Plane Filters (right side) -->
  <rect x="15" y="285" width="150" height="55" rx="4" fill="#2a2a44" stroke="#3498db" stroke-width="1" filter="url(#shadow)"/>
  <text x="90" y="305" font-family="Arial,sans-serif" font-size="13" fill="#3498db" text-anchor="middle" font-weight="bold">Nanotube + Org. Crystal</text>
  <text x="90" y="322" font-family="Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Ingredients in</text>
  <text x="90" y="335" font-family="Arial,sans-serif" font-size="10.7" fill="#666" text-anchor="middle">Belt input</text>

  <line x1="165" y1="312" x2="195" y2="312" stroke="#d4a020" stroke-width="1.5" marker-end="url(#arrowYell)"/>

  <rect x="195" y="290" width="120" height="45" rx="4" fill="#2a2a1e" stroke="#f0c040" stroke-width="1.5"/>
  <text x="255" y="310" font-family="Arial,sans-serif" font-size="13" fill="#f0c040" text-anchor="middle" font-weight="bold">Sprayer Mk.III</text>
  <text x="255" y="326" font-family="Arial,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Sprays each ingoing item</text>

  <line x1="315" y1="312" x2="345" y2="312" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="345" y="282" width="145" height="60" rx="4" fill="#1e2a1e" stroke="#2ecc71" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="417" y="303" font-family="Arial,sans-serif" font-size="14" fill="#2ecc71" text-anchor="middle" font-weight="bold">Plane Filter</text>
  <text x="417" y="320" font-family="Arial,sans-serif" font-size="11" fill="#ccc" text-anchor="middle">Assembler Mk.III</text>
  <text x="417" y="334" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">2x speed (sprayed)</text>

  <!-- All three output to Matrix Lab -->
  <rect x="550" y="85" width="220" height="310" rx="8" fill="#1a1a2e" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="550" y="85" width="220" height="30" rx="8" fill="#8e44ad" opacity="0.3"/>
  <text x="660" y="104" font-family="Arial,sans-serif" font-size="16" fill="#9b59b6" text-anchor="middle" font-weight="bold">GRAVITY MATRIX</text>
  
  <text x="660" y="145" font-family="Arial,sans-serif" font-size="14" fill="#2ecc71" text-anchor="middle">Matrix Lab</text>
  <text x="660" y="165" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">Base time: 24 seconds</text>
  <text x="660" y="185" font-family="Arial,sans-serif" font-size="12" fill="#f0c040" text-anchor="middle">With Mk.III: 6 seconds</text>
  <text x="660" y="205" font-family="Arial,sans-serif" font-size="14" fill="#2ecc71" text-anchor="middle">4x Speed!</text>
  
  <line x1="565" y1="220" x2="755" y2="220" stroke="#9b59b6" stroke-width="0.5" opacity="0.4"/>

  <!-- Ingredients arriving -->
  <line x1="490" y1="102" x2="555" y2="140" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="508" y="132" font-family="Arial,sans-serif" font-size="10.7" fill="#3498db" text-anchor="end">Procs</text>

  <line x1="490" y1="207" x2="555" y2="207" stroke="#f0c040" stroke-width="1.5" marker-end="url(#arrowYell)"/>
  <text x="508" y="203" font-family="Arial,sans-serif" font-size="10.7" fill="#f0c040" text-anchor="end">Q-Chips</text>

  <line x1="490" y1="312" x2="555" y2="275" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="508" y="283" font-family="Arial,sans-serif" font-size="10.7" fill="#2ecc71" text-anchor="end">Filters</text>

  <!-- Results -->
  <rect x="575" y="240" width="170" height="70" rx="4" fill="#1e2a1e" stroke="#27ae60" stroke-width="1"/>
  <text x="660" y="262" font-family="Arial,sans-serif" font-size="13" fill="#2ecc71" text-anchor="middle" font-weight="bold">Output: 45/m</text>
  <text x="660" y="280" font-family="Arial,sans-serif" font-size="11" fill="#ccc" text-anchor="middle">Buildings Saved: 75%</text>
  <text x="660" y="296" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">vs. no proliferator</text>

  <rect x="575" y="325" width="170" height="50" rx="4" fill="#3a2020" stroke="#e74c3c" stroke-width="1"/>
  <text x="660" y="345" font-family="Arial,sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">Critical:</text>
  <text x="660" y="362" font-family="Arial,sans-serif" font-size="10.7" fill="#ccc" text-anchor="middle">Keep proliferator supply running!</text>
</svg>