<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="600" height="480">
  <defs>
    <linearGradient id="bgGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <filter id="glowTitan">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="480" rx="10" fill="url(#bgGrad3)" stroke="#1a2a4a" stroke-width="1"/>
  <text x="300" y="28" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="700" font-family="sans-serif"> Getting Titanium: The Complete Branch Workflow</text>
  <text x="300" y="46" text-anchor="middle" fill="#6b7c93" font-size="11" font-family="sans-serif">Step-by-step from scanning your first star to automated titanium belts</text>

  <!-- === Row 1: Scan -&gt; Fly (2 boxes side by side) === -->
  <!-- Box 1: Scan -->
  <rect x="20" y="60" width="270" height="120" rx="8" fill="#0d1624" stroke="#3b3a6a" stroke-width="1"/>
  <rect x="20" y="60" width="270" height="30" rx="8" fill="#2a2a5a"/>
  <rect x="20" y="80" width="270" height="10" fill="#2a2a5a"/>
  <text x="155" y="80" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700" font-family="sans-serif">Step 1: Scan for Titanium</text>
  <text x="30" y="108" fill="#8b95ad" font-size="10" font-family="sans-serif">Open the Starmap (V key)</text>
  <text x="30" y="126" fill="#8b95ad" font-size="10" font-family="sans-serif">Filter by resource: Titanium</text>
  <text x="30" y="144" fill="#8b95ad" font-size="10" font-family="sans-serif">Look for a planet with "Titanium" tag</text>
  <text x="30" y="162" fill="#fbbf24" font-size="9" font-weight="600" font-family="sans-serif"> Bonus: pick one close to your start</text>
  <text x="30" y="176" fill="#fbbf24" font-size="9" font-weight="600" font-family="sans-serif">     with Solar Sails for easy power</text>

  <!-- Arrow -->
  <text x="310" y="120" text-anchor="middle" fill="#6b7c93" font-size="24" font-family="sans-serif">-&gt;</text>

  <!-- Box 2: Fly -->
  <rect x="310" y="60" width="270" height="120" rx="8" fill="#0d1624" stroke="#3b3a6a" stroke-width="1"/>
  <rect x="310" y="60" width="270" height="30" rx="8" fill="#2a2a5a"/>
  <rect x="310" y="80" width="270" height="10" fill="#2a2a5a"/>
  <text x="445" y="80" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700" font-family="sans-serif">Step 2: Fly There</text>
  <text x="320" y="108" fill="#8b95ad" font-size="10" font-family="sans-serif">Hold Shift + Drag destination star</text>
  <text x="320" y="126" fill="#8b95ad" font-size="10" font-family="sans-serif">Target: the planet you scouted</text>
  <text x="320" y="144" fill="#8b95ad" font-size="10" font-family="sans-serif">Cruise time: ~30-90 sec depending</text>
  <text x="320" y="162" fill="#8b95ad" font-size="10" font-family="sans-serif">on distance &amp; drive speed</text>
  <text x="320" y="178" fill="#f87171" font-size="9" font-weight="600" font-family="sans-serif">[!] Bring your mecha fuel rods!</text>

  <!-- === Down arrow === -->
  <text x="300" y="208" text-anchor="middle" fill="#6b7c93" font-size="20" font-family="sans-serif"></text>

  <!-- === Row 2: Mine + Throw Down ILS (wide box) === -->
  <rect x="20" y="218" width="560" height="90" rx="8" fill="#0d1624" stroke="#4a2a6a" stroke-width="1.5"/>
  <rect x="20" y="218" width="560" height="30" rx="8" fill="#3a2a5a"/>
  <rect x="20" y="238" width="560" height="10" fill="#3a2a5a"/>
  <text x="300" y="238" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="700" font-family="sans-serif">Step 3: Set Up Mining</text>

  <!-- Mine sub-box -->
  <rect x="30" y="256" width="248" height="42" rx="4" fill="#12102a" stroke="#4a2a6a" stroke-width="0.5"/>
  <text x="40" y="274" fill="#8b95ad" font-size="10" font-family="sans-serif"> Place mining machines on Titanium ore</text>
  <text x="40" y="292" fill="#8b95ad" font-size="10" font-family="sans-serif"> Let them fill ~200+ ore in inventory</text>

  <!-- ILS sub-box -->
  <rect x="310" y="256" width="260" height="42" rx="4" fill="#12102a" stroke="#4a2a6a" stroke-width="0.5"/>
  <text x="320" y="274" fill="#c084fc" font-size="10" font-weight="600" font-family="sans-serif"> Place an ILS nearby</text>
  <text x="320" y="292" fill="#8b95ad" font-size="10" font-family="sans-serif">Set Slot 1 -&gt; Supply / Titanium Ore</text>

  <!-- === Down arrow === -->
  <text x="300" y="328" text-anchor="middle" fill="#6b7c93" font-size="20" font-family="sans-serif"></text>

  <!-- === Row 3: Fly Back + Setup (2 boxes side by side) === -->
  <rect x="20" y="338" width="270" height="130" rx="8" fill="#0d1624" stroke="#3b3a6a" stroke-width="1"/>
  <rect x="20" y="338" width="270" height="30" rx="8" fill="#2a2a5a"/>
  <rect x="20" y="358" width="270" height="10" fill="#2a2a5a"/>
  <text x="155" y="358" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700" font-family="sans-serif">Step 4: Fly Back (With Ore)</text>
  <text x="30" y="386" fill="#8b95ad" font-size="10" font-family="sans-serif">Open inventory, grab all mined Titanium</text>
  <text x="30" y="404" fill="#8b95ad" font-size="10" font-family="sans-serif">Hold Shift and drag toward the star</text>
  <text x="30" y="422" fill="#8b95ad" font-size="10" font-family="sans-serif">Cruise home with a full inventory</text>
  <text x="30" y="444" fill="#fbbf24" font-size="9" font-weight="600" font-family="sans-serif"> Overweight? Leave a chest on the</text>
  <text x="30" y="460" fill="#fbbf24" font-size="9" font-weight="600" font-family="sans-serif">    titanium planet for buffer storage</text>

  <text x="310" y="418" text-anchor="middle" fill="#6b7c93" font-size="24" font-family="sans-serif">-&gt;</text>

  <rect x="310" y="338" width="270" height="130" rx="8" fill="#0d1624" stroke="#3b3a6a" stroke-width="1"/>
  <rect x="310" y="338" width="270" height="30" rx="8" fill="#2a2a5a"/>
  <rect x="310" y="358" width="270" height="10" fill="#2a2a5a"/>
  <text x="445" y="358" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700" font-family="sans-serif">Step 5: Smelt + Enjoy</text>
  <text x="320" y="386" fill="#8b95ad" font-size="10" font-family="sans-serif">Place Titanium ore in smelters</text>
  <text x="320" y="404" fill="#8b95ad" font-size="10" font-family="sans-serif">Each ore -&gt; 1 Titanium Ingot</text>
  <text x="320" y="422" fill="#8b95ad" font-size="10" font-family="sans-serif">Now you can craft titanium buildings:</text>
  <text x="320" y="440" fill="#4ade80" font-size="10" font-weight="600" font-family="sans-serif">[OK] Interstellar Logistics Station</text>
  <text x="320" y="456" fill="#4ade80" font-size="10" font-weight="600" font-family="sans-serif">[OK] T3 Belts [OK] Proliferator Mk.II</text>
</svg>
