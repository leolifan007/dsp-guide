<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 300" fill="none">
  <rect width="630" height="300" rx="8" fill="url(#bgR)"/>
  <defs>
    <linearGradient id="bgR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081a10"/>
      <stop offset="50%" stop-color="#0a2218"/>
      <stop offset="100%" stop-color="#0c2c1c"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Grid lines -->
  <path d="M0 150h630M315 0v300" stroke="rgba(34,197,94,0.06)" stroke-width="1"/>
  <!-- Crystal -->
  <polygon points="315,20 365,130 265,130" fill="url(#gem)" opacity="0.35"/>
  <polygon points="315,50 345,120 285,120" fill="url(#gem)" opacity="0.2"/>
  <!-- Small crystals -->
  <polygon points="130,200 160,260 100,260" fill="url(#gem)" opacity="0.2"/>
  <polygon points="500,180 520,230 480,230" fill="url(#gem)" opacity="0.25"/>
  <polygon points="460,60 475,100 445,100" fill="url(#gem)" opacity="0.15"/>
  <!-- Mine cart tracks -->
  <line x1="0" y1="270" x2="630" y2="270" stroke="rgba(34,197,94,0.1)" stroke-width="2"/>
  <line x1="0" y1="275" x2="630" y2="275" stroke="rgba(34,197,94,0.06)" stroke-width="1"/>
  <!-- Ore dots -->
  <circle cx="80" cy="120" r="3" fill="rgba(34,197,94,0.3)"/>
  <circle cx="100" cy="135" r="2" fill="rgba(34,197,94,0.2)"/>
  <circle cx="180" cy="220" r="2.5" fill="rgba(34,197,94,0.3)"/>
  <circle cx="550" cy="100" r="2" fill="rgba(34,197,94,0.25)"/>
  <circle cx="570" cy="120" r="3" fill="rgba(34,197,94,0.2)"/>
  <circle cx="420" cy="240" r="2.5" fill="rgba(34,197,94,0.2)"/>
  <!-- Title -->
  <text x="315" y="170" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="26" font-weight="700" fill="#22c55e" letter-spacing="2">RESOURCES &amp; MINING</text>
  <text x="315" y="210" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="14" fill="rgba(34,197,94,0.5)" letter-spacing="4">EXTRACTION &amp; REFINING</text>
</svg>