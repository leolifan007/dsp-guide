<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 300" fill="none">
  <rect width="630" height="300" rx="8" fill="url(#bgL)"/>
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080e1a"/>
      <stop offset="50%" stop-color="#0a1422"/>
      <stop offset="100%" stop-color="#0c1a2c"/>
    </linearGradient>
    <linearGradient id="belt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Grid lines -->
  <path d="M0 150h630M315 0v300" stroke="rgba(34,211,238,0.06)" stroke-width="1"/>
  <!-- Conveyor belt segments -->
  <line x1="60" y1="180" x2="570" y2="180" stroke="rgba(34,211,238,0.15)" stroke-width="6" stroke-linecap="round"/>
  <line x1="60" y1="200" x2="570" y2="200" stroke="rgba(34,211,238,0.08)" stroke-width="4" stroke-linecap="round"/>
  <!-- Conveyor arrows -->
  <polygon points="200,170 220,180 200,190" fill="rgba(34,211,238,0.3)"/>
  <polygon points="320,170 340,180 320,190" fill="rgba(34,211,238,0.25)"/>
  <polygon points="440,170 460,180 440,190" fill="rgba(34,211,238,0.2)"/>
  <!-- Interstellar station silhouette -->
  <rect x="250" y="60" width="130" height="80" rx="4" stroke="rgba(34,211,238,0.2)" stroke-width="2" fill="none"/>
  <rect x="270" y="75" width="90" height="50" rx="2" stroke="rgba(34,211,238,0.12)" stroke-width="1.5" fill="none"/>
  <!-- Drone paths -->
  <path d="M520 60 Q560 130 520 170" stroke="rgba(34,211,238,0.12)" stroke-width="1.5" fill="none" stroke-dasharray="4,4"/>
  <path d="M110 90 Q70 140 110 170" stroke="rgba(34,211,238,0.12)" stroke-width="1.5" fill="none" stroke-dasharray="4,4"/>
  <!-- Drones -->
  <circle cx="540" cy="110" r="4" fill="rgba(34,211,238,0.25)"/>
  <circle cx="90" cy="130" r="4" fill="rgba(34,211,238,0.25)"/>
  <!-- Cargo dots -->
  <circle cx="300" cy="140" r="2.5" fill="rgba(34,211,238,0.4)"/>
  <circle cx="330" cy="120" r="2" fill="rgba(34,211,238,0.3)"/>
  <!-- Title -->
  <text x="315" y="278" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="24" font-weight="700" fill="#22d3ee" letter-spacing="2">LOGISTICS &amp; TRANSPORT</text>
</svg>