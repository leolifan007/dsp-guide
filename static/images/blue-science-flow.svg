<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a2e"/><stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="800" height="520" rx="10" fill="url(#bgGrad)" stroke="#1a2a4a" stroke-width="1"/>
  <text x="400" y="28" text-anchor="middle" fill="#60a5fa" font-size="18.7" font-weight="700" font-family="sans-serif">Blue Matrix Production Chain</text>

  <!-- Step 1: Oil Extraction -->
  <rect x="60" y="50" width="160" height="70" rx="6" fill="#0f1a0f" stroke="#4a7a3a" stroke-width="1.5"/>
  <text x="140" y="75" text-anchor="middle" fill="#4ade80" font-size="14.7" font-weight="700" font-family="sans-serif">OIL EXTRACTOR</text>
  <text x="140" y="92" text-anchor="middle" fill="#6b7c93" font-size="12" font-family="sans-serif">On Oil Seep</text>
  <text x="140" y="108" text-anchor="middle" fill="#6b7c93" font-size="12" font-family="sans-serif">~60 Crude Oil/min</text>

  <line x1="220" y1="85" x2="280" y2="85" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: Refinery -->
  <rect x="280" y="50" width="160" height="70" rx="6" fill="#1a2a3a" stroke="#3a6a9a" stroke-width="1.5" filter="url(#glow)"/>
  <text x="360" y="75" text-anchor="middle" fill="#22d3ee" font-size="14.7" font-weight="700" font-family="sans-serif">REFINERY x3</text>
  <text x="360" y="92" text-anchor="middle" fill="#6b7c93" font-size="12" font-family="sans-serif">Crude Oil -&gt; Split</text>
  <text x="360" y="108" text-anchor="middle" fill="#fbbf24" font-size="12" font-family="sans-serif">~30 Oil + 20 H2/min</text>

  <!-- Split -->
  <circle cx="480" cy="85" r="5" fill="#f59e0b"/>
  <line x1="440" y1="85" x2="475" y2="85" stroke="#f59e0b" stroke-width="2"/>

  <!-- Up: Refined Oil -->
  <line x1="480" y1="85" x2="480" y2="40" stroke="#f59e0b" stroke-width="2"/>
  <line x1="480" y1="40" x2="550" y2="40" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <rect x="550" y="20" width="180" height="40" rx="6" fill="#1a2a0f" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="640" y="37" text-anchor="middle" fill="#fbbf24" font-size="13.3" font-weight="700" font-family="sans-serif">REFINED OIL</text>
  <text x="640" y="52" text-anchor="middle" fill="#6b7c93" font-size="10.7" font-family="sans-serif">~90/min total (x3)</text>

  <!-- Down: Hydrogen -->
  <line x1="480" y1="85" x2="480" y2="130" stroke="#f59e0b" stroke-width="2"/>
  <line x1="480" y1="130" x2="550" y2="130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <rect x="550" y="110" width="180" height="40" rx="6" fill="#1a0f2a" stroke="#8a5aae" stroke-width="1.2"/>
  <text x="640" y="127" text-anchor="middle" fill="#c084fc" font-size="13.3" font-weight="700" font-family="sans-serif">HYDROGEN</text>
  <text x="640" y="142" text-anchor="middle" fill="#6b7c93" font-size="10.7" font-family="sans-serif">~60/min total (x3)</text>

  <!-- Step 3: Processing (Refined Oil -&gt; Diamond + Crystal Silicon) -->
  <text x="400" y="195" text-anchor="middle" fill="#6b7c93" font-size="13.3" font-family="sans-serif">  PROCESSING  </text>

  <!-- Diamond path -->
  <line x1="640" y1="60" x2="640" y2="210" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="520" y="210" width="180" height="60" rx="6" fill="#0f1a0f" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="610" y="232" text-anchor="middle" fill="#fbbf24" font-size="13.3" font-weight="700" font-family="sans-serif">CHEM PLANT (x2)</text>
  <text x="610" y="250" text-anchor="middle" fill="#6b7c93" font-size="12" font-family="sans-serif">Ref Oil + Graphite</text>
  <text x="610" y="264" text-anchor="middle" fill="#4ade80" font-size="13.3" font-weight="600" font-family="sans-serif">-&gt; Diamond</text>

  <!-- Crystal Silicon path -->
  <line x1="640" y1="60" x2="130" y2="210" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="40" y="210" width="180" height="60" rx="6" fill="#0f1a0f" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="130" y="232" text-anchor="middle" fill="#fbbf24" font-size="13.3" font-weight="700" font-family="sans-serif">CHEM PLANT (x2)</text>
  <text x="130" y="250" text-anchor="middle" fill="#6b7c93" font-size="12" font-family="sans-serif">Ref Oil + Silicon Ore</text>
  <text x="130" y="264" text-anchor="middle" fill="#4ade80" font-size="13.3" font-weight="600" font-family="sans-serif">-&gt; Crystal Silicon</text>

  <!-- Hydrogen sink -->
  <line x1="640" y1="150" x2="400" y2="210" stroke="#8a5aae" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="310" y="210" width="180" height="60" rx="6" fill="#1a0f2a" stroke="#8a5aae" stroke-width="1.2"/>
  <text x="400" y="232" text-anchor="middle" fill="#c084fc" font-size="13.3" font-weight="700" font-family="sans-serif">H2 SINK (x1)</text>
  <text x="400" y="250" text-anchor="middle" fill="#6b7c93" font-size="12" font-family="sans-serif">Thermal / X-Ray Crack</text>
  <text x="400" y="264" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="600" font-family="sans-serif">Prevents Refinery stall</text>

  <!-- -&gt; Blue Matrix -->
  <line x1="130" y1="270" x2="130" y2="320" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="130" y1="320" x2="400" y2="320" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="610" y1="270" x2="610" y2="320" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="400" y1="320" x2="610" y2="320" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="400" y1="270" x2="400" y2="320" stroke="#4ade80" stroke-width="1.5"/>

  <!-- Titanium Ingot -->
  <rect x="90" y="320" width="180" height="45" rx="6" fill="#0f1a2a" stroke="#60a5fa" stroke-width="1"/>
  <text x="180" y="340" text-anchor="middle" fill="#22d3ee" font-size="13.3" font-weight="700" font-family="sans-serif">TITANIUM INGOT</text>
  <text x="180" y="356" text-anchor="middle" fill="#6b7c93" font-size="10.7" font-family="sans-serif">From off-world smelting</text>

  <!-- Matrix Lab -->
  <rect x="320" y="320" width="160" height="65" rx="6" fill="#1a2a3a" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="345" text-anchor="middle" fill="#22d3ee" font-size="16" font-weight="700" font-family="sans-serif">MATRIX LAB x6</text>
  <text x="400" y="362" text-anchor="middle" fill="#fbbf24" font-size="12" font-family="sans-serif">Diamond + Crystal Si</text>
  <text x="400" y="376" text-anchor="middle" fill="#fbbf24" font-size="12" font-family="sans-serif">+ Titanium Ingot</text>

  <!-- Blue Matrix output -->
  <line x1="480" y1="352" x2="580" y2="352" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="580" y="332" width="170" height="50" rx="6" fill="#0f1a2a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="665" y="355" text-anchor="middle" fill="#22d3ee" font-size="16" font-weight="700" font-family="sans-serif">BLUE MATRIX</text>
  <text x="665" y="373" text-anchor="middle" fill="#4ade80" font-size="14.7" font-family="sans-serif">~30/min</text>

  <!-- Bottom ratios -->
  <rect x="40" y="400" width="720" height="95" rx="6" fill="rgba(34,211,238,0.04)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="400" y="420" text-anchor="middle" fill="#22d3ee" font-size="14.7" font-weight="700" font-family="sans-serif">30 BLUE MATRIX/MIN - BUILD RATIOS</text>
  <text x="100" y="444" fill="#8b95ad" font-size="12" font-family="sans-serif">Oil Extractors: 4-6</text>
  <text x="300" y="444" fill="#8b95ad" font-size="12" font-family="sans-serif">Refineries: 3</text>
  <text x="500" y="444" fill="#8b95ad" font-size="12" font-family="sans-serif">Chem Plants (Diamond): 2</text>
  <text x="100" y="464" fill="#8b95ad" font-size="12" font-family="sans-serif">Chem Plants (Crystal Si): 2</text>
  <text x="300" y="464" fill="#8b95ad" font-size="12" font-family="sans-serif">X-Ray Cracker: 1</text>
  <text x="500" y="464" fill="#8b95ad" font-size="12" font-family="sans-serif">Matrix Labs: 6</text>
  <text x="100" y="484" fill="#8b95ad" font-size="12" font-family="sans-serif">Liq. Storage Tanks: 1-2</text>
</svg>