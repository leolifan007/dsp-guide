name: Scheduled Auto-Release

on:
  schedule:
    # 每天 09:11 CST (01:11 UTC) — 常规检查
    - cron: '11 1 * * *'
    # 周一三五 13:48 CST (05:48 UTC) — 补充检查
    - cron: '48 5 * * 1,3,5'
    # 周二四 17:23 CST (09:23 UTC) — 补充检查
    - cron: '23 9 * * 2,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: content-polishing
          fetch-depth: 0

      - name: Sync with main
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin main
          git merge origin/main --no-edit 2>&1 || echo "Sync complete (no changes needed)"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.152.2'
          extended: true

      - name: Auto-publish due articles
        id: publish
        run: |
          chmod +x .github/scripts/auto-publish.py
          python3 .github/scripts/auto-publish.py 2>&1 | tee publish-log.txt
          if git diff --name-only | grep -q "^content/"; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit auto-publish changes to content-polishing
        if: steps.publish.outputs.has_changes == 'true'
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "Auto-publish: $(date +'%Y-%m-%d %H:%M') [skip ci]"
          git push origin content-polishing

      - name: Build site with Hugo
        if: steps.publish.outputs.has_changes == 'true'
        run: |
          hugo --minify

      - name: Deploy to gh-pages
        if: steps.publish.outputs.has_changes == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          full_commit_message: 'Deploy: ${{ github.sha }} [skip ci]'

      - name: Merge to main
        if: steps.publish.outputs.has_changes == 'true'
        run: |
          git fetch origin main
          git checkout main
          git merge origin/content-polishing --no-edit
          git push origin main

      - name: No articles due (summary)
        if: steps.publish.outputs.has_changes == 'false'
        run: |
          echo "No articles due for release. Nothing to publish."
