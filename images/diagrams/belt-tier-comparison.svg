  <rect x="440" y="65" width="90" height="14" rx="3" fill="#F57F17"/>
  <text x="485" y="76" text-anchor="middle" fill="#FFF8E1" font-size="7" font-weight="bold" font-family="Inter,Segoe UI,monospace">YELLOW</text>

  <rect x="545" y="62" width="130" height="28" rx="4" fill="#263238" stroke="#546E7A" stroke-width="0.8"/>
