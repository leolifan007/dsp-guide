  <text x="485" y="114" text-anchor="middle" fill="#FFCDD2" font-size="7" font-weight="bold" font-family="Inter,Segoe UI,monospace">RED</text>

  <rect x="545" y="100" width="130" height="28" rx="4" fill="#263238" stroke="#546E7A" stroke-width="0.8"/>
