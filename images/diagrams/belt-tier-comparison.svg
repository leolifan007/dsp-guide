  <rect x="30" y="98" width="100" height="32" rx="5" fill="#B71C1C" stroke="#EF5350" stroke-width="1.2" filter="url(#dsBt)"/>
  <text x="80" y="118" text-anchor="middle" fill="#EF9A9A" font-size="12" font-weight="bold" font-family="Inter,Segoe UI,monospace">Mk.II</text>

  <rect x="150" y="103" width="130" height="22" rx="4" fill="#1a1a2e" stroke="#66BB6A" stroke-width="0.8"/>
  <rect x="155" y="107" width="120" height="14" rx="2" fill="#EF5350"/>
