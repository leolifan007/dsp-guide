  <!-- Row: Mk.III -->
  <rect x="30" y="136" width="100" height="32" rx="5" fill="#0D47A1" stroke="#42A5F5" stroke-width="1.5" filter="url(#dsBt)"/>
  <text x="80" y="156" text-anchor="middle" fill="#90CAF9" font-size="12" font-weight="bold" font-family="Inter,Segoe UI,monospace">Mk.III</text>

  <rect x="150" y="141" width="130" height="22" rx="4" fill="#1a1a2e" stroke="#66BB6A" stroke-width="0.8"/>
  <rect x="155" y="145" width="120" height="14" rx="2" fill="#42A5F5"/>
  <text x="215" y="156" text-anchor="middle" fill="#42A5F5" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">3 ore/s</text>

  <rect x="300" y="141" width="100" height="22" rx="4" fill="#0D47A1" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="350" y="156" text-anchor="middle" fill="#B3E5FC" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,monospace">x3</text>

  <rect x="440" y="141" width="90" height="14" rx="3" fill="#1565C0"/>
  <text x="485" y="152" text-anchor="middle" fill="#E1F5FE" font-size="7" font-weight="bold" font-family="Inter,Segoe UI,monospace">BLUE OK</text>

  <rect x="545" y="138" width="130" height="28" rx="4" fill="#1B5E20" stroke="#66BB6A" stroke-width="1"/>
  <text x="610" y="153" text-anchor="middle" fill="#66BB6A" font-size="8" font-weight="bold" font-family="Inter,Segoe UI,monospace">Recommended</text>
