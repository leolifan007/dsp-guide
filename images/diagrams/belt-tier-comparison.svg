  <rect x="300" y="103" width="100" height="22" rx="4" fill="#1a1a2e" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="350" y="118" text-anchor="middle" fill="#B3E5FC" font-size="11" font-family="Inter,Segoe UI,monospace">x2</text>

