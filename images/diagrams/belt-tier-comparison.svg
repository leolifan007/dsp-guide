<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" width="680" height="200">
  <defs>
    <filter id="dsBt"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <rect width="680" height="200" fill="#0d1117" rx="8"/>
  <rect x="4" y="4" width="672" height="192" fill="none" stroke="#1c2333" stroke-width="0.5" rx="6"/>

  <text x="340" y="24" text-anchor="middle" fill="#8B949E" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,monospace" letter-spacing="1">BELT TIER COMPARISON</text>

  <!-- Headers -->
  <text x="80" y="46" text-anchor="middle" fill="#8B949E" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">TIER</text>
  <text x="220" y="46" text-anchor="middle" fill="#8B949E" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">THROUGHPUT</text>
  <text x="360" y="46" text-anchor="middle" fill="#8B949E" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">SMELTERS</text>
  <text x="480" y="46" text-anchor="middle" fill="#8B949E" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">VISUAL</text>
  <text x="620" y="46" text-anchor="middle" fill="#8B949E" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">USE CASE</text>

  <line x1="20" y1="52" x2="660" y2="52" stroke="#30363d" stroke-width="0.8"/>

  <!-- Row: Mk.I -->
  <rect x="30" y="60" width="100" height="32" rx="5" fill="#5D4037" stroke="#FFB300" stroke-width="1.2" filter="url(#dsBt)"/>
  <text x="80" y="80" text-anchor="middle" fill="#FFB74D" font-size="12" font-weight="bold" font-family="Inter,Segoe UI,monospace">Mk.I</text>

  <rect x="150" y="65" width="130" height="22" rx="4" fill="#1a1a2e" stroke="#66BB6A" stroke-width="0.8"/>
  <rect x="155" y="69" width="120" height="14" rx="2" fill="#FFB300"/>
  <text x="215" y="80" text-anchor="middle" fill="#FFB300" font-size="9" font-weight="bold" font-family="Inter,Segoe UI,monospace">1 ore/s</text>

  <rect x="300" y="65" width="100" height="22" rx="4" fill="#1a1a2e" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="350" y="80" text-anchor="middle" fill="#B3E5FC" font-size="11" font-family="Inter,Segoe UI,monospace">x1</text>

