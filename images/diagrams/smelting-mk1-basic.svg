<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160">
  <defs>
    <marker id="aOre" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#FF8A65"/>
    </marker>
    <marker id="aIngot" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#4FC3F7"/>
    </marker>
    <marker id="aBus" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#AB47BC"/>
    </marker>
    <filter id="ds2"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <rect width="720" height="160" fill="#0d1117" rx="8"/>
  <rect x="4" y="4" width="712" height="152" fill="none" stroke="#1c2333" stroke-width="0.5" rx="6"/>

  <text x="360" y="25" text-anchor="middle" fill="#78909C" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,monospace" letter-spacing="1">BASIC COLUMN - Mk.I BELT</text>

  <!-- Miner x1 -->
  <rect x="30" y="45" width="110" height="70" rx="8" fill="#37474F" stroke="#78909C" stroke-width="1.2" filter="url(#ds2)"/>
  <text x="85" y="72" text-anchor="middle" fill="#CFD8DC" font-size="12" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> MINER</text>
  <text x="85" y="90" text-anchor="middle" fill="#FFB74D" font-size="10" font-family="Inter,Segoe UI,monospace">1 ore/s</text>
  <text x="85" y="105" text-anchor="middle" fill="#78909C" font-size="9" font-family="Inter,Segoe UI,monospace">x1 vein</text>

  <!-- Arrow -->
  <line x1="140" y1="80" x2="195" y2="80" stroke="#FF8A65" stroke-width="2.5" marker-end="url(#aOre)"/>
  <text x="168" y="72" text-anchor="middle" fill="#FF8A65" font-size="8" font-family="Inter,Segoe UI,monospace">Mk.I</text>

  <!-- Smelter x1 -->
  <rect x="198" y="45" width="110" height="70" rx="8" fill="#1B5E20" stroke="#66BB6A" stroke-width="1.2" filter="url(#ds2)"/>
  <text x="253" y="72" text-anchor="middle" fill="#E8F5E9" font-size="12" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> SMELT</text>
  <text x="253" y="90" text-anchor="middle" fill="#A5D6A7" font-size="10" font-family="Inter,Segoe UI,monospace">1/s</text>
  <text x="253" y="105" text-anchor="middle" fill="#81C784" font-size="9" font-family="Inter,Segoe UI,monospace">-> ingot</text>

  <!-- Arrow -->
  <line x1="308" y1="80" x2="363" y2="80" stroke="#4FC3F7" stroke-width="2.5" marker-end="url(#aIngot)"/>
  <text x="336" y="72" text-anchor="middle" fill="#4FC3F7" font-size="8" font-family="Inter,Segoe UI,monospace">Mk.I</text>

  <!-- Output -->
  <rect x="366" y="45" width="110" height="70" rx="8" fill="#3E2723" stroke="#8D6E63" stroke-width="1.2" filter="url(#ds2)"/>
  <text x="421" y="72" text-anchor="middle" fill="#D7CCC8" font-size="12" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> INGOT</text>
  <text x="421" y="90" text-anchor="middle" fill="#BCAAA4" font-size="10" font-family="Inter,Segoe UI,monospace">1/s</text>
  <text x="421" y="105" text-anchor="middle" fill="#A1887F" font-size="9" font-family="Inter,Segoe UI,monospace">Iron/Cu</text>

  <!-- Arrow to Factory -->
  <line x1="476" y1="80" x2="530" y2="80" stroke="#AB47BC" stroke-width="2" marker-end="url(#aBus)" stroke-dasharray="5,3"/>

  <!-- Factory -->
  <rect x="533" y="50" width="150" height="60" rx="8" fill="#0D47A1" stroke="#42A5F5" stroke-width="1.2" filter="url(#ds2)"/>
  <text x="608" y="76" text-anchor="middle" fill="#B3E5FC" font-size="12" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> FACTORY</text>
  <text x="608" y="94" text-anchor="middle" fill="#90CAF9" font-size="9" font-family="Inter,Segoe UI,monospace">Downstream</text>

  <!-- Bottom label -->
  <text x="360" y="140" text-anchor="middle" fill="#8D6E63" font-size="9" font-family="Inter,Segoe UI,monospace">Simple 1:1:1 ratio - doesn't scale, replace with Mk.III column as soon as possible</text>
</svg>