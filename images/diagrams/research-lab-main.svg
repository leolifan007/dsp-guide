<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" width="780" height="460">
  <defs>
    <marker id="arrS" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#FF8A65"/>
    </marker>
    <marker id="arrL" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#CE93D8"/>
    </marker>
    <filter id="dsR"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.45"/></filter>
    <linearGradient id="gRed" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C62828"/><stop offset="100%" stop-color="#8E0000"/></linearGradient>
    <linearGradient id="gYel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F9A825"/><stop offset="100%" stop-color="#C17900"/></linearGradient>
    <linearGradient id="gGrn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#1B5E20"/></linearGradient>
    <linearGradient id="gBlu" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1565C0"/><stop offset="100%" stop-color="#0D47A1"/></linearGradient>
    <linearGradient id="gPur" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6A1B9A"/><stop offset="100%" stop-color="#4A148C"/></linearGradient>
    <linearGradient id="gLab" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#37474F"/><stop offset="100%" stop-color="#263238"/></linearGradient>
  </defs>

  <rect width="780" height="460" fill="#0d1117" rx="10"/>
  <rect x="4" y="4" width="772" height="452" fill="none" stroke="#1c2333" stroke-width="0.5" rx="8"/>

  <text x="390" y="30" text-anchor="middle" fill="#E8EAED" font-size="16" font-weight="bold" font-family="Inter,Segoe UI,sans-serif" letter-spacing="1.5">SCIENCE PACK CHAIN -> RESEARCH LABS</text>
  <text x="390" y="46" text-anchor="middle" fill="#8B949E" font-size="10" font-family="Inter,Segoe UI,monospace">Each lab consumes 1 pack/s - Scale assemblers to match lab count</text>

  <!-- ------ SCIENCE PACKS (5 tiers) ------ -->
  <!-- Red Science -->
  <rect x="25" y="65" width="130" height="55" rx="8" fill="url(#gRed)" stroke="#EF5350" stroke-width="1.2" filter="url(#dsR)"/>
  <text x="90" y="86" text-anchor="middle" fill="#FFCDD2" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> RED</text>
  <text x="90" y="102" text-anchor="middle" fill="#EF9A9A" font-size="9" font-family="Inter,Segoe UI,monospace">Fe + Cu -> Pack</text>
  <text x="90" y="114" text-anchor="middle" fill="#E57373" font-size="8" font-family="Inter,Segoe UI,monospace">Tier 1</text>

  <!-- Yellow Science -->
  <rect x="170" y="65" width="130" height="55" rx="8" fill="url(#gYel)" stroke="#FFD54F" stroke-width="1.2" filter="url(#dsR)"/>
  <text x="235" y="86" text-anchor="middle" fill="#FFF8E1" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> YELLOW</text>
  <text x="235" y="102" text-anchor="middle" fill="#FFE082" font-size="9" font-family="Inter,Segoe UI,monospace">Fex2 + EM Turb</text>
  <text x="235" y="114" text-anchor="middle" fill="#FFCA28" font-size="8" font-family="Inter,Segoe UI,monospace">Tier 2</text>

  <!-- Green Science -->
  <rect x="315" y="65" width="130" height="55" rx="8" fill="url(#gGrn)" stroke="#66BB6A" stroke-width="1.2" filter="url(#dsR)"/>
  <text x="380" y="86" text-anchor="middle" fill="#E8F5E9" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> GREEN</text>
  <text x="380" y="102" text-anchor="middle" fill="#A5D6A7" font-size="9" font-family="Inter,Segoe UI,monospace">Fe + Belt + Sort</text>
  <text x="380" y="114" text-anchor="middle" fill="#81C784" font-size="8" font-family="Inter,Segoe UI,monospace">Tier 3</text>

  <!-- Blue Science -->
  <rect x="460" y="65" width="130" height="55" rx="8" fill="url(#gBlu)" stroke="#42A5F5" stroke-width="1.2" filter="url(#dsR)"/>
  <text x="525" y="86" text-anchor="middle" fill="#E1F5FE" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> BLUE</text>
  <text x="525" y="102" text-anchor="middle" fill="#81D4FA" font-size="9" font-family="Inter,Segoe UI,monospace">Oil + H2 + Prolif</text>
  <text x="525" y="114" text-anchor="middle" fill="#4FC3F7" font-size="8" font-family="Inter,Segoe UI,monospace">Tier 4</text>

  <!-- Purple Science -->
  <rect x="605" y="65" width="130" height="55" rx="8" fill="url(#gPur)" stroke="#AB47BC" stroke-width="1.2" filter="url(#dsR)"/>
  <text x="670" y="86" text-anchor="middle" fill="#F3E5F5" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,sans-serif"> PURPLE</text>
  <text x="670" y="102" text-anchor="middle" fill="#CE93D8" font-size="9" font-family="Inter,Segoe UI,monospace">Ti Alloy + Si</text>
  <text x="670" y="114" text-anchor="middle" fill="#BA68C8" font-size="8" font-family="Inter,Segoe UI,monospace">Tier 5</text>

  <!-- Arrows from packs to belt -->
  <line x1="90" y1="120" x2="90" y2="155" stroke="#FF8A65" stroke-width="1.5" marker-end="url(#arrS)"/>
  <line x1="235" y1="120" x2="235" y2="155" stroke="#FF8A65" stroke-width="1.5" marker-end="url(#arrS)"/>
  <line x1="380" y1="120" x2="380" y2="155" stroke="#FF8A65" stroke-width="1.5" marker-end="url(#arrS)"/>
  <line x1="525" y1="120" x2="525" y2="155" stroke="#FF8A65" stroke-width="1.5" marker-end="url(#arrS)"/>
  <line x1="670" y1="120" x2="670" y2="155" stroke="#FF8A65" stroke-width="1.5" marker-end="url(#arrS)"/>

  <!-- Science Pack Belt -->
  <rect x="25" y="158" width="710" height="30" rx="6" fill="#1a1a2e" stroke="#FF8A65" stroke-width="1"/>
  <text x="390" y="178" text-anchor="middle" fill="#FF8A65" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,monospace">  SCIENCE PACK BELT  </text>

  <!-- Arrows to Labs -->
  <line x1="90" y1="188" x2="90" y2="210" stroke="#CE93D8" stroke-width="1.5" marker-end="url(#arrL)"/>
  <line x1="235" y1="188" x2="235" y2="210" stroke="#CE93D8" stroke-width="1.5" marker-end="url(#arrL)"/>
  <line x1="380" y1="188" x2="380" y2="210" stroke="#CE93D8" stroke-width="1.5" marker-end="url(#arrL)"/>
  <line x1="525" y1="188" x2="525" y2="210" stroke="#CE93D8" stroke-width="1.5" marker-end="url(#arrL)"/>
  <line x1="670" y1="188" x2="670" y2="210" stroke="#CE93D8" stroke-width="1.5" marker-end="url(#arrL)"/>

  <!-- Lab Row -->
  <rect x="50" y="213" width="80" height="65" rx="8" fill="url(#gLab)" stroke="#CE93D8" stroke-width="1.2" filter="url(#dsR)"/>
  <text x="90" y="240" text-anchor="middle" fill="#E1BEE7" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,sans-serif">LAB 1</text>
  <text x="90" y="256" text-anchor="middle" fill="#CE93D8" font-size="8" font-family="Inter,Segoe UI,monospace">1 pack/s</text>
  <text x="90" y="270" text-anchor="middle" fill="#AB47BC" font-size="8" font-family="Inter,Segoe UI,monospace">PWR Power</text>

  <rect x="195" y="213" width="80" height="65" rx="8" fill="url(#gLab)" stroke="#CE93D8" stroke-width="1.2" filter="url(#dsR)"/>
  <text x="235" y="240" text-anchor="middle" fill="#E1BEE7" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,sans-serif">LAB 2</text>
  <text x="235" y="256" text-anchor="middle" fill="#CE93D8" font-size="8" font-family="Inter,Segoe UI,monospace">1 pack/s</text>
  <text x="235" y="270" text-anchor="middle" fill="#AB47BC" font-size="8" font-family="Inter,Segoe UI,monospace">PWR Power</text>

  <rect x="340" y="213" width="80" height="65" rx="8" fill="url(#gLab)" stroke="#CE93D8" stroke-width="1.2" filter="url(#dsR)"/>
  <text x="380" y="240" text-anchor="middle" fill="#E1BEE7" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,sans-serif">LAB 3</text>
  <text x="380" y="256" text-anchor="middle" fill="#CE93D8" font-size="8" font-family="Inter,Segoe UI,monospace">1 pack/s</text>
  <text x="380" y="270" text-anchor="middle" fill="#AB47BC" font-size="8" font-family="Inter,Segoe UI,monospace">PWR Power</text>

  <rect x="485" y="213" width="80" height="65" rx="8" fill="url(#gLab)" stroke="#CE93D8" stroke-width="1.2" filter="url(#dsR)"/>
  <text x="525" y="240" text-anchor="middle" fill="#E1BEE7" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,sans-serif">LAB 4</text>
  <text x="525" y="256" text-anchor="middle" fill="#CE93D8" font-size="8" font-family="Inter,Segoe UI,monospace">1 pack/s</text>
  <text x="525" y="270" text-anchor="middle" fill="#AB47BC" font-size="8" font-family="Inter,Segoe UI,monospace">PWR Power</text>

  <rect x="630" y="213" width="80" height="65" rx="8" fill="url(#gLab)" stroke="#CE93D8" stroke-width="1.2" filter="url(#dsR)"/>
  <text x="670" y="240" text-anchor="middle" fill="#E1BEE7" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,sans-serif">LAB 5</text>
  <text x="670" y="256" text-anchor="middle" fill="#CE93D8" font-size="8" font-family="Inter,Segoe UI,monospace">1 pack/s</text>
  <text x="670" y="270" text-anchor="middle" fill="#AB47BC" font-size="8" font-family="Inter,Segoe UI,monospace">PWR Power</text>

  <!-- Power propagation -->
  <line x1="130" y1="245" x2="195" y2="245" stroke="#FFD54F" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="275" y1="245" x2="340" y2="245" stroke="#FFD54F" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="420" y1="245" x2="485" y2="245" stroke="#FFD54F" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="565" y1="245" x2="630" y2="245" stroke="#FFD54F" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="163" y="240" fill="#FFD54F" font-size="7" font-family="Inter,Segoe UI,monospace">PWR</text>
  <text x="308" y="240" fill="#FFD54F" font-size="7" font-family="Inter,Segoe UI,monospace">PWR</text>
  <text x="453" y="240" fill="#FFD54F" font-size="7" font-family="Inter,Segoe UI,monospace">PWR</text>
  <text x="598" y="240" fill="#FFD54F" font-size="7" font-family="Inter,Segoe UI,monospace">PWR</text>

  <!-- Output: Research -->
  <rect x="25" y="300" width="710" height="32" rx="6" fill="#1a1a2e" stroke="#AB47BC" stroke-width="1"/>
  <text x="390" y="321" text-anchor="middle" fill="#AB47BC" font-size="11" font-weight="bold" font-family="Inter,Segoe UI,monospace">  RESEARCH PROGRESS  </text>

  <!-- Priority order -->
  <text x="390" y="355" text-anchor="middle" fill="#E8EAED" font-size="12" font-weight="bold" font-family="Inter,Segoe UI,sans-serif">RESEARCH PRIORITY ORDER</text>

  <rect x="40" y="365" width="130" height="35" rx="6" fill="#C62828" stroke="#EF5350" stroke-width="1"/>
  <text x="105" y="380" text-anchor="middle" fill="#FFCDD2" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,monospace">1. RED</text>
  <text x="105" y="393" text-anchor="middle" fill="#EF9A9A" font-size="8" font-family="Inter,Segoe UI,monospace">Belt Mk.II</text>

  <polygon points="175,382 185,378 185,386" fill="#8B949E"/>

  <rect x="190" y="365" width="130" height="35" rx="6" fill="#C17900" stroke="#FFD54F" stroke-width="1"/>
  <text x="255" y="380" text-anchor="middle" fill="#FFF8E1" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,monospace">2. YELLOW</text>
  <text x="255" y="393" text-anchor="middle" fill="#FFE082" font-size="8" font-family="Inter,Segoe UI,monospace">Assembler Mk.II</text>

  <polygon points="325,382 335,378 335,386" fill="#8B949E"/>

  <rect x="340" y="365" width="130" height="35" rx="6" fill="#1B5E20" stroke="#66BB6A" stroke-width="1"/>
  <text x="405" y="380" text-anchor="middle" fill="#E8F5E9" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,monospace">3. GREEN</text>
  <text x="405" y="393" text-anchor="middle" fill="#A5D6A7" font-size="8" font-family="Inter,Segoe UI,monospace">Logistics Pill</text>

  <polygon points="475,382 485,378 485,386" fill="#8B949E"/>

  <rect x="490" y="365" width="130" height="35" rx="6" fill="#0D47A1" stroke="#42A5F5" stroke-width="1"/>
  <text x="555" y="380" text-anchor="middle" fill="#E1F5FE" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,monospace">4. BLUE</text>
  <text x="555" y="393" text-anchor="middle" fill="#81D4FA" font-size="8" font-family="Inter,Segoe UI,monospace">Oil + Hydrogen</text>

  <polygon points="625,382 635,378 635,386" fill="#8B949E"/>

  <rect x="640" y="365" width="95" height="35" rx="6" fill="#4A148C" stroke="#AB47BC" stroke-width="1"/>
  <text x="688" y="380" text-anchor="middle" fill="#F3E5F5" font-size="10" font-weight="bold" font-family="Inter,Segoe UI,monospace">5. PURPLE</text>
  <text x="688" y="393" text-anchor="middle" fill="#CE93D8" font-size="8" font-family="Inter,Segoe UI,monospace">Endgame</text>

  <!-- Bottom tip -->
  <rect x="25" y="415" width="710" height="30" rx="5" fill="#1a1a2e" stroke="#FFD54F" stroke-width="0.8"/>
  <text x="390" y="435" text-anchor="middle" fill="#FFD54F" font-size="9" font-family="Inter,Segoe UI,monospace"> 5 Labs x 1 pack/s = 5 packs/s required -> ~25 assemblers per science type at base speed</text>
</svg>