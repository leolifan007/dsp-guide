<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
<defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#1a9c4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8892b0"/>
    </marker>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
  </defs>
  <rect width="800" height="580" fill="url(#bg)" rx="8"/>
  <text x="400" y="36" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="18" font-weight="bold" filter="url(#glow)">Processor Factory - 200/min Production Chain</text>
  <line x1="170" y1="46" x2="630" y2="46" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Row 1: Raw inputs -->
  <rect x="20" y="70" width="760" height="28" rx="6" fill="#0f3460"/>
  <text x="400" y="89" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="13" font-weight="bold">Raw Inputs</text>

  <rect x="30" y="108" width="100" height="36" rx="4" fill="#1a1a2e" stroke="#8892b0" stroke-width="1"/>
  <text x="80" y="131" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Iron Ore</text>
  <rect x="150" y="108" width="100" height="36" rx="4" fill="#1a1a2e" stroke="#8892b0" stroke-width="1"/>
  <text x="200" y="131" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Copper Ore</text>
  <rect x="270" y="108" width="100" height="36" rx="4" fill="#1a1a2e" stroke="#8892b0" stroke-width="1"/>
  <text x="320" y="131" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Silicon Ore</text>
  <rect x="390" y="108" width="120" height="36" rx="4" fill="#1a1a2e" stroke="#ff6b35" stroke-width="1"/>
  <text x="450" y="124" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="10">Fractal Silicon</text>
  <text x="450" y="138" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="9">(optional)</text>
  <rect x="530" y="108" width="100" height="36" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1"/>
  <text x="580" y="131" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="10">Coal</text>

  <!-- Arrow down -->
  <path d="M 130 150 L 130 175" fill="none" stroke="#8892b0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2: Smelting -->
  <rect x="20" y="185" width="760" height="28" rx="6" fill="#0f3460"/>
  <text x="400" y="204" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="13" font-weight="bold">Smelting</text>

  <rect x="30" y="222" width="100" height="30" rx="4" fill="url(#box1)" stroke="#8892b0" stroke-width="0.8"/>
  <text x="80" y="242" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Iron -> Gear</text>
  <rect x="150" y="222" width="100" height="30" rx="4" fill="url(#box1)" stroke="#8892b0" stroke-width="0.8"/>
  <text x="200" y="242" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Cu -> Cu Ingot</text>
  <rect x="270" y="222" width="100" height="30" rx="4" fill="url(#box1)" stroke="#8892b0" stroke-width="0.8"/>
  <text x="320" y="242" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Si -> Si Ingot</text>
  <rect x="390" y="222" width="120" height="30" rx="4" fill="url(#box1)" stroke="#2ecc71" stroke-width="0.8"/>
  <text x="450" y="242" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="10">FracSi -> CrystSi</text>
  <rect x="530" y="222" width="100" height="30" rx="4" fill="url(#box1)" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="580" y="242" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="10">Coal -> Graphite</text>

  <!-- Arrow down -->
  <path d="M 130 258 L 130 285" fill="none" stroke="#8892b0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 3: Intermediates -->
  <rect x="20" y="295" width="760" height="28" rx="6" fill="#0f3460"/>
  <text x="400" y="314" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="13" font-weight="bold">Intermediate Components</text>

  <rect x="30" y="332" width="140" height="40" rx="4" fill="url(#box1)" stroke="#00d4ff" stroke-width="1"/>
  <text x="100" y="350" text-anchor="middle" fill="#00d4ff" font-family="Consolas, monospace" font-size="10">Circuit Board</text>
  <text x="100" y="365" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="9">400/min</text>

  <rect x="190" y="332" width="140" height="40" rx="4" fill="url(#box1)" stroke="#2ecc71" stroke-width="1"/>
  <text x="260" y="350" text-anchor="middle" fill="#2ecc71" font-family="Consolas, monospace" font-size="10">Crystal Silicon</text>
  <text x="260" y="365" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="9">400/min</text>

  <!-- Arrow to final -->
  <path d="M 100 375 L 100 400" fill="none" stroke="#8892b0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 260 375 L 260 400" fill="none" stroke="#8892b0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 4: Final Assembly -->
  <rect x="20" y="410" width="760" height="28" rx="6" fill="#0f3460"/>
  <text x="400" y="429" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="13" font-weight="bold">Final Assembly</text>

  <rect x="250" y="445" width="120" height="45" rx="6" fill="#1a1a4e" stroke="#ff6b35" stroke-width="2"/>
  <text x="310" y="465" text-anchor="middle" fill="#ff6b35" font-family="Consolas, monospace" font-size="13" font-weight="bold">Processor</text>
  <text x="310" y="483" text-anchor="middle" fill="#8892b0" font-family="Consolas, monospace" font-size="10">200/min</text>

  <!-- Bottom tip -->
  <rect x="430" y="448" width="330" height="42" rx="4" fill="rgba(0,212,255,0.06)" stroke="#00d4ff" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="450" y="468" fill="#00d4ff" font-family="Consolas, monospace" font-size="11">Tip: Use Fractal Silicon to bypass Crystal Si.</text>
  <text x="450" y="485" fill="#8892b0" font-family="Consolas, monospace" font-size="10">Found on Ash/Desert planets (see Rare Resources).</text>
</svg>