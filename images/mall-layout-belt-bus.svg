<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 280" width="650" height="280">
  <defs>
    <linearGradient id="bg"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0d1117"/></linearGradient>
    <linearGradient id="in"><stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#FBBF24"/></linearGradient>
    <linearGradient id="as"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#60A5FA"/></linearGradient>
    <linearGradient id="bx"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#A78BFA"/></linearGradient>
  </defs>
  <rect width="650" height="280" fill="url(#bg)"/>
  <text x="325" y="25" text-anchor="middle" fill="#ECEFF1" font-size="15" font-family="monospace" font-weight="bold">MALL LAYOUT - BELT BUS DESIGN</text>

  <!-- Belt bus (horizontal lanes) -->
  <rect x="30" y="50" width="590" height="50" rx="4" fill="#1F2937" stroke="#F59E0B" stroke-width="1"/>
  <text x="325" y="68" text-anchor="middle" fill="#FBBF24" font-size="11" font-family="monospace" font-weight="bold">BELT BUS (4-8 LANES)</text>
  <text x="325" y="85" text-anchor="middle" fill="#6B7280" font-size="9" font-family="monospace">Iron Ingots | Copper Ingots | Gears | Circuits | Magnetic Coils | Titanium | Processors</text>

  <!-- Lane seperator line -->
  <line x1="30" y1="100" x2="620" y2="100" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>

  <!-- Input arrows from bus to assemblers -->
  <line x1="100" y1="100" x2="100" y2="125" stroke="#60A5FA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="200" y1="100" x2="200" y2="125" stroke="#60A5FA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="300" y1="100" x2="300" y2="125" stroke="#60A5FA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="100" x2="400" y2="125" stroke="#60A5FA" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="500" y1="100" x2="500" y2="125" stroke="#60A5FA" stroke-width="1" marker-end="url(#arrow)"/>

  <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#60A5FA"/></marker>

  <!-- Assemblers row -->
  <rect x="65" y="125" width="70" height="50" rx="3" fill="#1F2937" stroke="#10B981" stroke-width="1.5"/>
  <text x="100" y="145" text-anchor="middle" fill="#34D399" font-size="8" font-family="monospace">Assembler</text>
  <text x="100" y="158" text-anchor="middle" fill="#6B7280" font-size="8" font-family="monospace">Belt Mk.I</text>
  <text x="100" y="168" text-anchor="middle" fill="#6B7280" font-size="7" font-family="monospace">1 iron each</text>

  <rect x="165" y="125" width="70" height="50" rx="3" fill="#1F2937" stroke="#10B981" stroke-width="1.5"/>
  <text x="200" y="145" text-anchor="middle" fill="#34D399" font-size="8" font-family="monospace">Assembler</text>
  <text x="200" y="158" text-anchor="middle" fill="#6B7280" font-size="8" font-family="monospace">Sorter Mk.I</text>
  <text x="200" y="168" text-anchor="middle" fill="#6B7280" font-size="7" font-family="monospace">Iron+Coil</text>

  <rect x="265" y="125" width="70" height="50" rx="3" fill="#1F2937" stroke="#10B981" stroke-width="1.5"/>
  <text x="300" y="145" text-anchor="middle" fill="#34D399" font-size="8" font-family="monospace">Assembler</text>
  <text x="300" y="158" text-anchor="middle" fill="#6B7280" font-size="8" font-family="monospace">Furnace</text>
  <text x="300" y="168" text-anchor="middle" fill="#6B7280" font-size="7" font-family="monospace">Brick+Coil</text>

  <rect x="365" y="125" width="70" height="50" rx="3" fill="#1F2937" stroke="#10B981" stroke-width="1.5"/>
  <text x="400" y="145" text-anchor="middle" fill="#34D399" font-size="8" font-family="monospace">Assembler</text>
  <text x="400" y="158" text-anchor="middle" fill="#6B7280" font-size="8" font-family="monospace">Miner</text>
  <text x="400" y="168" text-anchor="middle" fill="#6B7280" font-size="7" font-family="monospace">Gear+Circ</text>

  <rect x="465" y="125" width="70" height="50" rx="3" fill="#1F2937" stroke="#10B981" stroke-width="1.5"/>
  <text x="500" y="145" text-anchor="middle" fill="#34D399" font-size="8" font-family="monospace">Assembler</text>
  <text x="500" y="158" text-anchor="middle" fill="#6B7280" font-size="8" font-family="monospace">Wind Turbine</text>
  <text x="500" y="168" text-anchor="middle" fill="#6B7280" font-size="7" font-family="monospace">Coil+Circ</text>

  <!-- Output to boxes -->
  <line x1="100" y1="175" x2="100" y2="195" stroke="#A78BFA" stroke-width="1"/>
  <line x1="200" y1="175" x2="200" y2="195" stroke="#A78BFA" stroke-width="1"/>
  <line x1="300" y1="175" x2="300" y2="195" stroke="#A78BFA" stroke-width="1"/>
  <line x1="400" y1="175" x2="400" y2="195" stroke="#A78BFA" stroke-width="1"/>
  <line x1="500" y1="175" x2="500" y2="195" stroke="#A78BFA" stroke-width="1"/>

  <!-- Storage boxes row -->
  <rect x="65" y="195" width="70" height="30" rx="3" fill="#1F2937" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="100" y="213" text-anchor="middle" fill="#C4B5FD" font-size="9" font-family="monospace">BOX</text>
  <rect x="165" y="195" width="70" height="30" rx="3" fill="#1F2937" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="200" y="213" text-anchor="middle" fill="#C4B5FD" font-size="9" font-family="monospace">BOX</text>
  <rect x="265" y="195" width="70" height="30" rx="3" fill="#1F2937" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="300" y="213" text-anchor="middle" fill="#C4B5FD" font-size="9" font-family="monospace">BOX</text>
  <rect x="365" y="195" width="70" height="30" rx="3" fill="#1F2937" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="400" y="213" text-anchor="middle" fill="#C4B5FD" font-size="9" font-family="monospace">BOX</text>
  <rect x="465" y="195" width="70" height="30" rx="3" fill="#1F2937" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="500" y="213" text-anchor="middle" fill="#C4B5FD" font-size="9" font-family="monospace">BOX</text>

  <!-- Legend -->
  <rect x="30" y="238" width="590" height="30" rx="4" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="50" y="255" fill="#6B7280" font-size="10" font-family="monospace">Phase 1: 6 assemblers + 6 boxes = 80% of buildings covered | Phase 2: +6 assemblers = Mall Mk.II</text>
  <text x="50" y="265" fill="#6B7280" font-size="10" font-family="monospace">Phase 3: Replace belt bus with Logistics Station (12-20 assemblers, all buildings)</text>
</svg>
