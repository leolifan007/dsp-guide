<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320">
  <defs>
    <linearGradient id="bg"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0d1117"/></linearGradient>
    <linearGradient id="s1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#60A5FA"/></linearGradient>
    <linearGradient id="s2"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#A78BFA"/></linearGradient>
    <linearGradient id="s3"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34D399"/></linearGradient>
    <linearGradient id="s4"><stop offset="0%" stop-color="#DC2626"/><stop offset="100%" stop-color="#F87171"/></linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#EC4899"/></marker>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#10B981"/></marker>
  </defs>
  <rect width="680" height="320" fill="url(#bg)"/>
  <text x="340" y="25" text-anchor="middle" fill="#ECEFF1" font-size="15" font-family="monospace" font-weight="bold">ANTIMATTER POWER LOOP - SELF-SUSTAINING ENDGAME ENERGY</text>

  <!-- Step 1: Sphere -->
  <rect x="25" y="50" width="110" height="55" rx="4" fill="#1F2937" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="80" y="70" text-anchor="middle" fill="#60A5FA" font-size="9" font-family="monospace">1. Dyson Sphere</text>
  <text x="80" y="85" text-anchor="middle" fill="#9CA3AF" font-size="9" font-family="monospace">Ray Receivers x20-40</text>
  <text x="80" y="98" text-anchor="middle" fill="#6B7280" font-size="8" font-family="monospace">5-10 photons/min each</text>

  <line x1="135" y1="77" x2="165" y2="77" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Colliders -->
  <rect x="170" y="50" width="110" height="55" rx="4" fill="#1F2937" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="225" y="70" text-anchor="middle" fill="#A78BFA" font-size="9" font-family="monospace">2. Particle Collider</text>
  <text x="225" y="85" text-anchor="middle" fill="#9CA3AF" font-size="9" font-family="monospace">1 photon + 2 H2</text>
  <text x="225" y="98" text-anchor="middle" fill="#6B7280" font-size="8" font-family="monospace">= 2 Antimatter</text>

  <line x1="280" y1="77" x2="310" y2="77" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Fuel Rods -->
  <rect x="315" y="50" width="110" height="55" rx="4" fill="#1F2937" stroke="#34D399" stroke-width="1.5"/>
  <text x="370" y="70" text-anchor="middle" fill="#34D399" font-size="9" font-family="monospace">3. Fuel Rods</text>
  <text x="370" y="85" text-anchor="middle" fill="#9CA3AF" font-size="9" font-family="monospace">Antimatter + Ti Alloy</text>
  <text x="370" y="98" text-anchor="middle" fill="#6B7280" font-size="8" font-family="monospace">+ H2 + Processor</text>

  <line x1="425" y1="77" x2="455" y2="77" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Artificial Sun -->
  <rect x="460" y="50" width="110" height="55" rx="4" fill="#1F2937" stroke="#F87171" stroke-width="1.5"/>
  <text x="515" y="70" text-anchor="middle" fill="#F87171" font-size="9" font-family="monospace">4. Artificial Sun</text>
  <text x="515" y="85" text-anchor="middle" fill="#9CA3AF" font-size="9" font-family="monospace">37.5 MW per sun</text>
  <text x="515" y="98" text-anchor="middle" fill="#6B7280" font-size="8" font-family="monospace">1 rod / 200 sec</text>

  <!-- Power comparison section -->
  <rect x="25" y="125" width="630" height="50" rx="4" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="340" y="145" text-anchor="middle" fill="#F59E0B" font-size="11" font-family="monospace" font-weight="bold">POWER OUTPUT COMPARISON (1 Artificial Sun = 37.5 MW)</text>
  <text x="70" y="165" fill="#6B7280" font-size="10" font-family="monospace">Wind Turbine (0.3 MW)</text>
  <text x="220" y="165" fill="#6B7280" font-size="10" font-family="monospace">Thermal (2.1 MW)</text>
  <text x="370" y="165" fill="#6B7280" font-size="10" font-family="monospace">Fusion (9 MW)</text>
  <text x="520" y="165" fill="#F87171" font-size="10" font-family="monospace">SUN = all 3 combined</text>

  <!-- Efficiency bars -->
  <rect x="70" y="172" width="2" height="8" fill="#6B7280"/>
  <rect x="70" y="172" width="250" height="8" fill="none" stroke="#374151" stroke-width="0.5"/>
  <text x="320" y="180" fill="#6B7280" font-size="8" font-family="monospace">= 125 wind turbines</text>

  <!-- Stats row -->
  <rect x="25" y="195" width="630" height="55" rx="4" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="340" y="215" text-anchor="middle" fill="#10B981" font-size="11" font-family="monospace" font-weight="bold">LOOP MATH: 1 belt of fuel rods (60/min) = 600 artificial suns = 22.5 GW</text>

  <rect x="70" y="225" width="120" height="20" rx="3" fill="#1F2937" stroke="#60A5FA" stroke-width="1"/>
  <text x="130" y="238" text-anchor="middle" fill="#60A5FA" font-size="9" font-family="monospace">10 Receivers</text>

  <line x1="190" y1="235" x2="220" y2="235" stroke="#EC4899" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="225" y="225" width="100" height="20" rx="3" fill="#1F2937" stroke="#A78BFA" stroke-width="1"/>
  <text x="275" y="238" text-anchor="middle" fill="#A78BFA" font-size="9" font-family="monospace">3-4 Colliders</text>

  <line x1="325" y1="235" x2="355" y2="235" stroke="#EC4899" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="360" y="225" width="80" height="20" rx="3" fill="#1F2937" stroke="#34D399" stroke-width="1"/>
  <text x="400" y="238" text-anchor="middle" fill="#34D399" font-size="9" font-family="monospace">1 Assembler</text>

  <line x1="440" y1="235" x2="470" y2="235" stroke="#EC4899" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="475" y="225" width="80" height="20" rx="3" fill="#1F2937" stroke="#F87171" stroke-width="1"/>
  <text x="515" y="238" text-anchor="middle" fill="#F87171" font-size="9" font-family="monospace">10 Suns</text>

  <!-- Critical note -->
  <rect x="25" y="260" width="630" height="45" rx="4" fill="#1F2937" stroke="#DC2626" stroke-width="1"/>
  <text x="50" y="278" fill="#F87171" font-size="10" font-family="monospace" font-weight="bold">CAUTION: Hydrogen starvation is the #1 loop failure.</text>
  <text x="50" y="293" fill="#9CA3AF" font-size="9" font-family="monospace">Each collider needs 60 H2/min. 4-6 Orbital Collectors on a gas giant before scaling up.</text>
  <text x="50" y="303" fill="#9CA3AF" font-size="9" font-family="monospace">Buffer 2000-5000 photons + 2000-5000 antimatter before starting fuel rod production.</text>
</svg>
