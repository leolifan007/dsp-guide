<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#1a1a2a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="8" fill="url(#bg)"/>
  <!-- Sorter arm -->
  <rect x="12" y="28" width="40" height="8" rx="2" fill="#78909C" stroke="#90A4AE" stroke-width="0.8"/>
  <!-- Pivot point -->
  <circle cx="20" cy="32" r="5" fill="#546E7A" stroke="#78909C" stroke-width="1"/>
  <circle cx="20" cy="32" r="2" fill="#B0BEC5"/>
  <!-- Sorter head -->
  <polygon points="48,28 56,32 48,36" fill="#FFB74D" stroke="#FF9800" stroke-width="0.5"/>
</svg>
