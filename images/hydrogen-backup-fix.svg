<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">

<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1a1a2e"/>
    <stop offset="100%" style="stop-color:#16213e"/>
  </linearGradient>
  <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#c0392b"/>
    <stop offset="100%" style="stop-color:#e74c3c"/>
  </linearGradient>
  <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#27ae60"/>
    <stop offset="100%" style="stop-color:#2ecc71"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#2980b9"/>
    <stop offset="100%" style="stop-color:#3498db"/>
  </linearGradient>
  <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#d4a020"/>
    <stop offset="100%" style="stop-color:#f0c040"/>
  </linearGradient>
  <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#8e44ad"/>
    <stop offset="100%" style="stop-color:#9b59b6"/>
  </linearGradient>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
  </filter>
  <marker id="arrowYell" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d4a020"/>
  </marker>
  <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
  </marker>
  <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
  </marker>
  <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
  </marker>
</defs>
  <rect width="800" height="450" fill="url(#bg)" rx="8"/>
  <text x="400" y="28" font-family="Arial,sans-serif" font-size="18.7" fill="#aac" text-anchor="middle" font-weight="bold">HYDROGEN BACKUP FIX - OVERFLOW BURNING SYSTEM</text>
  <line x1="50" y1="38" x2="750" y2="38" stroke="#334" stroke-width="1"/>

  <!-- Oil Refinery -->
  <rect x="30" y="75" width="160" height="70" rx="6" fill="#2a2a44" stroke="#3498db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="100" font-family="Arial,sans-serif" font-size="16" fill="#3498db" text-anchor="middle" font-weight="bold">Oil Refinery</text>
  <text x="110" y="118" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">Produces Refined Oil</text>
  <text x="110" y="133" font-family="Arial,sans-serif" font-size="12" fill="#f88" text-anchor="middle">+ HYDROGEN (byproduct)</text>

  <!-- Arrow -->
  <line x1="190" y1="110" x2="235" y2="110" stroke="#d4a020" stroke-width="2" marker-end="url(#arrowYell)"/>

  <!-- Hydrogen Buffer Tank -->
  <rect x="230" y="75" width="140" height="70" rx="6" fill="#2a2a44" stroke="#d4a020" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="300" y="100" font-family="Arial,sans-serif" font-size="16" fill="#f0c040" text-anchor="middle" font-weight="bold">Hydrogen Tank</text>
  <text x="300" y="118" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">Buffer Storage</text>
  <text x="300" y="133" font-family="Arial,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Fills up over time</text>

  <!-- Arrow to Priority Splitter -->
  <line x1="370" y1="110" x2="415" y2="110" stroke="#f0c040" stroke-width="2" marker-end="url(#arrowYell)"/>

  <!-- Priority Splitter -->
  <rect x="410" y="55" width="140" height="110" rx="6" fill="#2a2244" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="78" font-family="Arial,sans-serif" font-size="16" fill="#9b59b6" text-anchor="middle" font-weight="bold">Priority Splitter</text>
  <line x1="425" y1="88" x2="535" y2="88" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="480" y="105" font-family="Arial,sans-serif" font-size="12" fill="#2ecc71" text-anchor="middle">=== PRIORITY ===</text>
  <text x="480" y="122" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">Main line gets hydrogen first</text>
  <text x="480" y="140" font-family="Arial,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Overflow goes to burn</text>
  <text x="480" y="158" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">*critical for science stability*</text>

  <!-- Arrow down to Thermal -->
  <line x1="480" y1="165" x2="480" y2="210" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Thermal Plants (overflow path) -->
  <rect x="380" y="210" width="200" height="100" rx="6" fill="#3a2020" stroke="#c0392b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="235" font-family="Arial,sans-serif" font-size="16" fill="#e74c3c" text-anchor="middle" font-weight="bold">Thermal Plants</text>
  <text x="480" y="255" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">Burn excess hydrogen</text>
  <text x="480" y="270" font-family="Arial,sans-serif" font-size="12" fill="#2ecc71" text-anchor="middle">Free power from overflow</text>
  <text x="480" y="285" font-family="Arial,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Self-regulating: more backup = more power</text>
  <text x="480" y="302" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">3-4 generators handle all overflow</text>

  <!-- Arrow up-right to Factory (main line) -->
  <line x1="550" y1="110" x2="610" y2="110" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Factory -->
  <rect x="605" y="75" width="160" height="70" rx="6" fill="#1e2a1e" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="685" y="100" font-family="Arial,sans-serif" font-size="16" fill="#2ecc71" text-anchor="middle" font-weight="bold">Main Factory</text>
  <text x="685" y="118" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">Red Science + Graphite</text>
  <text x="685" y="133" font-family="Arial,sans-serif" font-size="12" fill="#aac" text-anchor="middle">Never starved</text>

  <!-- Result banner -->
  <rect x="160" y="340" width="470" height="40" rx="6" fill="url(#greenGrad)" opacity="0.85"/>
  <text x="395" y="365" font-family="Arial,sans-serif" font-size="18.7" fill="#fff" text-anchor="middle" font-weight="bold">RESULT: SELF-REGULATING SYSTEM - FACTORY NEVER STOPS</text>

  <text x="400" y="410" font-family="Arial,sans-serif" font-size="12" fill="#888" text-anchor="middle">Priority splitter ensures science always gets hydrogen. Overflow is automatically burned for power. Zero maintenance.</text>
  <text x="400" y="430" font-family="Arial,sans-serif" font-size="10.7" fill="#666" text-anchor="middle">One thermal plant at 100% upkeep = ~2MW of free hydrogen power</text>
</svg>