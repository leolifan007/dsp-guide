<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">

<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#1a1a2e"/>
    <stop offset="100%" style="stop-color:#16213e"/>
  </linearGradient>
  <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#c0392b"/>
    <stop offset="100%" style="stop-color:#e74c3c"/>
  </linearGradient>
  <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#27ae60"/>
    <stop offset="100%" style="stop-color:#2ecc71"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#2980b9"/>
    <stop offset="100%" style="stop-color:#3498db"/>
  </linearGradient>
  <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#d4a020"/>
    <stop offset="100%" style="stop-color:#f0c040"/>
  </linearGradient>
  <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#8e44ad"/>
    <stop offset="100%" style="stop-color:#9b59b6"/>
  </linearGradient>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
  </filter>
  <marker id="arrowYell" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d4a020"/>
  </marker>
  <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
  </marker>
  <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
  </marker>
  <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
  </marker>
</defs>
  <rect width="800" height="350" fill="url(#bg)" rx="8"/>
  <text x="400" y="28" font-family="Arial,sans-serif" font-size="18.7" fill="#aac" text-anchor="middle" font-weight="bold">ILS REMOTE vs LOCAL SETTINGS - WHO PICKS UP WHAT</text>
  <line x1="50" y1="38" x2="750" y2="38" stroke="#334" stroke-width="1"/>

  <!-- Local Section -->
  <rect x="20" y="55" width="360" height="135" rx="6" fill="#2a2a44" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="55" width="360" height="28" rx="6" fill="#3498db" opacity="0.3"/>
  <text x="200" y="73" font-family="Arial,sans-serif" font-size="16" fill="#3498db" text-anchor="middle" font-weight="bold">LOCAL (Drone - Yellow Icon)</text>
  <line x1="30" y1="90" x2="370" y2="90" stroke="#3498db" stroke-width="0.5" opacity="0.4"/>
  
  <rect x="35" y="100" width="145" height="75" rx="4" fill="#1e2a3e" stroke="#3498db" stroke-width="1"/>
  <text x="107" y="120" font-family="Arial,sans-serif" font-size="14" fill="#2ecc71" text-anchor="middle" font-weight="bold">Local Supply</text>
  <text x="107" y="138" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">Drones can pick up</text>
  <text x="107" y="152" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">from THIS station</text>
  <text x="107" y="168" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">Same planet only</text>

  <rect x="220" y="100" width="145" height="75" rx="4" fill="#1e2a3e" stroke="#3498db" stroke-width="1"/>
  <text x="293" y="120" font-family="Arial,sans-serif" font-size="14" fill="#9b59b6" text-anchor="middle" font-weight="bold">Local Demand</text>
  <text x="293" y="138" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">Drones can deliver</text>
  <text x="293" y="152" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">TO this station</text>
  <text x="293" y="168" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">Same planet only</text>

  <!-- Remote Section -->
  <rect x="420" y="55" width="360" height="135" rx="6" fill="#2a2a44" stroke="#f0c040" stroke-width="2" filter="url(#shadow)"/>
  <rect x="420" y="55" width="360" height="28" rx="6" fill="#f0c040" opacity="0.3"/>
  <text x="600" y="73" font-family="Arial,sans-serif" font-size="16" fill="#f0c040" text-anchor="middle" font-weight="bold">REMOTE (Vessel - Green Icon)</text>
  <line x1="430" y1="90" x2="770" y2="90" stroke="#f0c040" stroke-width="0.5" opacity="0.4"/>
  
  <rect x="435" y="100" width="145" height="75" rx="4" fill="#1e2a3e" stroke="#f0c040" stroke-width="1"/>
  <text x="507" y="120" font-family="Arial,sans-serif" font-size="14" fill="#2ecc71" text-anchor="middle" font-weight="bold">Remote Supply</text>
  <text x="507" y="138" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">Vessels fly items</text>
  <text x="507" y="152" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">FROM this station</text>
  <text x="507" y="168" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">Cross planet/system</text>

  <rect x="620" y="100" width="145" height="75" rx="4" fill="#1e2a3e" stroke="#f0c040" stroke-width="1"/>
  <text x="693" y="120" font-family="Arial,sans-serif" font-size="14" fill="#9b59b6" text-anchor="middle" font-weight="bold">Remote Demand</text>
  <text x="693" y="138" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">Vessels bring items</text>
  <text x="693" y="152" font-family="Arial,sans-serif" font-size="12" fill="#ccc" text-anchor="middle">TO this station</text>
  <text x="693" y="168" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">Cross planet/system</text>

  <!-- Solution box -->
  <rect x="80" y="210" width="640" height="110" rx="6" fill="#1e2a1e" stroke="#27ae60" stroke-width="1.5"/>
  <text x="400" y="235" font-family="Arial,sans-serif" font-size="16" fill="#2ecc71" text-anchor="middle" font-weight="bold">QUICK DIAGNOSTIC - IS IT LOCAL OR REMOTE?</text>
  
  <rect x="95" y="250" width="290" height="55" rx="4" fill="#1a2a1a" stroke="#2ecc71" stroke-width="0.8"/>
  <text x="240" y="270" font-family="Arial,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">Drones not moving items on same planet</text>
  <text x="240" y="286" font-family="Arial,sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle">Check: Local Supply checkbox + Slot Mode</text>
  <text x="240" y="300" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">Drones use yellow icon path</text>

  <rect x="415" y="250" width="290" height="55" rx="4" fill="#1a2a1a" stroke="#f0c040" stroke-width="0.8"/>
  <text x="560" y="270" font-family="Arial,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">Vessels not moving items between planets</text>
  <text x="560" y="286" font-family="Arial,sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle">Check: Remote Supply checkbox + Warpers</text>
  <text x="560" y="300" font-family="Arial,sans-serif" font-size="10.7" fill="#888" text-anchor="middle">Vessels use green icon path</text>
</svg>