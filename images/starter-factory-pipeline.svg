<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" height="340">
  <defs>
    <linearGradient id="bg"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0d1117"/></linearGradient>
    <linearGradient id="iron"><stop offset="0%" stop-color="#6B7280"/><stop offset="100%" stop-color="#9CA3AF"/></linearGradient>
    <linearGradient id="copper"><stop offset="0%" stop-color="#B45309"/><stop offset="100%" stop-color="#D97706"/></linearGradient>
    <linearGradient id="prod"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10B981"/></linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#60A5FA"/></marker>
  </defs>
  <rect width="720" height="340" fill="url(#bg)"/>
  <text x="360" y="28" text-anchor="middle" fill="#ECEFF1" font-size="16" font-family="monospace" font-weight="bold">STARTER FACTORY - 5-STEP PIPELINE</text>

  <!-- Iron line -->
  <text x="50" y="60" fill="#9CA3AF" font-size="11" font-family="monospace">IRON LINE</text>
  <rect x="40" y="70" width="100" height="36" rx="4" fill="#1F2937" stroke="#6B7280" stroke-width="1.5"/>
  <text x="58" y="86" fill="#6B7280" font-size="9" font-family="monospace">[ORE]</text>
  <text x="50" y="100" fill="#9CA3AF" font-size="10" font-family="monospace">Mining Machine</text>
  <line x1="140" y1="88" x2="175" y2="88" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="180" y="70" width="100" height="36" rx="4" fill="#1F2937" stroke="#6B7280" stroke-width="1.5"/>
  <text x="195" y="86" fill="#6B7280" font-size="9" font-family="monospace">[INGOT]</text>
  <text x="190" y="100" fill="#9CA3AF" font-size="10" font-family="monospace">Smelting Furnace</text>
  <line x1="280" y1="88" x2="315" y2="88" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="320" y="70" width="100" height="36" rx="4" fill="#1F2937" stroke="#059669" stroke-width="1.5"/>
  <text x="335" y="86" fill="#059669" font-size="9" font-family="monospace">[GEAR]</text>
  <text x="330" y="100" fill="#10B981" font-size="10" font-family="monospace">Assembler x1</text>
  <line x1="420" y1="88" x2="455" y2="88" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="460" y="70" width="100" height="36" rx="4" fill="#1F2937" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="475" y="86" fill="#A78BFA" font-size="9" font-family="monospace">[STACK]</text>
  <text x="470" y="100" fill="#C4B5FD" font-size="10" font-family="monospace">Storage Box</text>

  <!-- Copper line -->
  <text x="50" y="150" fill="#D97706" font-size="11" font-family="monospace">COPPER LINE</text>
  <rect x="40" y="160" width="100" height="36" rx="4" fill="#1F2937" stroke="#B45309" stroke-width="1.5"/>
  <text x="55" y="176" fill="#B45309" font-size="9" font-family="monospace">[ORE]</text>
  <text x="50" y="190" fill="#D97706" font-size="10" font-family="monospace">Mining Machine</text>
  <line x1="140" y1="178" x2="175" y2="178" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="180" y="160" width="100" height="36" rx="4" fill="#1F2937" stroke="#B45309" stroke-width="1.5"/>
  <text x="192" y="176" fill="#B45309" font-size="9" font-family="monospace">[INGOT]</text>
  <text x="190" y="190" fill="#D97706" font-size="10" font-family="monospace">Smelting Furnace</text>
  <line x1="280" y1="178" x2="315" y2="178" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Two assemblers share -->
  <rect x="320" y="155" width="100" height="36" rx="4" fill="#1F2937" stroke="#059669" stroke-width="1.5"/>
  <text x="338" y="171" fill="#059669" font-size="9" font-family="monospace">[COIL]</text>
  <text x="330" y="185" fill="#10B981" font-size="10" font-family="monospace">Assembler x1</text>
  <line x1="420" y1="173" x2="455" y2="173" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="460" y="155" width="100" height="36" rx="4" fill="#1F2937" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="475" y="171" fill="#A78BFA" font-size="9" font-family="monospace">[STACK]</text>
  <text x="470" y="185" fill="#C4B5FD" font-size="10" font-family="monospace">Storage Box</text>

  <!-- Circuit board line (second assembler after copper) -->
  <rect x="320" y="200" width="100" height="36" rx="4" fill="#1F2937" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="322" y="216" fill="#8B5CF6" font-size="9" font-family="monospace">[CIRCUIT]</text>
  <text x="325" y="230" fill="#A78BFA" font-size="10" font-family="monospace">Assembler x1</text>
  <line x1="420" y1="218" x2="455" y2="218" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="460" y="200" width="100" height="36" rx="4" fill="#1F2937" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="475" y="216" fill="#A78BFA" font-size="9" font-family="monospace">[STACK]</text>
  <text x="470" y="230" fill="#C4B5FD" font-size="10" font-family="monospace">Storage Box</text>

  <!-- Legend at bottom -->
  <rect x="40" y="260" width="640" height="65" rx="4" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="360" y="280" text-anchor="middle" fill="#9CA3AF" font-size="11" font-family="monospace">QUICK START: 3 PARALLEL MINI-LINES, 5 MINUTES EACH</text>
  <rect x="50" y="290" width="8" height="8" rx="1" fill="#6B7280"/>
  <text x="65" y="298" fill="#9CA3AF" font-size="10" font-family="monospace">Iron Ore  |</text>
  <rect x="145" y="290" width="8" height="8" rx="1" fill="#B45309"/>
  <text x="160" y="298" fill="#9CA3AF" font-size="10" font-family="monospace">Copper Ore  |</text>
  <rect x="255" y="290" width="8" height="8" rx="1" fill="#059669"/>
  <text x="270" y="298" fill="#9CA3AF" font-size="10" font-family="monospace">Gear/Coil  |</text>
  <rect x="355" y="290" width="8" height="8" rx="1" fill="#A78BFA"/>
  <text x="370" y="298" fill="#9CA3AF" font-size="10" font-family="monospace">Storage  |</text>
  <text x="450" y="298" fill="#60A5FA" font-size="10" font-family="monospace">--- Conveyor Belt</text>
</svg>
